<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUID 磁化データプロッター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#ccc;font-family:'Helvetica Neue',Arial,'Segoe UI','Meiryo',sans-serif;min-height:100vh}
  .top-bar{background:rgba(8,11,18,0.95);backdrop-filter:blur(10px);padding:10px 20px;display:flex;
    align-items:center;gap:14px;border-bottom:1px solid rgba(88,166,255,0.1);flex-wrap:wrap}
  .top-bar a{color:#58a6ff;text-decoration:none;font-size:.85rem}
  .top-bar h1{font-size:1rem;color:#fff;flex:1}
  .btn{padding:5px 14px;border:1px solid #2a3040;background:transparent;color:#888;border-radius:4px;
    cursor:pointer;font-size:.8rem;transition:.15s}
  .btn:hover{border-color:#58a6ff;color:#58a6ff}
  .btn.active{background:#1a3050;color:#58a6ff;border-color:#58a6ff}
  .btn-primary{background:#58a6ff;color:#0a0e17;border-color:#58a6ff;font-weight:bold}
  .btn-primary:hover{background:#7db8ff}

  .container{max-width:1200px;margin:0 auto;padding:20px}
  .drop-zone{border:2px dashed rgba(88,166,255,0.25);border-radius:12px;padding:48px 24px;text-align:center;
    margin-bottom:20px;transition:border-color .2s,background .2s;cursor:pointer}
  .drop-zone:hover,.drop-zone.active{border-color:#58a6ff;background:rgba(88,166,255,0.03)}
  .drop-zone h2{color:#58a6ff;font-size:1.1rem;margin-bottom:8px}
  .drop-zone p{color:#666;font-size:.85rem}
  .drop-zone .sub{font-size:.75rem;color:#555;margin-top:6px}

  .mode-bar{display:none;margin-bottom:16px;padding:10px 16px;background:rgba(15,18,28,0.8);
    border-radius:8px;border:1px solid rgba(88,166,255,0.1)}
  .mode-bar h3{font-size:.85rem;color:#888;margin-bottom:8px}
  .mode-btns{display:flex;gap:8px;flex-wrap:wrap}

  .chart-wrap{background:rgba(15,18,28,0.8);border:1px solid rgba(88,166,255,0.1);border-radius:8px;
    padding:16px;margin-bottom:20px;display:none}
  .chart-wrap canvas{width:100%!important;max-height:500px}
  .chart-toolbar{display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap;font-size:.78rem;color:#aaa}
  .chart-toolbar input,.chart-toolbar select{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    padding:4px 8px;color:#ddd;font-size:.78rem}
  .chart-toolbar input:focus{outline:none;border-color:#58a6ff}

  .info-box{display:none;background:rgba(15,18,28,0.8);border:1px solid rgba(88,166,255,0.1);
    border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:.82rem;line-height:1.7}
  .info-box .ib-title{color:#58a6ff;font-weight:bold;margin-bottom:4px}
  .info-box .ib-row{color:#bbb}
  .info-box .ib-val{color:#ffcc44;font-weight:bold}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/">&#8592; Research Tools</a>
  <h1>SQUID 磁化データプロッター</h1>
  <button class="btn btn-primary" onclick="exportPNG()">PNG保存</button>
</div>

<div class="container">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <h2>SQUID / PPMS データファイルをドロップ</h2>
    <p>対応形式: .dat .csv .txt（MPMS/PPMS標準出力、汎用CSV）</p>
    <div class="sub">自動検出: M-T曲線（温度 vs 磁化）、M-H曲線（磁場 vs 磁化）</div>
    <input type="file" id="fileInput" multiple accept=".dat,.csv,.txt,.DAT,.CSV,.TXT" style="display:none">
  </div>

  <div class="mode-bar" id="modeBar">
    <h3>プロットモード</h3>
    <div class="mode-btns">
      <button class="btn active" id="btn-mt" onclick="setMode('mt')">M-T（温度依存性）</button>
      <button class="btn" id="btn-mh" onclick="setMode('mh')">M-H（磁場依存性）</button>
      <button class="btn" id="btn-chi" onclick="setMode('chi')">&#967;-T（帯磁率）</button>
      <button class="btn" id="btn-invchi" onclick="setMode('invchi')">1/&#967;-T（逆帯磁率）</button>
    </div>
  </div>

  <div class="chart-wrap" id="chartWrap">
    <div class="chart-toolbar">
      <label>線幅:</label>
      <input type="range" id="lineWidth" min="0.5" max="5" step="0.5" value="2" oninput="updateStyle()">
      <label>点サイズ:</label>
      <input type="range" id="pointSize" min="0" max="8" step="1" value="3" oninput="updateStyle()">
      <label><input type="checkbox" id="chkGrid" checked onchange="updateGrid()"> グリッド</label>
      <label>色:</label>
      <input type="color" id="lineColor" value="#58a6ff" onchange="updateLineColor()">
    </div>
    <canvas id="chart"></canvas>
  </div>

  <div class="info-box" id="infoBox">
    <div class="ib-title">データ概要</div>
    <div id="infoContent"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let chart=null;
let allData=[]; // {filename, temp[], field[], moment[], raw[]}
let currentMode='mt';

const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('active');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('active'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('active');handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(files){for(const f of files)readFile(f);}

function readFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=parseSQUID(e.target.result, file.name);
    if(data){
      allData.push(data);
      document.getElementById('modeBar').style.display='block';
      autoDetectMode(data);
      plotData();
      showInfo();
    }else{alert('データを読み取れませんでした: '+file.name);}
  };
  reader.readAsText(file);
}

function parseSQUID(text, filename){
  const lines=text.split(/\r?\n/);
  let temp=[],field=[],moment=[];

  // MPMS/PPMS .dat format: find header row, then parse
  let headerIdx=-1, colMap={};
  for(let i=0;i<Math.min(lines.length,100);i++){
    const l=lines[i];
    // Quantum Design format: "[Header]" section then "[Data]"
    if(l.includes('[Data]')){headerIdx=i+1;continue;}
    if(headerIdx===-1 && /temperature|field|moment|magnetization/i.test(l) && (l.includes(',')||l.includes('\t'))){
      headerIdx=i;
    }
    if(headerIdx===i){
      const cols=l.split(/[,\t]+/).map(c=>c.trim().toLowerCase());
      cols.forEach((c,j)=>{
        if(/temp/i.test(c)) colMap.temp=j;
        if(/field.*oe|magnetic.*field|field.*\(oe\)/i.test(c)) colMap.field=j;
        else if(/field/i.test(c)&&colMap.field===undefined) colMap.field=j;
        if(/moment|magnetization|dc.*moment|long.*moment/i.test(c)) colMap.moment=j;
        if(/m.*emu|moment.*emu/i.test(c)) colMap.moment=j;
      });
      continue;
    }
  }

  // If header found, parse subsequent rows
  if(headerIdx>=0 && Object.keys(colMap).length>=2){
    for(let i=headerIdx+1;i<lines.length;i++){
      const parts=lines[i].split(/[,\t]+/).map(s=>s.trim());
      const t=colMap.temp!==undefined?parseFloat(parts[colMap.temp]):NaN;
      const h=colMap.field!==undefined?parseFloat(parts[colMap.field]):NaN;
      const m=colMap.moment!==undefined?parseFloat(parts[colMap.moment]):NaN;
      if(!isNaN(m)&&(!isNaN(t)||!isNaN(h))){
        temp.push(isNaN(t)?0:t);
        field.push(isNaN(h)?0:h);
        moment.push(m);
      }
    }
  }

  // Fallback: generic 2-3 column numeric data
  if(moment.length===0){
    temp=[];field=[];moment=[];
    for(const line of lines){
      const tr=line.trim();
      if(!tr||/^[#!*\[]/.test(tr)||/^[a-zA-Z]/.test(tr)) continue;
      const parts=tr.split(/[\s,;\t]+/).map(Number).filter(n=>!isNaN(n));
      if(parts.length>=2){
        temp.push(parts[0]);
        field.push(0);
        moment.push(parts[1]);
        if(parts.length>=3){field[field.length-1]=parts[0];temp[temp.length-1]=0;moment[moment.length-1]=parts[2];}
      }
    }
  }

  if(moment.length===0) return null;
  return {filename,temp,field,moment};
}

function autoDetectMode(data){
  // 温度変化が大きい→M-T、磁場変化が大きい→M-H
  const tempRange=Math.max(...data.temp)-Math.min(...data.temp);
  const fieldRange=Math.max(...data.field)-Math.min(...data.field);
  if(fieldRange>tempRange*100) setMode('mh');
  else setMode('mt');
}

function setMode(mode){
  currentMode=mode;
  ['mt','mh','chi','invchi'].forEach(m=>{
    document.getElementById('btn-'+m).classList.toggle('active',m===mode);
  });
  plotData();
}

function plotData(){
  if(allData.length===0) return;
  const COLORS=['#58a6ff','#ff6b6b','#44cc88','#ffcc44','#cc66ff','#ff8844'];

  if(chart){chart.destroy();chart=null;}

  const dsets=allData.map((d,i)=>{
    let x,y,xLabel,yLabel;
    if(currentMode==='mt'){
      x=d.temp;y=d.moment;xLabel='Temperature (K)';yLabel='Moment (emu)';
    }else if(currentMode==='mh'){
      x=d.field;y=d.moment;xLabel='Field (Oe)';yLabel='Moment (emu)';
    }else if(currentMode==='chi'){
      // χ = M/H
      x=d.temp;
      y=d.temp.map((t,j)=>d.field[j]!==0?d.moment[j]/d.field[j]:0);
      xLabel='Temperature (K)';yLabel='χ (emu/Oe)';
    }else{
      // 1/χ
      x=d.temp;
      y=d.temp.map((t,j)=>{const chi=d.field[j]!==0?d.moment[j]/d.field[j]:0;return chi!==0?1/chi:0;});
      xLabel='Temperature (K)';yLabel='1/χ (Oe/emu)';
    }

    return {
      label:d.filename,
      data:x.map((xv,j)=>({x:xv,y:y[j]})),
      borderColor:COLORS[i%COLORS.length],
      backgroundColor:'transparent',
      borderWidth:2,
      pointRadius:3,
      pointHitRadius:6,
      tension:0,
      xLabel, yLabel
    };
  });

  const ctx=document.getElementById('chart').getContext('2d');
  chart=new Chart(ctx,{
    type:'scatter',
    data:{datasets:dsets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      plugins:{
        legend:{display:allData.length>1,labels:{color:'#aaa',font:{size:11}}},
        tooltip:{callbacks:{label:c=>`(${c.parsed.x.toFixed(2)}, ${c.parsed.y.toExponential(3)})`}}
      },
      scales:{
        x:{type:'linear',title:{display:true,text:dsets[0].xLabel,color:'#888'},ticks:{color:'#666'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{type:'linear',title:{display:true,text:dsets[0].yLabel,color:'#888'},ticks:{color:'#666'},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
  document.getElementById('chart').parentElement.style.height='500px';
  document.getElementById('chartWrap').style.display='block';
  document.getElementById('lineColor').value=COLORS[0];
}

function showInfo(){
  if(allData.length===0) return;
  const d=allData[allData.length-1];
  const tMin=Math.min(...d.temp).toFixed(1), tMax=Math.max(...d.temp).toFixed(1);
  const hMin=Math.min(...d.field).toFixed(0), hMax=Math.max(...d.field).toFixed(0);
  const mMin=d.moment.reduce((a,b)=>Math.min(a,b)).toExponential(3);
  const mMax=d.moment.reduce((a,b)=>Math.max(a,b)).toExponential(3);
  document.getElementById('infoContent').innerHTML=
    `<div class="ib-row">ファイル: <span class="ib-val">${d.filename}</span></div>
     <div class="ib-row">データ点数: <span class="ib-val">${d.moment.length}</span></div>
     <div class="ib-row">温度範囲: <span class="ib-val">${tMin} – ${tMax} K</span></div>
     <div class="ib-row">磁場範囲: <span class="ib-val">${hMin} – ${hMax} Oe</span></div>
     <div class="ib-row">磁化範囲: <span class="ib-val">${mMin} – ${mMax} emu</span></div>`;
  document.getElementById('infoBox').style.display='block';
}

function updateStyle(){
  if(!chart) return;
  const w=parseFloat(document.getElementById('lineWidth').value);
  const p=parseFloat(document.getElementById('pointSize').value);
  chart.data.datasets.forEach(ds=>{ds.borderWidth=w;ds.pointRadius=p;});
  chart.update();
}
function updateGrid(){
  if(!chart) return;
  const g=document.getElementById('chkGrid').checked;
  chart.options.scales.x.grid.display=g;chart.options.scales.y.grid.display=g;chart.update();
}
function updateLineColor(){
  if(!chart||!chart.data.datasets[0]) return;
  chart.data.datasets[0].borderColor=document.getElementById('lineColor').value;
  chart.update();
}
function exportPNG(){
  if(!chart) return;
  const a=document.createElement('a');a.download='squid-plot.png';a.href=chart.toBase64Image();a.click();
}
</script>
</body>
</html>
