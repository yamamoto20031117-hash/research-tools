<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CFMS Plotter — 低温物性データプロッター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#ccc;font-family:'Helvetica Neue',Arial,'Segoe UI','Meiryo','Hiragino Sans',sans-serif;min-height:100vh}

  header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.06)}
  header h1{font-size:1.2rem;color:#fff;display:flex;align-items:center;gap:10px}
  header h1 .icon{font-size:1.5rem}
  .back-link{color:#58a6ff;text-decoration:none;font-size:.8rem}
  .back-link:hover{text-decoration:underline}

  /* ドロップエリア */
  .drop-zone{margin:20px 24px;padding:48px 24px;background:rgba(20,25,40,0.85);
    border:2px dashed rgba(88,166,255,0.3);border-radius:16px;text-align:center;
    cursor:pointer;transition:.2s;position:relative}
  .drop-zone:hover{border-color:#58a6ff;background:rgba(20,25,40,1)}
  .drop-zone.dragover{border-color:#22c55e;background:rgba(34,197,94,0.05);transform:scale(1.01)}
  .drop-zone .dz-icon{font-size:3rem;margin-bottom:12px;opacity:.7}
  .drop-zone .dz-text{font-size:1rem;color:#aaa}
  .drop-zone .dz-sub{font-size:.78rem;color:#555;margin-top:8px}
  .drop-zone input{display:none}

  /* ファイルリスト */
  .file-list{margin:0 24px 16px;display:flex;gap:8px;flex-wrap:wrap}
  .file-chip{background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.25);border-radius:8px;
    padding:6px 14px;font-size:.78rem;color:#58a6ff;display:flex;align-items:center;gap:8px;cursor:default}
  .file-chip .fc-name{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-chip .fc-info{color:#666;font-size:.68rem}
  .file-chip .fc-close{cursor:pointer;color:#888;font-size:1rem;line-height:1}
  .file-chip .fc-close:hover{color:#ef4444}
  .file-chip.active{background:rgba(88,166,255,0.2);border-color:#58a6ff}

  /* 現在値カード */
  .summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:0 24px 16px}
  .s-card{background:rgba(20,25,40,0.85);border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;padding:12px;text-align:center}
  .s-card .label{font-size:.68rem;color:#888;margin-bottom:4px}
  .s-card .value{font-size:1.4rem;font-weight:bold;font-family:'Courier New',monospace}
  .s-card .unit{font-size:.75rem;color:#666;margin-left:2px}
  .s-card.temp .value{color:#f97316}
  .s-card.resist .value{color:#22d3ee}
  .s-card.field .value{color:#a78bfa}
  .s-card.info .value{color:#888;font-size:1rem}

  /* チャート */
  .chart-section{padding:0 24px 20px}
  .chart-controls{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .chart-controls label{font-size:.78rem;color:#888}
  .chart-controls select{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    color:#ddd;padding:4px 8px;font-size:.78rem}
  .chart-controls button{padding:4px 14px;background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3);
    border-radius:4px;font-size:.78rem;cursor:pointer;transition:.15s}
  .chart-controls button:hover{background:rgba(88,166,255,0.25)}

  .chart-wrap{background:rgba(15,18,28,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%}

  /* データテーブル */
  .table-section{padding:0 24px 24px}
  .table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .table-header h2{font-size:.9rem;color:#fff}
  .table-wrap{max-height:300px;overflow-y:auto;background:rgba(15,18,28,0.6);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;scrollbar-width:thin}
  table{width:100%;border-collapse:collapse;font-size:.75rem}
  th{background:rgba(88,166,255,0.08);color:#58a6ff;font-weight:600;position:sticky;top:0;z-index:1}
  th,td{padding:6px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.04)}
  td:first-child,th:first-child{text-align:left}
  tr:hover td{background:rgba(88,166,255,0.03)}

  footer{padding:16px 24px;color:#444;font-size:.7rem;text-align:center;border-top:1px solid rgba(255,255,255,0.04)}

  .hidden{display:none}

  @media(max-width:600px){
    header{padding:12px 14px}
    header h1{font-size:1rem}
    .drop-zone{margin:12px 14px;padding:32px 14px}
    .file-list{margin:0 14px 12px}
    .summary{padding:0 14px 12px;grid-template-columns:repeat(2,1fr)}
    .chart-section{padding:0 14px 14px}
    .chart-controls{gap:6px}
    .table-section{padding:0 14px 14px}
    th,td{padding:4px 6px;font-size:.68rem}
  }
</style>
</head>
<body>

<header>
  <div>
    <a class="back-link" href="/">&#8592; Research Tools に戻る</a>
    <h1><span class="icon">&#10052;</span> CFMS データプロッター</h1>
  </div>
</header>

<!-- ドロップゾーン -->
<div class="drop-zone" id="dropZone"
     onclick="document.getElementById('fileInput').click()"
     ondragover="event.preventDefault();this.classList.add('dragover')"
     ondragleave="this.classList.remove('dragover')"
     ondrop="handleDrop(event)">
  <div class="dz-icon">&#128194;</div>
  <div class="dz-text">.dat ファイルをドラッグ＆ドロップ、またはクリックして選択</div>
  <div class="dz-sub">Cryogenic CFMS-5T の .dat ファイル（タブ区切り）に対応 &#183; 複数ファイル可</div>
  <input type="file" id="fileInput" accept=".dat,.txt,.csv" multiple onchange="handleFileSelect(event)">
</div>

<!-- ファイルリスト -->
<div class="file-list hidden" id="fileList"></div>

<!-- サマリーカード -->
<div class="summary hidden" id="summary">
  <div class="s-card info"><div class="label">データ点数</div><div class="value" id="sCount">---</div></div>
  <div class="s-card temp"><div class="label">温度範囲</div><div class="value" id="sTempRange">---</div><span class="unit">K</span></div>
  <div class="s-card resist"><div class="label">R_nv 範囲</div><div class="value" id="sRnvRange">---</div><span class="unit">&Omega;</span></div>
  <div class="s-card field"><div class="label">磁場</div><div class="value" id="sField">---</div><span class="unit">T</span></div>
  <div class="s-card temp"><div class="label">電流 I_s</div><div class="value" id="sCurrent">---</div><span class="unit">A</span></div>
</div>

<!-- メインチャート -->
<div class="chart-section hidden" id="chartSection">
  <div class="chart-controls">
    <label>Y軸:</label>
    <select id="yAxis" onchange="redrawChart()">
      <option value="R_nv">R_nv (ナノボルト抵抗)</option>
      <option value="R_s">R_s (ソース抵抗)</option>
      <option value="V_nv">V_nv</option>
      <option value="V_s">V_s</option>
    </select>
    <label>X軸:</label>
    <select id="xAxis" onchange="redrawChart()">
      <option value="sensor_B_(K)">sensor_B (K)</option>
      <option value="T_VTI_(K)">T_VTI (K)</option>
      <option value="Time">Time (s)</option>
    </select>
    <button onclick="exportCSV()">CSV出力</button>
    <button onclick="exportPNG()">PNG保存</button>
  </div>
  <div class="chart-wrap">
    <canvas id="chartMain" height="450"></canvas>
  </div>
</div>

<!-- データテーブル -->
<div class="table-section hidden" id="tableSection">
  <div class="table-header">
    <h2>データテーブル</h2>
    <span style="font-size:.7rem;color:#555" id="tableCount">0 件</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>sensor_B (K)</th><th>T_VTI (K)</th>
        <th>R_nv (&Omega;)</th><th>R_s (&Omega;)</th>
        <th>B (T)</th><th>I_s (A)</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<footer>CFMS Plotter v1.0 — Cryogenic CFMS-5T — Research Tools</footer>

<script>
// ===== データ =====
let allFiles = [];  // [{name, data:[{...}]}]
let activeFileIdx = 0;

// ===== ファイル読み込み =====
function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragover');
  loadFiles(e.dataTransfer.files);
}
function handleFileSelect(e){ loadFiles(e.target.files); }

function loadFiles(fileList){
  for(const file of fileList){
    const reader = new FileReader();
    reader.onload = function(e){
      const data = parseDat(e.target.result);
      if(data.length === 0){ alert(file.name + ' のパースに失敗しました'); return; }
      allFiles.push({name: file.name, data});
      activeFileIdx = allFiles.length - 1;
      updateUI();
    };
    reader.readAsText(file);
  }
}

function parseDat(text){
  const lines = text.split(/\r?\n/);
  if(lines.length < 2) return [];

  const headers = lines[0].split('\t').map(h => h.trim());
  const data = [];

  for(let i = 1; i < lines.length; i++){
    const line = lines[i].trim();
    if(!line) continue;
    const parts = line.split('\t');
    const row = {};
    for(let j = 0; j < headers.length && j < parts.length; j++){
      const val = parseFloat(parts[j]);
      row[headers[j]] = isNaN(val) ? parts[j] : val;
    }
    data.push(row);
  }
  return data;
}

function removeFile(idx){
  allFiles.splice(idx, 1);
  if(activeFileIdx >= allFiles.length) activeFileIdx = Math.max(0, allFiles.length - 1);
  updateUI();
}

function selectFile(idx){
  activeFileIdx = idx;
  updateUI();
}

// ===== UI更新 =====
function updateUI(){
  const hasData = allFiles.length > 0;

  // ドロップゾーンを小さく
  const dz = document.getElementById('dropZone');
  if(hasData){
    dz.style.padding = '16px 24px';
    dz.querySelector('.dz-icon').style.display = 'none';
    dz.querySelector('.dz-text').style.fontSize = '.82rem';
    dz.querySelector('.dz-sub').style.display = 'none';
  } else {
    dz.style.padding = '';
    dz.querySelector('.dz-icon').style.display = '';
    dz.querySelector('.dz-text').style.fontSize = '';
    dz.querySelector('.dz-sub').style.display = '';
  }

  // ファイルリスト
  const fl = document.getElementById('fileList');
  fl.classList.toggle('hidden', !hasData);
  fl.innerHTML = allFiles.map((f, i) =>
    `<div class="file-chip${i===activeFileIdx?' active':''}" onclick="selectFile(${i})">
      <span class="fc-name">${esc(f.name)}</span>
      <span class="fc-info">${f.data.length.toLocaleString()} 点</span>
      <span class="fc-close" onclick="event.stopPropagation();removeFile(${i})">&times;</span>
    </div>`
  ).join('');

  // セクション表示
  document.getElementById('summary').classList.toggle('hidden', !hasData);
  document.getElementById('chartSection').classList.toggle('hidden', !hasData);
  document.getElementById('tableSection').classList.toggle('hidden', !hasData);

  if(hasData){
    updateSummary();
    redrawChart();
    updateTable();
  }
}

function updateSummary(){
  const data = allFiles[activeFileIdx].data;
  const n = data.length;

  let tMin = Infinity, tMax = -Infinity;
  let rMin = Infinity, rMax = -Infinity;
  let bSum = 0, iSum = 0, bCount = 0;

  for(const d of data){
    const t = d['sensor_B_(K)'];
    const r = d['R_nv'];
    const b = d['B_digital_(T)'];
    const is_ = d['I_s'];
    if(t !== undefined){ if(t < tMin) tMin = t; if(t > tMax) tMax = t; }
    if(r !== undefined){ if(r < rMin) rMin = r; if(r > rMax) rMax = r; }
    if(b !== undefined){ bSum += b; bCount++; }
    if(is_ !== undefined){ iSum += is_; }
  }

  document.getElementById('sCount').textContent = n.toLocaleString();
  document.getElementById('sTempRange').textContent = tMin < Infinity ? tMin.toFixed(1) + ' ~ ' + tMax.toFixed(1) : '---';
  document.getElementById('sRnvRange').textContent = rMin < Infinity ? fmtR(rMin) + ' ~ ' + fmtR(rMax) : '---';
  document.getElementById('sField').textContent = bCount > 0 ? (bSum / bCount).toFixed(4) : '---';
  document.getElementById('sCurrent').textContent = n > 0 ? (iSum / n).toExponential(2) : '---';
}

function fmtR(v){
  const a = Math.abs(v);
  if(a < 0.001) return (v*1e6).toFixed(2) + ' u';
  if(a < 1) return (v*1e3).toFixed(3) + ' m';
  return v.toFixed(4);
}

// ===== Nice tick =====
function niceNum(range, round){
  if(range <= 0) return 1;
  const exp = Math.floor(Math.log10(range));
  const frac = range / Math.pow(10, exp);
  let nice;
  if(round){
    if(frac < 1.5) nice = 1;
    else if(frac < 3) nice = 2;
    else if(frac < 7) nice = 5;
    else nice = 10;
  } else {
    if(frac <= 1) nice = 1;
    else if(frac <= 2) nice = 2;
    else if(frac <= 5) nice = 5;
    else nice = 10;
  }
  return nice * Math.pow(10, exp);
}

function calcTicks(dMin, dMax, n){
  const range = dMax - dMin || 1;
  const spacing = niceNum(range / (n - 1), true);
  const lo = Math.floor(dMin / spacing) * spacing;
  const hi = Math.ceil(dMax / spacing) * spacing;
  const ticks = [];
  for(let v = lo; v <= hi + spacing * 0.001; v += spacing) ticks.push(v);
  return {min: lo, max: hi, ticks, spacing};
}

// ===== チャート描画 =====
function redrawChart(){
  if(allFiles.length === 0) return;
  const data = allFiles[activeFileIdx].data;

  const canvas = document.getElementById('chartMain');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth;
  const h = 450;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const yKey = document.getElementById('yAxis').value;
  const xKey = document.getElementById('xAxis').value;

  const filtered = data.filter(d => d[yKey] !== undefined && d[xKey] !== undefined);
  if(filtered.length < 2){
    ctx.fillStyle = '#555'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('選択したカラムのデータがありません', w/2, h/2);
    return;
  }

  const margin = {top: 20, right: 20, bottom: 50, left: 76};
  const pw = w - margin.left - margin.right;
  const ph = h - margin.top - margin.bottom;

  // 範囲
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for(const d of filtered){
    const x = parseFloat(d[xKey]), y = parseFloat(d[yKey]);
    if(x < xMin) xMin = x; if(x > xMax) xMax = x;
    if(y < yMin) yMin = y; if(y > yMax) yMax = y;
  }

  const yT = calcTicks(yMin, yMax, 7);
  const xT = calcTicks(xMin, xMax, 7);

  const xPx = v => margin.left + ((v - xT.min) / (xT.max - xT.min || 1)) * pw;
  const yPx = v => margin.top + ph - ((v - yT.min) / (yT.max - yT.min || 1)) * ph;

  // グリッド
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  for(const v of yT.ticks){ const y = yPx(v); ctx.beginPath(); ctx.moveTo(margin.left,y); ctx.lineTo(w-margin.right,y); ctx.stroke(); }
  for(const v of xT.ticks){ const x = xPx(v); ctx.beginPath(); ctx.moveTo(x,margin.top); ctx.lineTo(x,margin.top+ph); ctx.stroke(); }

  // 軸ラベル色
  const yColor = yKey.includes('R') ? '#22d3ee' : '#58a6ff';
  const xColor = '#f97316';

  // Y軸目盛り
  const yDec = yT.spacing >= 10 ? 0 : yT.spacing >= 1 ? 1 : yT.spacing >= 0.1 ? 2 : yT.spacing >= 0.01 ? 3 : yT.spacing >= 0.001 ? 4 : 6;
  ctx.fillStyle = yColor; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
  for(const v of yT.ticks){
    const y = yPx(v);
    if(y >= margin.top - 2 && y <= margin.top + ph + 2)
      ctx.fillText(v.toFixed(yDec), margin.left - 8, y + 4);
  }

  // X軸目盛り
  const xDec = xT.spacing >= 10 ? 0 : xT.spacing >= 1 ? 1 : xT.spacing >= 0.1 ? 2 : 4;
  ctx.fillStyle = xColor; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for(const v of xT.ticks){
    const x = xPx(v);
    if(x >= margin.left - 10 && x <= w - margin.right + 10)
      ctx.fillText(v.toFixed(xDec), x, margin.top + ph + 18);
  }

  // 軸タイトル
  const yLabel = yKey.replace(/_/g, ' ');
  const xLabel = xKey === 'Time' ? 'Time (s)' : xKey.replace(/_/g, ' ');

  ctx.save(); ctx.translate(16, margin.top + ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle = yColor; ctx.textAlign = 'center'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText(yLabel, 0, 0); ctx.restore();

  ctx.fillStyle = xColor; ctx.textAlign = 'center'; ctx.font = 'bold 12px sans-serif';
  ctx.fillText(xLabel, margin.left + pw/2, h - 6);

  // クリッピング
  ctx.save();
  ctx.beginPath(); ctx.rect(margin.left, margin.top, pw, ph); ctx.clip();

  // データ線
  ctx.strokeStyle = yColor; ctx.lineWidth = 1.5;
  ctx.beginPath();
  let first = true;
  for(const d of filtered){
    const x = xPx(parseFloat(d[xKey])), y = yPx(parseFloat(d[yKey]));
    if(first){ ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // データポイント
  const dotR = filtered.length > 2000 ? 1 : filtered.length > 500 ? 1.5 : 2.5;
  ctx.fillStyle = yColor;
  for(const d of filtered){
    const x = xPx(parseFloat(d[xKey])), y = yPx(parseFloat(d[yKey]));
    ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();

  // 枠
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  ctx.strokeRect(margin.left, margin.top, pw, ph);

  // ファイル名表示
  ctx.fillStyle = '#555'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText(allFiles[activeFileIdx].name + '  (' + filtered.length.toLocaleString() + ' pts)', w - margin.right, margin.top - 6);
}

// ===== テーブル =====
function updateTable(){
  const data = allFiles[activeFileIdx].data;
  document.getElementById('tableCount').textContent = data.length.toLocaleString() + ' 件';

  // 最初と最後の25件ずつ（大量データの場合）
  let display;
  if(data.length <= 100){
    display = data;
  } else {
    display = [...data.slice(0, 25), null, ...data.slice(-25)];
  }

  document.getElementById('tableBody').innerHTML = display.map(d => {
    if(d === null) return '<tr><td colspan="6" style="text-align:center;color:#555">... 中略 ...</td></tr>';
    return `<tr>
      <td>${fmt(d['sensor_B_(K)'], 4)}</td>
      <td>${fmt(d['T_VTI_(K)'], 4)}</td>
      <td>${fmt(d['R_nv'], 6)}</td>
      <td>${fmt(d['R_s'], 4)}</td>
      <td>${fmt(d['B_digital_(T)'], 6)}</td>
      <td>${d['I_s'] !== undefined ? parseFloat(d['I_s']).toExponential(3) : '---'}</td>
    </tr>`;
  }).join('');
}

function fmt(v, d){ return v !== undefined ? parseFloat(v).toFixed(d) : '---'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== エクスポート =====
function exportCSV(){
  if(allFiles.length === 0) return;
  const data = allFiles[activeFileIdx].data;
  const keys = Object.keys(data[0]);
  let csv = keys.join(',') + '\n';
  for(const d of data) csv += keys.map(k => d[k] !== undefined ? d[k] : '').join(',') + '\n';

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = allFiles[activeFileIdx].name.replace(/\.dat$/i, '') + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

function exportPNG(){
  const canvas = document.getElementById('chartMain');
  const a = document.createElement('a');
  a.download = allFiles[activeFileIdx].name.replace(/\.dat$/i, '') + '_plot.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ===== リサイズ =====
window.addEventListener('resize', () => { if(allFiles.length > 0) redrawChart(); });
</script>
</body>
</html>
