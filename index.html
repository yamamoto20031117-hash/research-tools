<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Tools — 研究ツール集</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#ccc;font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;padding:48px 24px 32px;text-align:center;
    background:linear-gradient(180deg,rgba(88,166,255,0.08) 0%,transparent 100%)}
  header h1{font-size:2rem;color:#fff;letter-spacing:0.04em;margin-bottom:8px}
  header p{color:#888;font-size:.95rem}
  .tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;
    padding:32px 24px;max-width:1000px;width:100%}
  .card{background:rgba(20,25,40,0.85);border:1px solid rgba(88,166,255,0.1);border-radius:12px;
    padding:24px;transition:border-color .2s,transform .15s;cursor:pointer;text-decoration:none;color:inherit}
  .card:hover{border-color:rgba(88,166,255,0.4);transform:translateY(-2px)}
  .card .icon{font-size:2rem;margin-bottom:12px}
  .card h2{font-size:1.15rem;color:#fff;margin-bottom:8px}
  .card p{font-size:.85rem;color:#999;line-height:1.6}
  .card .tags{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:.7rem;padding:2px 8px;border-radius:10px;background:rgba(88,166,255,0.1);color:#58a6ff}
  footer{margin-top:auto;padding:24px;color:#555;font-size:.75rem;text-align:center}
  footer a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>

<header>
  <h1>Research Tools</h1>
  <p>材料科学・物性物理の研究支援ツール</p>
</header>

<div class="tools">

  <a class="card" href="/tmd-viewer/">
    <div class="icon">🔬</div>
    <h2>TMD 結晶構造ビューア</h2>
    <p>層状遷移金属ダイカルコゲナイド（TMD）のインターカレーション構造を3Dで可視化。13種類のTMD材料、分子挿入、回転最適化、四面体配位などに対応。CIF/XYZファイルの読み込みも可能。</p>
    <div class="tags">
      <span class="tag">Three.js</span>
      <span class="tag">TMD</span>
      <span class="tag">インターカレーション</span>
      <span class="tag">結晶構造</span>
    </div>
  </a>

  <!-- 将来のツールはここに追加 -->
  <!--
  <a class="card" href="/tool-name/">
    <div class="icon">⚛️</div>
    <h2>ツール名</h2>
    <p>説明文</p>
    <div class="tags"><span class="tag">タグ</span></div>
  </a>
  -->

</div>

<footer>
  <p>Built with Claude &amp; Three.js — <a href="https://github.com/yamamoto20031117-hash" target="_blank">GitHub</a></p>
</footer>

</body>
</html>
