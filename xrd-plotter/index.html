<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRD データプロッター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#ccc;font-family:'Helvetica Neue',Arial,'Segoe UI','Meiryo',sans-serif;min-height:100vh}
  .top-bar{background:rgba(8,11,18,0.95);backdrop-filter:blur(10px);padding:10px 20px;display:flex;
    align-items:center;gap:14px;border-bottom:1px solid rgba(88,166,255,0.1);flex-wrap:wrap}
  .top-bar a{color:#58a6ff;text-decoration:none;font-size:.85rem}
  .top-bar h1{font-size:1rem;color:#fff;flex:1}
  .btn{padding:5px 14px;border:1px solid #2a3040;background:transparent;color:#888;border-radius:4px;
    cursor:pointer;font-size:.8rem;transition:.15s}
  .btn:hover{border-color:#58a6ff;color:#58a6ff}
  .btn-primary{background:#58a6ff;color:#0a0e17;border-color:#58a6ff;font-weight:bold}
  .btn-primary:hover{background:#7db8ff}

  .container{max-width:1200px;margin:0 auto;padding:20px}
  .drop-zone{border:2px dashed rgba(88,166,255,0.25);border-radius:12px;padding:48px 24px;text-align:center;
    margin-bottom:20px;transition:border-color .2s,background .2s;cursor:pointer}
  .drop-zone:hover,.drop-zone.active{border-color:#58a6ff;background:rgba(88,166,255,0.03)}
  .drop-zone h2{color:#58a6ff;font-size:1.1rem;margin-bottom:8px}
  .drop-zone p{color:#666;font-size:.85rem}

  .chart-wrap{background:rgba(15,18,28,0.8);border:1px solid rgba(88,166,255,0.1);border-radius:8px;
    padding:16px;margin-bottom:20px;position:relative;display:none}
  .chart-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .chart-toolbar label{font-size:.78rem;color:#aaa}
  .chart-toolbar input,.chart-toolbar select{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    padding:4px 8px;color:#ddd;font-size:.78rem}
  .chart-toolbar input:focus,.chart-toolbar select:focus{outline:none;border-color:#58a6ff}
  .help-tip{font-size:.68rem;color:#666;cursor:help;border-bottom:1px dotted #666}

  .multi-list{display:none;margin-bottom:16px}
  .multi-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(20,24,36,0.6);
    border-radius:4px;margin-bottom:4px;font-size:.8rem}
  .multi-item .mi-name{color:#888;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .multi-item input[type=color]{width:24px;height:24px;border:none;cursor:pointer;background:transparent;
    -webkit-appearance:none;border-radius:3px}
  .multi-item input[type=text]{width:180px;background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    padding:3px 8px;color:#ddd;font-size:.8rem}
  .multi-item input[type=text]:focus{outline:none;border-color:#58a6ff}
  .multi-item .mi-remove{color:#666;cursor:pointer;font-size:1.1rem;padding:0 4px}
  .multi-item .mi-remove:hover{color:#ff6666}

  .peak-list{display:none;margin-bottom:20px;background:rgba(15,18,28,0.8);border:1px solid rgba(88,166,255,0.1);
    border-radius:8px;padding:12px}
  .peak-list h3{font-size:.85rem;color:#58a6ff;margin-bottom:8px}
  .peak-list table{width:100%;font-size:.75rem;border-collapse:collapse}
  .peak-list th{color:#888;text-align:left;padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.08)}
  .peak-list td{padding:3px 6px;color:#ddd}

  .data-table{display:none;max-height:300px;overflow:auto;background:rgba(15,18,28,0.8);
    border:1px solid rgba(88,166,255,0.1);border-radius:8px;padding:12px;margin-bottom:20px}
  .data-table table{width:100%;border-collapse:collapse;font-size:.75rem;font-family:monospace}
  .data-table th{background:rgba(88,166,255,0.1);color:#58a6ff;padding:4px 8px;text-align:left;position:sticky;top:0}
  .data-table td{padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.04);color:#bbb}

  #xrdCanvas{width:100%;background:#fff;border-radius:4px;cursor:crosshair}
  #xrdCanvas.dragging{cursor:grabbing}
  #xrdCanvas.hovering-label{cursor:grab}

  .settings-panel{display:none;background:rgba(15,18,28,0.9);border:1px solid rgba(88,166,255,0.15);
    border-radius:8px;padding:16px;margin-bottom:16px}
  .settings-panel.open{display:block}
  .settings-panel h3{font-size:.85rem;color:#58a6ff;margin-bottom:10px}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px}
  @media(max-width:768px){.settings-grid{grid-template-columns:1fr 1fr}}
  .sg-item{display:flex;flex-direction:column;gap:3px}
  .sg-item label{font-size:.72rem;color:#888}
  .sg-item input,.sg-item select{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    padding:4px 8px;color:#ddd;font-size:.78rem}
  .sg-item input:focus,.sg-item select:focus{outline:none;border-color:#58a6ff}
  .sg-item input[type=color]{width:36px;height:28px;border:none;cursor:pointer;background:transparent;
    -webkit-appearance:none;border-radius:3px;padding:0}
  .sg-item input[type=checkbox]{accent-color:#58a6ff}
  .sg-row{display:flex;align-items:center;gap:6px}
  .sg-section{grid-column:1/-1;border-top:1px solid rgba(88,166,255,0.08);padding-top:10px;margin-top:4px;
    font-size:.78rem;color:#58a6ff;font-weight:bold}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/">&#8592; Research Tools</a>
  <h1>XRD データプロッター</h1>
  <button class="btn" onclick="toggleTable()">データ表示</button>
  <button class="btn" onclick="detectPeaks()">ピーク検出</button>
  <button class="btn" onclick="exportXLSX()">Excel出力</button>
  <button class="btn btn-primary" onclick="exportPNG()">PNG保存</button>
  <a href="/xrd-plotter/manual.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px">&#128214; 説明書</a>
</div>

<div class="container">
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <h2>XRDデータファイル（TXT）をドロップ</h2>
    <p>Rigaku SmartLab TXT形式対応（複数ファイル → スタック表示）</p>
    <input type="file" id="fileInput" multiple accept=".txt,.TXT" style="display:none">
  </div>

  <div class="multi-list" id="multiList"></div>

  <div class="chart-wrap" id="chartWrap">
    <div class="chart-toolbar">
      <label>X範囲:</label>
      <input type="number" id="xMin" placeholder="min" style="width:60px" onchange="redraw()">
      <input type="number" id="xMax" placeholder="max" style="width:60px" onchange="redraw()">
      <label>線幅:</label>
      <input type="range" id="lineWidth" min="0.5" max="4" step="0.5" value="1.5" oninput="redraw()">
      <label>Y軸:</label>
      <select id="yScale" onchange="redraw()">
        <option value="linear">リニア</option>
        <option value="log">対数</option>
        <option value="sqrt">平方根</option>
      </select>
      <label><input type="checkbox" id="chkGrid" checked onchange="redraw()"> グリッド</label>
      <label><input type="checkbox" id="chkPeakLabel" onchange="redraw()"> ピークラベル</label>
      <button class="btn" onclick="toggleSettings()" id="btnSettings">カスタマイズ &#9881;</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <h3>グラフカスタマイズ</h3>
      <div class="settings-grid">
        <div class="sg-section">タイトル・ラベル</div>
        <div class="sg-item"><label>グラフタイトル</label><input type="text" id="plotTitle" placeholder="（空欄で非表示）" oninput="redraw()"></div>
        <div class="sg-item"><label>X軸ラベル</label><input type="text" id="xLabel" value="2θ / deg" oninput="redraw()"></div>
        <div class="sg-item"><label>Y軸ラベル</label><input type="text" id="yLabel" value="Intensity / a.u." oninput="redraw()"></div>

        <div class="sg-section">フォント</div>
        <div class="sg-item"><label>フォント</label>
          <select id="fontFamily" onchange="redraw()">
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', serif">Times New Roman</option>
            <option value="'Helvetica Neue', Helvetica, sans-serif">Helvetica</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Courier New', monospace">Courier New</option>
          </select>
        </div>
        <div class="sg-item"><label>タイトルサイズ</label><input type="number" id="titleSize" value="16" min="8" max="32" onchange="redraw()"></div>
        <div class="sg-item"><label>軸ラベルサイズ</label><input type="number" id="axisLabelSize" value="14" min="8" max="28" onchange="redraw()"></div>
        <div class="sg-item"><label>目盛りサイズ</label><input type="number" id="tickSize" value="12" min="6" max="24" onchange="redraw()"></div>
        <div class="sg-item"><label>データラベルサイズ</label><input type="number" id="dataLabelSize" value="14" min="8" max="28" onchange="redraw()"></div>
        <div class="sg-item"><label>ピークラベルサイズ</label><input type="number" id="peakLabelSize" value="11" min="6" max="24" onchange="redraw()"></div>

        <div class="sg-section">色・背景</div>
        <div class="sg-item"><label>背景色</label><div class="sg-row"><input type="color" id="bgColor" value="#ffffff" onchange="redraw()"><label style="font-size:.7rem"><input type="checkbox" id="chkTransparent" onchange="redraw()"> 透過</label></div></div>
        <div class="sg-item"><label>軸・文字色</label><input type="color" id="axisColor" value="#333333" onchange="redraw()"></div>
        <div class="sg-item"><label>グリッド色</label><input type="color" id="gridColor" value="#e0e0e0" onchange="redraw()"></div>
        <div class="sg-item"><label>ベースライン色</label><input type="color" id="baseColor" value="#bbbbbb" onchange="redraw()"></div>

        <div class="sg-section">レイアウト</div>
        <div class="sg-item"><label>余白 上</label><input type="number" id="mTop" value="30" min="0" max="100" onchange="redraw()"></div>
        <div class="sg-item"><label>余白 下</label><input type="number" id="mBottom" value="50" min="20" max="120" onchange="redraw()"></div>
        <div class="sg-item"><label>余白 左</label><input type="number" id="mLeft" value="70" min="20" max="120" onchange="redraw()"></div>
        <div class="sg-item"><label>余白 右</label><input type="number" id="mRight" value="40" min="0" max="100" onchange="redraw()"></div>
        <div class="sg-item"><label>グラフ高さ(px)</label><input type="number" id="canvasH" value="0" min="0" max="2000" placeholder="0=自動" onchange="redraw()"></div>
        <div class="sg-item"><label><input type="checkbox" id="chkFrame" onchange="redraw()"> 外枠表示</label></div>

        <div class="sg-section">目盛り・軸</div>
        <div class="sg-item"><label>グリッド線幅</label><input type="number" id="gridWidth" value="0.5" min="0.1" max="3" step="0.1" onchange="redraw()"></div>
        <div class="sg-item"><label>軸線幅</label><input type="number" id="axisWidth" value="1" min="0.5" max="4" step="0.5" onchange="redraw()"></div>
        <div class="sg-item"><label><input type="checkbox" id="chkYTicks" onchange="redraw()"> Y軸目盛り</label></div>
      </div>
    </div>

    <canvas id="xrdCanvas"></canvas>
  </div>

  <div class="peak-list" id="peakList">
    <h3>検出ピーク（ラベル欄に (001) 等を入力するとグラフに表示されます）</h3>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <label style="font-size:.78rem;color:#888">手動追加:</label>
      <select id="manualPeakDs" style="background:#0e1220;border:1px solid #2a3040;border-radius:4px;padding:3px 6px;color:#ddd;font-size:.78rem"></select>
      <input type="number" id="manualPeak2t" placeholder="2θ (°)" step="0.01" style="width:80px;background:#0e1220;border:1px solid #2a3040;border-radius:4px;padding:3px 6px;color:#ddd;font-size:.78rem">
      <input type="text" id="manualPeakLbl" placeholder="ラベル (001)等" style="width:100px;background:#0e1220;border:1px solid #2a3040;border-radius:4px;padding:3px 6px;color:#ddd;font-size:.78rem">
      <button class="btn" onclick="addManualPeak()">+ ピーク追加</button>
    </div>
    <div id="peakTables"></div>
  </div>

  <div class="data-table" id="dataTable">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
      <label style="font-size:.78rem;color:#888">2θジャンプ:</label>
      <input type="number" id="jumpTheta" placeholder="2θ値を入力" step="0.1" style="width:100px;background:#0e1220;border:1px solid #2a3040;border-radius:4px;padding:3px 6px;color:#ddd;font-size:.78rem">
      <button class="btn" onclick="jumpToTheta()">移動</button>
      <select id="dataTableDs" onchange="showDataForDataset()" style="background:#0e1220;border:1px solid #2a3040;border-radius:4px;padding:3px 6px;color:#ddd;font-size:.78rem"></select>
    </div>
    <div id="dataTableScroll" style="max-height:300px;overflow:auto">
    <table><thead><tr><th>2&#952; (°)</th><th>Intensity</th><th></th></tr></thead>
    <tbody id="tableBody"></tbody></table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script>
const COLORS=['#2F5496','#CC0000','#228B22','#FF8C00','#8B008B','#008B8B','#B22222','#4169E1'];
let fileList=[]; // {name, label, color, x[], y[], peaks[]}

// ===== ファイル読み込み =====
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('active');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('active'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('active');handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>{handleFiles(e.target.files);fileInput.value='';});

function handleFiles(files){
  for(const f of files){
    if(!f.name.toLowerCase().endsWith('.txt')){alert(f.name+' はTXTファイルではありません');continue;}
    readFile(f);
  }
}

function readFile(file){
  // Shift-JIS → UTF-8 の順で試す（Rigaku SmartLabはShift-JISが多い）
  const encodings=['shift_jis','utf-8','euc-jp','iso-8859-1'];
  let tryIdx=0;

  function tryRead(){
    const reader=new FileReader();
    reader.onload=e=>{
      const data=parseSmartLab(e.target.result);
      if(data&&data.x.length>10){
        const idx=fileList.length;
        const label=file.name.replace(/\.txt$/i,'');
        fileList.push({name:file.name, label, color:COLORS[idx%COLORS.length], x:data.x, y:data.y, peaks:[]});
        updateUI();
      } else {
        tryIdx++;
        if(tryIdx<encodings.length){
          tryRead();
        } else {
          // 最終手段: バイナリとして読んでASCII部分だけ抽出
          const binReader=new FileReader();
          binReader.onload=ev=>{
            const arr=new Uint8Array(ev.target.result);
            let text='';
            for(let i=0;i<arr.length;i++){
              const b=arr[i];
              if(b===0x09) text+='\t';
              else if(b===0x0A) text+='\n';
              else if(b===0x0D) continue;
              else if(b>=0x20&&b<=0x7E) text+=String.fromCharCode(b);
              else text+=' ';
            }
            const data=parseSmartLab(text);
            if(data&&data.x.length>0){
              const idx2=fileList.length;
              const label2=file.name.replace(/\.txt$/i,'');
              fileList.push({name:file.name, label:label2, color:COLORS[idx2%COLORS.length], x:data.x, y:data.y, peaks:[]});
              updateUI();
            } else {
              alert('データを読み取れませんでした: '+file.name);
            }
          };
          binReader.readAsArrayBuffer(file);
        }
      }
    };
    reader.onerror=()=>{
      tryIdx++;
      if(tryIdx<encodings.length) tryRead();
      else alert('ファイルの読み込みに失敗しました: '+file.name);
    };
    reader.readAsText(file, encodings[tryIdx]);
  }
  tryRead();
}

function parseSmartLab(text){
  const lines=text.split(/\r?\n/);
  const x=[], y=[];
  for(const line of lines){
    const trimmed=line.trim();
    if(!trimmed) continue;
    // タブ、カンマ、複数スペースのいずれかで区切り
    const parts=trimmed.split(/[\t,]+|\s{2,}/).map(s=>s.trim()).filter(s=>s);
    if(parts.length>=2){
      const a=parseFloat(parts[0]), b=parseFloat(parts[1]);
      if(!isNaN(a)&&!isNaN(b)&&a>=0&&a<=180){x.push(a);y.push(b);}
    }
  }
  return {x,y};
}

// ===== UI更新 =====
function updateUI(){
  updateMultiList();
  if(fileList.length>0){
    document.getElementById('chartWrap').style.display='block';
    const allX=fileList.flatMap(f=>f.x);
    const el1=document.getElementById('xMin'), el2=document.getElementById('xMax');
    if(!el1.value) el1.value=Math.floor(Math.min(...allX));
    if(!el2.value) el2.value=Math.ceil(Math.max(...allX));
    redraw();
  }
}

function updateMultiList(){
  const el=document.getElementById('multiList');
  if(fileList.length===0){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML=fileList.map((f,i)=>
    `<div class="multi-item">
      <input type="color" value="${f.color}" onchange="fileList[${i}].color=this.value;redraw()">
      <input type="text" value="${f.label}" onchange="fileList[${i}].label=this.value;redraw()" placeholder="グラフに表示するラベル">
      <span class="mi-name">(${f.name})</span>
      <span class="mi-remove" onclick="removeFile(${i})" title="削除">&times;</span>
    </div>`
  ).join('');
}

function removeFile(idx){
  fileList.splice(idx,1);
  fileList.forEach((f,i)=>f.color=COLORS[i%COLORS.length]);
  updateUI();
  if(fileList.length===0){
    document.getElementById('chartWrap').style.display='none';
    document.getElementById('xMin').value='';
    document.getElementById('xMax').value='';
  }
}

// ===== 設定パネル =====
function toggleSettings(){
  const p=document.getElementById('settingsPanel');
  p.classList.toggle('open');
  document.getElementById('btnSettings').classList.toggle('active');
}

// ===== 描画 =====
function redraw(){
  const canvas=document.getElementById('xrdCanvas');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-32;
  const customH=parseInt(document.getElementById('canvasH').value)||0;
  const h=customH>0?customH:Math.max(400, fileList.length*250+100);
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  canvas.width=w*dpr;
  canvas.height=h*dpr;

  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  // 背景
  const transparent=document.getElementById('chkTransparent').checked;
  if(!transparent){
    ctx.fillStyle=document.getElementById('bgColor').value||'#fff';
    ctx.fillRect(0,0,w,h);
  }

  if(fileList.length===0) return;

  // 設定値取得
  const margin={
    top:parseInt(document.getElementById('mTop').value)||30,
    right:parseInt(document.getElementById('mRight').value)||40,
    bottom:parseInt(document.getElementById('mBottom').value)||50,
    left:parseInt(document.getElementById('mLeft').value)||70
  };
  const pw=w-margin.left-margin.right;
  const ph=h-margin.top-margin.bottom;

  const xMin=parseFloat(document.getElementById('xMin').value)||0;
  const xMax=parseFloat(document.getElementById('xMax').value)||90;
  const lineW=parseFloat(document.getElementById('lineWidth').value)||1.5;
  const showGrid=document.getElementById('chkGrid').checked;
  const showPeakLabel=document.getElementById('chkPeakLabel').checked;
  const yScaleMode=document.getElementById('yScale').value;
  const showFrame=document.getElementById('chkFrame').checked;
  const showYTicks=document.getElementById('chkYTicks').checked;

  // カスタマイズ値
  const fontFam=document.getElementById('fontFamily').value;
  const titleSz=parseInt(document.getElementById('titleSize').value)||16;
  const axisLabelSz=parseInt(document.getElementById('axisLabelSize').value)||14;
  const tickSz=parseInt(document.getElementById('tickSize').value)||12;
  const dataLabelSz=parseInt(document.getElementById('dataLabelSize').value)||14;
  const peakLabelSz=parseInt(document.getElementById('peakLabelSize').value)||11;
  const axisCol=document.getElementById('axisColor').value||'#333';
  const gridCol=document.getElementById('gridColor').value||'#e0e0e0';
  const baseCol=document.getElementById('baseColor').value||'#bbb';
  const gridW=parseFloat(document.getElementById('gridWidth').value)||0.5;
  const axisW=parseFloat(document.getElementById('axisWidth').value)||1;
  const plotTitle=document.getElementById('plotTitle').value;
  const xLabelText=document.getElementById('xLabel').value;
  const yLabelText=document.getElementById('yLabel').value||
    (yScaleMode==='log'?'log(Intensity)':yScaleMode==='sqrt'?'\u221AIntensity':'Intensity / a.u.');

  const n=fileList.length;
  const bandH=ph/n;
  const xPx=v=>margin.left+(v-xMin)/(xMax-xMin)*pw;

  function transformY(val){
    if(yScaleMode==='log') return val>0?Math.log10(val):0;
    if(yScaleMode==='sqrt') return val>0?Math.sqrt(val):0;
    return val;
  }

  // グリッド
  if(showGrid){
    ctx.strokeStyle=gridCol;
    ctx.lineWidth=gridW;
    const xStep=calcStep(xMax-xMin);
    for(let v=Math.ceil(xMin/xStep)*xStep;v<=xMax;v+=xStep){
      const px=xPx(v);
      ctx.beginPath();ctx.moveTo(px,margin.top);ctx.lineTo(px,h-margin.bottom);ctx.stroke();
    }
  }

  // 各データセット描画
  for(let i=0;i<n;i++){
    const f=fileList[i];
    const bandTop=margin.top+i*bandH;
    const plotH=bandH*0.8;
    const plotBot=bandTop+bandH-bandH*0.1;

    const filtered=[];
    for(let j=0;j<f.x.length;j++){
      if(f.x[j]>=xMin&&f.x[j]<=xMax) filtered.push({x:f.x[j], y:f.y[j], ty:transformY(f.y[j])});
    }
    if(filtered.length===0) continue;

    const tyMax=Math.max(...filtered.map(p=>p.ty));
    const tyMin=Math.min(...filtered.map(p=>p.ty));
    const tyRange=tyMax-tyMin||1;
    const yPx=ty=>plotBot-((ty-tyMin)/tyRange)*plotH;

    // ベースライン
    ctx.strokeStyle=baseCol;
    ctx.lineWidth=gridW;
    ctx.beginPath();ctx.moveTo(margin.left,plotBot);ctx.lineTo(margin.left+pw,plotBot);ctx.stroke();

    // データプロット
    ctx.strokeStyle=f.color;
    ctx.lineWidth=lineW;
    ctx.beginPath();
    let started=false;
    for(const p of filtered){
      const px=xPx(p.x),py=yPx(p.ty);
      if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // データセットラベル（右上）
    ctx.fillStyle=f.color;
    ctx.font='bold '+dataLabelSz+'px '+fontFam;
    ctx.textAlign='right';
    ctx.fillText(f.label, margin.left+pw-5, bandTop+dataLabelSz+4);

    // Y軸目盛り（各バンド）
    if(showYTicks){
      ctx.font=tickSz+'px '+fontFam;
      ctx.fillStyle=axisCol;
      ctx.textAlign='right';
      const yStep=calcStep(tyRange);
      for(let v=Math.ceil(tyMin/yStep)*yStep;v<=tyMax;v+=yStep){
        const py=yPx(v);
        if(py<bandTop||py>plotBot+5) continue;
        ctx.fillText(v.toPrecision(3), margin.left-6, py+4);
        ctx.strokeStyle=axisCol;ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(margin.left,py);ctx.lineTo(margin.left-4,py);ctx.stroke();
      }
    }

    // ピークラベル（ドラッグ可能）
    if(showPeakLabel&&f.peaks.length>0){
      ctx.font='bold '+peakLabelSz+'px '+fontFam;
      ctx.textAlign='center';
      for(let pi=0;pi<f.peaks.length;pi++){
        const pk=f.peaks[pi];
        if(pk.x<xMin||pk.x>xMax) continue;
        if(!pk.label) continue;
        const peakPx=xPx(pk.x);
        const ty=transformY(pk.y);
        const peakPy=yPx(ty);
        if(pk.offsetX===undefined){pk.offsetX=0;pk.offsetY=-25;}
        const labelX=peakPx+pk.offsetX, labelY=peakPy+pk.offsetY;

        ctx.strokeStyle=f.color;ctx.lineWidth=0.8;ctx.setLineDash([3,2]);
        ctx.beginPath();ctx.moveTo(peakPx,peakPy);ctx.lineTo(labelX,labelY+6);ctx.stroke();
        ctx.setLineDash([]);

        const tw=ctx.measureText(pk.label).width;
        const boxX=labelX-tw/2-4,boxY=labelY-6,boxW=tw+8,boxH=peakLabelSz+5;
        const bg=document.getElementById('bgColor').value||'#fff';
        ctx.fillStyle=transparent?'rgba(255,255,255,0.9)':bg+'e6';
        ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=0.5;
        ctx.fillRect(boxX,boxY,boxW,boxH);ctx.strokeRect(boxX,boxY,boxW,boxH);
        ctx.fillStyle=f.color;
        ctx.fillText(pk.label, labelX, labelY+peakLabelSz-6);
        pk._hitBox={x:boxX, y:boxY, w:boxW, h:boxH, fi:i, pi:pi};
      }
    }
  }

  // 外枠
  if(showFrame){
    ctx.strokeStyle=axisCol;ctx.lineWidth=axisW;
    ctx.strokeRect(margin.left,margin.top,pw,ph);
  }

  // X軸
  ctx.strokeStyle=axisCol;
  ctx.lineWidth=axisW;
  ctx.beginPath();ctx.moveTo(margin.left,h-margin.bottom);ctx.lineTo(w-margin.right,h-margin.bottom);ctx.stroke();

  // Y軸線
  ctx.beginPath();ctx.moveTo(margin.left,margin.top);ctx.lineTo(margin.left,h-margin.bottom);ctx.stroke();

  // X軸目盛り
  ctx.fillStyle=axisCol;
  ctx.font=tickSz+'px '+fontFam;
  ctx.textAlign='center';
  const xStep=calcStep(xMax-xMin);
  for(let v=Math.ceil(xMin/xStep)*xStep;v<=xMax;v+=xStep){
    const px=xPx(v);
    ctx.fillText(v.toFixed(0), px, h-margin.bottom+tickSz+6);
    ctx.strokeStyle=axisCol;ctx.lineWidth=axisW;
    ctx.beginPath();ctx.moveTo(px,h-margin.bottom);ctx.lineTo(px,h-margin.bottom+5);ctx.stroke();
  }

  // X軸ラベル
  ctx.font=axisLabelSz+'px '+fontFam;
  ctx.fillStyle=axisCol;
  ctx.textAlign='center';
  ctx.fillText(xLabelText, margin.left+pw/2, h-6);

  // Y軸ラベル
  ctx.save();
  ctx.translate(14, margin.top+ph/2);
  ctx.rotate(-Math.PI/2);
  ctx.font=axisLabelSz+'px '+fontFam;
  ctx.fillStyle=axisCol;
  ctx.textAlign='center';
  ctx.fillText(yLabelText, 0, 0);
  ctx.restore();

  // タイトル
  if(plotTitle){
    ctx.font='bold '+titleSz+'px '+fontFam;
    ctx.fillStyle=axisCol;
    ctx.textAlign='center';
    ctx.fillText(plotTitle, margin.left+pw/2, margin.top-8);
  }
}

function calcStep(range){
  const raw=range/8;
  const mag=Math.pow(10,Math.floor(Math.log10(raw)));
  const norm=raw/mag;
  if(norm<=1.5) return mag;
  if(norm<=3.5) return 2*mag;
  if(norm<=7.5) return 5*mag;
  return 10*mag;
}

// ===== ピーク検出 =====
function detectPeaks(){
  if(fileList.length===0) return;
  const tablesEl=document.getElementById('peakTables');
  tablesEl.innerHTML='';

  fileList.forEach((f, fi)=>{
    const x=f.x, y=f.y, nn=y.length;
    const peaks=[];

    const win=Math.max(3, Math.floor(nn/200));
    const sy=y.map((_,i)=>{
      let s=0,c=0;
      for(let j=Math.max(0,i-win);j<=Math.min(nn-1,i+win);j++){s+=y[j];c++;}
      return s/c;
    });

    // 閾値: 最大値の10%以上のピークのみ検出（ノイズ除去）
    const maxSy=Math.max(...sy);
    const threshold=maxSy*0.10;
    // プロミネンス（突出度）も考慮
    for(let i=5;i<nn-5;i++){
      if(sy[i]>sy[i-1]&&sy[i]>sy[i+1]&&sy[i]>sy[i-2]&&sy[i]>sy[i+2]&&sy[i]>threshold){
        // 左右の谷を探してプロミネンスを計算
        let leftMin=sy[i], rightMin=sy[i];
        for(let j=i-1;j>=Math.max(0,i-50);j--){if(sy[j]<leftMin)leftMin=sy[j];if(sy[j]>sy[i])break;}
        for(let j=i+1;j<=Math.min(nn-1,i+50);j++){if(sy[j]<rightMin)rightMin=sy[j];if(sy[j]>sy[i])break;}
        const prominence=sy[i]-Math.max(leftMin,rightMin);
        if(prominence<maxSy*0.03) continue; // プロミネンスが小さすぎるピークは除外

        if(peaks.length>0&&Math.abs(x[i]-peaks[peaks.length-1].x)<1.0){
          if(sy[i]>peaks[peaks.length-1].y) peaks[peaks.length-1]={x:x[i],y:y[i],label:''};
        } else {
          peaks.push({x:x[i],y:y[i],label:''});
        }
      }
    }
    f.peaks=peaks;

    const lambda=1.5406;
    let html=`<h4 style="color:${f.color};margin:12px 0 6px">${f.label} (${peaks.length}ピーク)</h4>`;
    html+=`<table><thead><tr><th>#</th><th>2\u03B8 (°)</th><th>強度</th><th>d値 (Å)</th><th>ラベル</th></tr></thead><tbody>`;
    peaks.forEach((p,pi)=>{
      const theta=p.x*Math.PI/360;
      const d=lambda/(2*Math.sin(theta));
      html+=`<tr><td>${pi+1}</td><td>${p.x.toFixed(3)}</td><td>${p.y.toFixed(1)}</td><td>${d.toFixed(4)}</td>`;
      html+=`<td><input type="text" value="${p.label}" placeholder="(001)等" style="width:80px;background:#0e1220;border:1px solid #2a3040;border-radius:3px;color:#ddd;padding:2px 4px;font-size:.72rem" onchange="updatePeakLabel(${fi},${pi},this.value)"></td></tr>`;
    });
    html+='</tbody></table>';
    tablesEl.innerHTML+=html;
  });

  document.getElementById('peakList').style.display='block';
  document.getElementById('chkPeakLabel').checked=true;
  redraw();
}

function updatePeakLabel(fi, pi, val){
  fileList[fi].peaks[pi].label=val;
  redraw();
}

// ===== データテーブル =====
function toggleTable(){
  const el=document.getElementById('dataTable');
  if(el.style.display==='block'){el.style.display='none';return;}
  if(fileList.length===0) return;
  // データセット選択ドロップダウンを更新
  const dsSel=document.getElementById('dataTableDs');
  dsSel.innerHTML=fileList.map((f,i)=>`<option value="${i}">${f.label}</option>`).join('');
  showDataForDataset();
  el.style.display='block';
}

function showDataForDataset(){
  const idx=parseInt(document.getElementById('dataTableDs').value)||0;
  if(idx>=fileList.length) return;
  const f=fileList[idx];
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=f.x.map((x,i)=>
    `<tr id="drow-${i}"><td>${x.toFixed(4)}</td><td>${f.y[i].toFixed(2)}</td><td><button class="btn" style="padding:1px 6px;font-size:.65rem" onclick="addPeakFromData(${idx},${i})">+P</button></td></tr>`
  ).join('');
}

function jumpToTheta(){
  const target=parseFloat(document.getElementById('jumpTheta').value);
  if(isNaN(target)) return;
  const idx=parseInt(document.getElementById('dataTableDs').value)||0;
  if(idx>=fileList.length) return;
  const f=fileList[idx];
  // 最も近い2θを探す
  let closest=0, minDiff=Infinity;
  for(let i=0;i<f.x.length;i++){
    const diff=Math.abs(f.x[i]-target);
    if(diff<minDiff){minDiff=diff;closest=i;}
  }
  const row=document.getElementById('drow-'+closest);
  if(row){
    row.scrollIntoView({behavior:'smooth',block:'center'});
    row.style.background='rgba(88,166,255,0.25)';
    setTimeout(()=>{row.style.background='';},2000);
  }
}

function addPeakFromData(fi,dataIdx){
  const f=fileList[fi];
  if(!f.peaks) f.peaks=[];
  // 重複チェック
  const x2t=f.x[dataIdx];
  if(f.peaks.some(p=>Math.abs(p.x-x2t)<0.05)){alert('この位置には既にピークがあります');return;}
  const lbl=prompt('ピークラベルを入力（例: (001)）','');
  f.peaks.push({x:x2t, y:f.y[dataIdx], label:lbl||''});
  // ピークリスト再表示
  refreshPeakTables();
  document.getElementById('chkPeakLabel').checked=true;
  redraw();
}

// ===== 手動ピーク追加 =====
function addManualPeak(){
  const dsIdx=parseInt(document.getElementById('manualPeakDs').value);
  const theta2=parseFloat(document.getElementById('manualPeak2t').value);
  const lbl=document.getElementById('manualPeakLbl').value.trim();
  if(isNaN(dsIdx)||dsIdx>=fileList.length){alert('データセットを選択してください');return;}
  if(isNaN(theta2)){alert('2θ値を入力してください');return;}
  const f=fileList[dsIdx];
  if(!f.peaks) f.peaks=[];
  // 重複チェック
  if(f.peaks.some(p=>Math.abs(p.x-theta2)<0.05)){alert('この位置には既にピークがあります');return;}
  // 該当2θに最も近いデータ点の強度を取得
  let closestY=0, minDiff=Infinity;
  for(let i=0;i<f.x.length;i++){
    const diff=Math.abs(f.x[i]-theta2);
    if(diff<minDiff){minDiff=diff;closestY=f.y[i];}
  }
  f.peaks.push({x:theta2, y:closestY, label:lbl});
  f.peaks.sort((a,b)=>a.x-b.x);
  document.getElementById('manualPeak2t').value='';
  document.getElementById('manualPeakLbl').value='';
  refreshPeakTables();
  document.getElementById('chkPeakLabel').checked=true;
  redraw();
}

// ===== Excel出力（ExcelJS: 正規.xlsx + 画像埋め込み） =====
async function exportXLSX(){
  if(fileList.length===0){alert('データを先に読み込んでください');return;}
  const canvas=document.getElementById('xrdCanvas');
  const firstName=fileList[0].label;
  const lambda=1.5406;

  const wb=new ExcelJS.Workbook();

  // --- シート1: グラフ画像 ---
  const wsChart=wb.addWorksheet('XRD Chart');
  const imgBase64=canvas.toDataURL('image/png').split(',')[1];
  const imgId=wb.addImage({base64:imgBase64, extension:'png'});
  // キャンバスのアスペクト比を保持
  const cols=Math.min(14, Math.round(canvas.clientWidth/70));
  const rows=Math.min(35, Math.round(canvas.clientHeight/20));
  wsChart.addImage(imgId,{tl:{col:0,row:0},br:{col:cols,row:rows}});

  // --- シート2〜: 各データセット ---
  for(const f of fileList){
    const name=(f.label||'data').substring(0,28).replace(/[\\\/\*\?\[\]:]/g,'');
    const ws=wb.addWorksheet(name);
    ws.columns=[{header:'2\u03B8 (\u00B0)',key:'x',width:14},{header:'Intensity (cps)',key:'y',width:18}];
    const headerRow=ws.getRow(1);
    headerRow.font={bold:true,color:{argb:'FFFFFFFF'}};
    headerRow.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4472C4'}};
    for(let i=0;i<f.x.length;i++) ws.addRow({x:f.x[i],y:f.y[i]});
  }

  // --- ピークシート ---
  const hasPeaks=fileList.some(f=>f.peaks&&f.peaks.length>0);
  if(hasPeaks){
    const wsP=wb.addWorksheet('Peaks');
    wsP.columns=[
      {header:'Dataset',key:'ds',width:22},{header:'#',key:'n',width:5},
      {header:'2\u03B8 (\u00B0)',key:'x',width:12},{header:'Intensity',key:'y',width:14},
      {header:'d (\u00C5)',key:'d',width:12},{header:'Label',key:'l',width:14}
    ];
    const hdr=wsP.getRow(1);
    hdr.font={bold:true,color:{argb:'FFFFFFFF'}};
    hdr.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4472C4'}};
    for(const f of fileList){
      if(!f.peaks) continue;
      f.peaks.forEach((p,i)=>{
        const theta=p.x*Math.PI/360;
        const d=lambda/(2*Math.sin(theta));
        wsP.addRow({ds:f.label,n:i+1,x:p.x,y:p.y,d:d,l:p.label||''});
      });
    }
  }

  // ダウンロード
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=firstName+'_XRD.xlsx';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== PNG出力 =====
function exportPNG(){
  const canvas=document.getElementById('xrdCanvas');
  const a=document.createElement('a');
  a.download='xrd-plot.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}

// ===== ピークラベル ドラッグ機能 =====
(function(){
  const canvas=document.getElementById('xrdCanvas');
  let dragging=null; // {fi, pi, startMouseX, startMouseY, startOffsetX, startOffsetY}

  function getCanvasPos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/(canvas.clientWidth*(window.devicePixelRatio||1));
    const scaleY=canvas.height/(canvas.clientHeight*(window.devicePixelRatio||1));
    // CSSピクセル座標を返す（dpr考慮不要、描画もCSS座標で行っているため）
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return {x:clientX-rect.left, y:clientY-rect.top};
  }

  function findLabelAt(pos){
    for(const f of fileList){
      if(!f.peaks) continue;
      for(const pk of f.peaks){
        if(!pk._hitBox||!pk.label) continue;
        const h=pk._hitBox;
        if(pos.x>=h.x&&pos.x<=h.x+h.w&&pos.y>=h.y&&pos.y<=h.y+h.h){
          return {fi:h.fi, pi:h.pi, pk};
        }
      }
    }
    return null;
  }

  function onDown(e){
    const pos=getCanvasPos(e);
    const hit=findLabelAt(pos);
    if(hit){
      e.preventDefault();
      dragging={fi:hit.fi, pi:hit.pi, startMouseX:pos.x, startMouseY:pos.y,
        startOffsetX:hit.pk.offsetX||0, startOffsetY:hit.pk.offsetY||-25};
      canvas.classList.add('dragging');
    }
  }

  function onMove(e){
    if(dragging){
      e.preventDefault();
      const pos=getCanvasPos(e);
      const dx=pos.x-dragging.startMouseX;
      const dy=pos.y-dragging.startMouseY;
      fileList[dragging.fi].peaks[dragging.pi].offsetX=dragging.startOffsetX+dx;
      fileList[dragging.fi].peaks[dragging.pi].offsetY=dragging.startOffsetY+dy;
      redraw();
    } else {
      // ホバー時にカーソル変更
      const pos=getCanvasPos(e);
      const hit=findLabelAt(pos);
      canvas.classList.toggle('hovering-label', !!hit);
    }
  }

  function onUp(){
    if(dragging){
      dragging=null;
      canvas.classList.remove('dragging');
    }
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  // タッチ対応
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend', onUp);
})();
</script>
