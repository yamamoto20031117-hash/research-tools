<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Icon Maker</title>
<style>
body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#1a1a2e;color:#fff}
.drop{width:300px;height:300px;border:3px dashed #58a6ff;border-radius:20px;display:flex;align-items:center;justify-content:center;
  text-align:center;color:#888;font-size:1.1rem;cursor:pointer;transition:.2s;margin:20px}
.drop:hover,.drop.over{border-color:#22c55e;background:rgba(34,197,94,0.1)}
.drop img,.drop canvas{max-width:280px;max-height:280px;border-radius:12px}
.done{color:#22c55e;font-size:1.3rem;font-weight:bold;margin:16px}
p{color:#888;margin:8px}
code{background:#222;padding:2px 8px;border-radius:4px;font-size:.85rem}
</style></head><body>
<h1>App Icon Generator</h1>
<p>透過済みPNGをドロップ → 3サイズ自動ダウンロード</p>
<div class="drop" id="drop" onclick="document.getElementById('fileIn').click()">画像をここにドロップ</div>
<input type="file" id="fileIn" accept="image/*" style="display:none">
<div id="msg"></div>
<script>
const drop=document.getElementById('drop');
const fileIn=document.getElementById('fileIn');
['dragenter','dragover'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
drop.addEventListener('drop',e=>{if(e.dataTransfer.files.length)processFile(e.dataTransfer.files[0])});
fileIn.addEventListener('change',e=>{if(e.target.files.length)processFile(e.target.files[0])});

function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      drop.innerHTML='';
      drop.appendChild(img);
      drop.style.border='none';
      // 3サイズ自動ダウンロード
      [{name:'apple-touch-icon.png',sz:180},{name:'icon-192.png',sz:192},{name:'icon-32.png',sz:32}].forEach(s=>{
        const c=document.createElement('canvas');
        c.width=s.sz;c.height=s.sz;
        c.getContext('2d').drawImage(img,0,0,s.sz,s.sz);
        c.toBlob(blob=>{
          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download=s.name;a.click();
        },'image/png');
      });
      document.getElementById('msg').innerHTML='<p class="done">3ファイルをダウンロードしました</p><p><code>~/Desktop/research-tools/</code> に移動してデプロイしてください</p>';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
</script></body></html>
