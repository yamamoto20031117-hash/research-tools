<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>TMD 結晶構造ビューア — 1T / 2H / 1T' / 3R + インターカレーション</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080b12;overflow:hidden;font-family:'Helvetica Neue',Arial,'Segoe UI','Meiryo',sans-serif;color:#ccc;
    -webkit-tap-highlight-color:transparent;touch-action:none;-ms-touch-action:none}
  #canvas{display:block;width:100vw;height:100vh}

  #bar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:8px 14px;
    background:rgba(8,11,18,0.92);backdrop-filter:blur(10px);z-index:20;flex-wrap:wrap;font-size:.8rem}
  #bar h1{font-size:.95rem;color:#fff;white-space:nowrap;margin-right:4px}
  .g{display:flex;align-items:center;gap:4px;color:#aaa}
  .g select,.g input[type=range]{accent-color:#58a6ff;font-size:.78rem;background:#181d27;color:#ddd;
    border:1px solid #2a3040;border-radius:4px;padding:2px 4px}
  .g select{min-width:90px}
  .g input[type=range]{width:100px}
  .g .v{color:#58a6ff;min-width:30px;font-variant-numeric:tabular-nums}
  .g input[type=checkbox]{accent-color:#58a6ff}
  .g .num-in{width:42px;background:#181d27;color:#58a6ff;border:1px solid #2a3040;border-radius:4px;
    font-size:.76rem;text-align:center;padding:1px 2px;font-variant-numeric:tabular-nums;
    -moz-appearance:textfield;appearance:textfield}
  .g .num-in::-webkit-inner-spin-button,.g .num-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .g .num-in:focus{outline:none;border-color:#58a6ff}
  .pm{display:inline-flex;gap:1px}
  .pm button{width:20px;height:20px;background:#181d27;color:#888;border:1px solid #2a3040;
    border-radius:3px;cursor:pointer;font-size:.72rem;line-height:1;padding:0;transition:.12s}
  .pm button:hover{border-color:#58a6ff;color:#58a6ff}
  .col-pick{width:24px;height:24px;border:1px solid #2a3040;border-radius:4px;padding:0;cursor:pointer;
    background:transparent;-webkit-appearance:none;appearance:none}
  .col-pick::-webkit-color-swatch-wrapper{padding:1px}
  .col-pick::-webkit-color-swatch{border:none;border-radius:3px}
  .btn{padding:3px 9px;border:1px solid #2a3040;background:transparent;color:#888;
    border-radius:4px;cursor:pointer;font-size:.78rem;transition:.15s}
  .btn.active{background:#1a3050;color:#58a6ff;border-color:#58a6ff}
  .btn:hover{border-color:#58a6ff}
  .btn-snap{background:#1a2a1a;border-color:#2a5030;color:#6c6}

  #info-wrap{position:fixed;right:14px;z-index:15;max-width:240px}
  #info-toggle{background:rgba(8,11,18,0.9);backdrop-filter:blur(10px);border:1px solid rgba(88,166,255,0.12);
    border-radius:6px;padding:4px 10px;font-size:.72rem;color:#888;cursor:pointer;margin-bottom:4px;
    display:flex;align-items:center;gap:4px;margin-left:auto;transition:.15s}
  #info-toggle:hover{color:#58a6ff;border-color:rgba(88,166,255,0.3)}
  #info-toggle .arrow{display:inline-block;transition:transform .2s}
  #info-toggle .arrow.collapsed{transform:rotate(180deg)}
  #info{background:rgba(8,11,18,0.9);backdrop-filter:blur(10px);
    border:1px solid rgba(88,166,255,0.12);border-radius:8px;padding:12px 16px;font-size:.74rem;
    color:#999;line-height:1.75;overflow-y:auto;max-height:70vh;
    transition:max-height .3s ease,opacity .25s ease,padding .3s ease,border-color .3s ease}
  #info.hidden{max-height:0!important;opacity:0;padding-top:0;padding-bottom:0;border-color:transparent}
  #info strong{color:#ddd}
  #info .hl{color:#58a6ff}

  #legend{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:14px;
    padding:7px 14px;background:rgba(8,11,18,0.9);backdrop-filter:blur(10px);border-radius:8px;
    font-size:.76rem;color:#bbb;z-index:15;white-space:nowrap}
  #legend span{display:flex;align-items:center;gap:4px}
  .dot{width:12px;height:12px;border-radius:50%}
  .bline{display:inline-block;width:16px;height:2px;border-radius:1px}

  #hint{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);
    font-size:.7rem;z-index:15;pointer-events:none;
    opacity:1;transition:opacity 1.5s ease;}
  #opt-panel{position:fixed;bottom:50px;right:14px;z-index:25;background:rgba(8,11,18,0.92);
    backdrop-filter:blur(10px);border:1px solid rgba(88,166,255,0.15);border-radius:8px;
    padding:10px 14px;font-size:.74rem;color:#aaa;display:none;min-width:220px}
  #opt-panel .opt-title{color:#ffcc44;font-weight:bold;margin-bottom:6px}
  #opt-panel .opt-bar{height:4px;background:#1a2a3a;border-radius:2px;margin:6px 0}
  #opt-panel .opt-fill{height:100%;background:#58a6ff;border-radius:2px;width:0%;transition:width .2s}
  #opt-panel .opt-log{max-height:80px;overflow-y:auto;font-size:.66rem;color:#777;font-family:monospace;margin-top:4px}
  #dist-label{position:fixed;pointer-events:none;z-index:25;background:rgba(0,0,0,0.82);
    color:#ffcc44;font-size:.82rem;font-weight:bold;padding:4px 10px;border-radius:6px;
    border:1px solid rgba(255,200,60,0.4);white-space:nowrap;display:none;
    backdrop-filter:blur(6px);transform:translate(-50%,-120%)}
  .mode-btn.active{background:#1a3050;color:#58a6ff;border-color:#58a6ff}
  #mode-status{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:rgba(8,11,18,0.92);color:#58a6ff;font-size:.76rem;padding:6px 14px;
    border-radius:6px;border:1px solid rgba(88,166,255,0.25);z-index:20;display:none;
    backdrop-filter:blur(8px);white-space:nowrap}
  #mode-status .ms-step{color:#ffcc44}
  #ilayer-dist-panel{position:fixed;bottom:50px;left:14px;z-index:15;
    background:rgba(8,11,18,0.9);backdrop-filter:blur(10px);border:1px solid rgba(255,200,60,0.15);
    border-radius:8px;padding:8px 12px;font-size:.74rem;color:#ccc;display:none;max-width:200px;line-height:1.6}
  #ilayer-dist-panel .ild-title{color:#ffcc44;font-weight:bold;font-size:.72rem;margin-bottom:4px}
  #ilayer-dist-panel .ild-row{color:#ddd;font-variant-numeric:tabular-nums}

  /* ツールバー折りたたみボタン（常に表示） */
  #bar-toggle{position:fixed;top:4px;right:8px;z-index:30;background:rgba(8,11,18,0.92);
    backdrop-filter:blur(10px);border:1px solid #2a3040;border-radius:6px;padding:5px 12px;
    font-size:.78rem;color:#888;cursor:pointer;transition:.15s}
  #bar-toggle:hover{color:#58a6ff;border-color:#58a6ff}
  #bar.collapsed{display:none!important}

  /* === スマホ横持ち (高さ500px以下 かつ 横長) === */
  @media (max-height:500px) and (orientation:landscape){
    #bar{font-size:.68rem;gap:6px;padding:4px 8px;max-height:100vh;overflow-y:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:thin}
    #bar h1{font-size:.78rem;margin-right:2px}
    .g{gap:2px}
    .g label{font-size:.64rem}
    .g select{min-width:70px;font-size:.68rem;padding:1px 2px}
    .g input[type=range]{width:60px}
    .g .num-in{width:34px;font-size:.66rem}
    .pm button{width:18px;height:18px;font-size:.64rem}
    .btn{padding:2px 6px;font-size:.68rem}
    #info-wrap{right:8px;max-width:180px}
    #info{font-size:.66rem;max-height:60vh;padding:8px 10px}
    #legend{font-size:.66rem;padding:4px 10px;gap:8px;bottom:6px}
    .dot{width:9px;height:9px}
    #hint{font-size:.6rem;bottom:32px}
    #ilayer-dist-panel{bottom:36px;left:8px;font-size:.66rem}
    #mode-status{bottom:60px;font-size:.66rem;padding:4px 10px}
    #opt-panel{bottom:36px;right:8px;font-size:.66rem;min-width:180px}
    #dist-label{font-size:.72rem;padding:3px 8px}
  }

  /* === スマホ縦持ち === */
  @media (max-width:600px) and (orientation:portrait){
    #bar{font-size:.68rem;gap:5px;padding:4px 8px;max-height:55vh;overflow-y:auto;
      -webkit-overflow-scrolling:touch;scrollbar-width:thin}
    #bar h1{font-size:.82rem}
    .g{gap:2px;flex-wrap:wrap}
    .g label{font-size:.66rem;min-width:28px}
    .g select{min-width:74px;font-size:.7rem}
    .g input[type=range]{width:60px}
    .g .num-in{width:34px;font-size:.66rem}
    .pm button{width:18px;height:18px}
    .btn{padding:2px 6px;font-size:.68rem}
    .col-pick{width:22px;height:22px}
    #info-wrap{right:8px;max-width:170px}
    #info{font-size:.68rem;max-height:55vh;padding:8px 10px}
    #legend{font-size:.66rem;gap:6px;padding:5px 10px}
    .dot{width:10px;height:10px}
    #hint{font-size:.6rem;bottom:34px}
    #ilayer-dist-panel{bottom:38px;left:8px;font-size:.68rem}
    #mode-status{bottom:62px;font-size:.68rem;padding:4px 10px}
    #opt-panel{bottom:38px;right:8px;font-size:.68rem;min-width:180px}
    #dist-label{font-size:.74rem;padding:3px 8px}
  }

  /* Windows用スクロールバーのスタイル */
  #bar::-webkit-scrollbar{width:4px}
  #bar::-webkit-scrollbar-track{background:transparent}
  #bar::-webkit-scrollbar-thumb{background:#2a3040;border-radius:2px}
  #bar::-webkit-scrollbar-thumb:hover{background:#58a6ff}
</style>
</head>
<body>

<button id="bar-toggle" onclick="toggleBar()">&#9776; メニュー</button>
<div id="bar">
  <a href="/" style="color:#58a6ff;text-decoration:none;font-size:.82rem;margin-right:4px" title="Research Tools トップへ">&#8592;</a>
  <h1>TMD 結晶構造</h1>
  <div class="g">
    <label>物質</label>
    <select id="sel-mat">
      <optgroup label="1T (八面体)">
        <option value="VSe2" selected>VSe₂</option>
        <option value="TiS2">TiS₂</option>
        <option value="TiSe2">TiSe₂</option>
        <option value="TaS2">TaS₂</option>
        <option value="PtS2">PtS₂</option>
        <option value="PtTe2">PtTe₂</option>
        <option value="ZrS2">ZrS₂</option>
      </optgroup>
      <optgroup label="2H (三角柱)">
        <option value="MoS2">MoS₂</option>
        <option value="MoSe2">MoSe₂</option>
        <option value="MoTe2">MoTe₂</option>
        <option value="WS2">WS₂</option>
        <option value="WSe2">WSe₂</option>
        <option value="WTe2">WTe₂</option>
        <option value="NbSe2">NbSe₂</option>
        <option value="NbS2">NbS₂</option>
      </optgroup>
      <optgroup label="1T' (歪み八面体)">
        <option value="MoTe2_1Tp">MoTe₂ (1T')</option>
        <option value="WTe2_1Tp">WTe₂ (1T'/Td)</option>
        <option value="MoS2_1Tp">MoS₂ (1T')</option>
        <option value="ReS2">ReS₂</option>
        <option value="ReSe2">ReSe₂</option>
      </optgroup>
      <optgroup label="3R (菱面体)">
        <option value="MoS2_3R">MoS₂ (3R)</option>
        <option value="NbS2_3R">NbS₂ (3R)</option>
        <option value="NbSe2_3R">NbSe₂ (3R)</option>
        <option value="TaS2_3R">TaS₂ (3R)</option>
      </optgroup>
    </select>
  </div>

  <div class="g">
    <label>層間</label>
    <input type="range" id="sl-gap" min="1.0" max="5.0" step="0.1" value="1.0">
    <input type="number" class="num-in" id="v-gap" min="1.0" max="5.0" step="0.1" value="1.0" title="倍率">
    <span style="color:#666;font-size:.7em">×</span>
    <input type="number" class="num-in" id="v-gap-abs" min="0" step="0.01" value="0" style="width:52px" title="層間距離 (Å)">
    <span style="color:#666;font-size:.7em">Å</span>
    <span class="pm"><button onclick="stepSlider('sl-gap',-1)">−</button><button onclick="stepSlider('sl-gap',1)">+</button></span>
  </div>
  <div class="g">
    <label>層数</label>
    <input type="range" id="sl-layers" min="2" max="5" step="1" value="3">
    <input type="number" class="num-in" id="v-layers" min="2" max="5" step="1" value="3">
    <span class="pm"><button onclick="stepSlider('sl-layers',-1)">−</button><button onclick="stepSlider('sl-layers',1)">+</button></span>
  </div>
  <div class="g">
    <label>a₁幅</label>
    <input type="range" id="sl-na" min="1" max="10" step="1" value="4">
    <input type="number" class="num-in" id="v-na" min="1" max="10" step="1" value="4">
    <span class="pm"><button onclick="stepSlider('sl-na',-1)">−</button><button onclick="stepSlider('sl-na',1)">+</button></span>
  </div>
  <div class="g">
    <label>a₂幅</label>
    <input type="range" id="sl-nb" min="1" max="10" step="1" value="4">
    <input type="number" class="num-in" id="v-nb" min="1" max="10" step="1" value="4">
    <span class="pm"><button onclick="stepSlider('sl-nb',-1)">−</button><button onclick="stepSlider('sl-nb',1)">+</button></span>
  </div>
  <div class="g">
    <label>挿入分子</label>
    <select id="sel-inter">
      <option value="none">なし</option>
      <optgroup label="イオン">
        <option value="Li">Li⁺</option>
        <option value="Na">Na⁺</option>
        <option value="K">K⁺</option>
        <option value="Rb">Rb⁺</option>
      </optgroup>
      <optgroup label="分子">
        <option value="EMIm">EMIm⁺</option>
        <option value="TBMA">TBMA⁺</option>
        <option value="TBA">TBA⁺</option>
        <option value="helicene">ヘリセン</option>
      </optgroup>
      <optgroup id="og-custom" label="読込分子" style="display:none"></optgroup>
    </select>
    <button class="btn" onclick="document.getElementById('mol-input').click()" title="CIF/XYZファイルから分子を追加">+ CIF/XYZ</button>
    <input type="file" id="mol-input" accept=".cif,.CIF,.xyz,.XYZ" style="display:none">
  </div>
  <div class="g">
    <label>a回転</label>
    <input type="range" id="sl-rot-a" min="0" max="360" step="1" value="0" class="rot-sl">
    <input type="number" class="num-in" id="v-rot-a" min="0" max="360" step="1" value="0">°
    <span class="pm"><button onclick="stepSlider('sl-rot-a',-1)">−</button><button onclick="stepSlider('sl-rot-a',1)">+</button></span>
  </div>
  <div class="g">
    <label>b回転</label>
    <input type="range" id="sl-rot-b" min="0" max="360" step="1" value="0" class="rot-sl">
    <input type="number" class="num-in" id="v-rot-b" min="0" max="360" step="1" value="0">°
    <span class="pm"><button onclick="stepSlider('sl-rot-b',-1)">−</button><button onclick="stepSlider('sl-rot-b',1)">+</button></span>
  </div>
  <div class="g">
    <label>c回転</label>
    <input type="range" id="sl-rot-c" min="0" max="360" step="1" value="0" class="rot-sl">
    <input type="number" class="num-in" id="v-rot-c" min="0" max="360" step="1" value="0">°
    <span class="pm"><button onclick="stepSlider('sl-rot-c',-1)">−</button><button onclick="stepSlider('sl-rot-c',1)">+</button></span>
  </div>
  <div class="g">
    <label>M径</label>
    <input type="range" id="sl-atom-m" min="0.1" max="2.0" step="0.05" value="1.0">
    <input type="number" class="num-in" id="v-atom-m" min="0.1" max="2.0" step="0.05" value="1.0">
    <span class="pm"><button onclick="stepSlider('sl-atom-m',-1)">−</button><button onclick="stepSlider('sl-atom-m',1)">+</button></span>
  </div>
  <div class="g">
    <label>X径</label>
    <input type="range" id="sl-atom-x" min="0.1" max="2.0" step="0.05" value="1.0">
    <input type="number" class="num-in" id="v-atom-x" min="0.1" max="2.0" step="0.05" value="1.0">
    <span class="pm"><button onclick="stepSlider('sl-atom-x',-1)">−</button><button onclick="stepSlider('sl-atom-x',1)">+</button></span>
  </div>
  <div class="g">
    <label>分子径</label>
    <input type="range" id="sl-atom-i" min="0.1" max="2.0" step="0.05" value="1.0">
    <input type="number" class="num-in" id="v-atom-i" min="0.1" max="2.0" step="0.05" value="1.0">
    <span class="pm"><button onclick="stepSlider('sl-atom-i',-1)">−</button><button onclick="stepSlider('sl-atom-i',1)">+</button></span>
  </div>
  <div class="g">
    <label>結合太さ</label>
    <input type="range" id="sl-bond-r" min="0.1" max="2.0" step="0.05" value="1.0">
    <input type="number" class="num-in" id="v-bond-r" min="0.1" max="2.0" step="0.05" value="1.0">
    <span class="pm"><button onclick="stepSlider('sl-bond-r',-1)">−</button><button onclick="stepSlider('sl-bond-r',1)">+</button></span>
  </div>
  <div class="g"><button class="btn" onclick="resetSizeSliders()" title="原子径・結合太さを初期値に戻す">↺ サイズリセット</button></div>
  <div class="g"><input type="checkbox" id="chk-poly"><label for="chk-poly">多面体</label></div>
  <div class="g"><input type="checkbox" id="chk-cell"><label for="chk-cell">単位胞</label></div>
  <div class="g"><input type="checkbox" id="chk-dist" checked><label for="chk-dist">層間距離</label></div>
  <div class="g">
    <label>操作</label>
    <button class="btn mode-btn active" id="mode-dist" onclick="setClickMode('dist')">距離</button>
    <button class="btn mode-btn" id="mode-move" onclick="setClickMode('move')">移動</button>
    <button class="btn mode-btn" id="mode-tetra" onclick="setClickMode('tetra')">四面体</button>
  </div>
  <div class="g">
    <button class="btn" id="btn-persp" onclick="setProj('persp')">透視</button>
    <button class="btn active" id="btn-ortho" onclick="setProj('ortho')">平行</button>
  </div>
  <div class="g">
    <label>視点</label>
    <button class="btn view-btn" data-dir="x" onclick="setView('x')">a</button>
    <button class="btn view-btn" data-dir="y" onclick="setView('y')">b</button>
    <button class="btn view-btn" data-dir="z" onclick="setView('z')">c</button>
    <button class="btn view-btn" data-dir="free" onclick="setView('free')">自由</button>
  </div>
  <div class="g"><button class="btn btn-snap" onclick="takeScreenshot()">&#128247; 撮影</button></div>
  <div class="g"><button class="btn" onclick="exportCIF()" style="background:#1a1a2a;border-color:#3a5090;color:#88aaff">&#128196; CIF出力</button></div>
  <div class="g"><button class="btn" id="btn-opt" onclick="runOptimize()" style="background:#1a1a2a;border-color:#8855cc;color:#bb88ff">&#9883; 向き最適化</button></div>
  <div class="g"><button class="btn" id="btn-undo" onclick="doUndo()" disabled title="元に戻す (Ctrl+Z)" style="background:#1a1a1a;border-color:#aa6622;color:#dd9944">&#8630; 戻す</button></div>
  <div class="g"><a href="/tmd-viewer/manual.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px">&#128214; 説明書</a></div>
  <div class="g">
    <label id="lbl-col-m">金属色</label>
    <input type="color" id="col-m" class="col-pick" value="#2e8bc0" title="金属原子の色">
    <label id="lbl-col-x">配位子色</label>
    <input type="color" id="col-x" class="col-pick" value="#d48a00" title="カルコゲン原子の色">
  </div>
</div>

<div id="info-wrap">
  <button id="info-toggle" onclick="toggleInfo()"><span class="arrow" id="info-arrow">&#9660;</span> 結晶データ</button>
  <div id="info"></div>
</div>

<div id="hint">ドラッグ: 回転 ／ スクロール: ズーム ／ 操作モードを選んで原子をクリック</div>
<div id="opt-panel">
  <div class="opt-title">&#9883; 分子向き最適化</div>
  <div id="opt-status">準備中...</div>
  <div class="opt-bar"><div class="opt-fill" id="opt-fill"></div></div>
  <div class="opt-log" id="opt-log"></div>
</div>
<div id="dist-label"></div>
<div id="mode-status"></div>
<div id="ilayer-dist-panel"></div>

<div id="legend">
  <span><span class="dot" id="leg-m"></span><span id="leg-m-name">V</span></span>
  <span><span class="dot" id="leg-x"></span><span id="leg-x-name">Se</span></span>
  <span><span class="bline" style="background:rgba(150,200,240,.6)"></span>結合</span>
  <span id="leg-inter" style="display:none"><span class="dot" id="leg-i-dot"></span><span id="leg-i-name"></span></span>
</div>

<canvas id="canvas"></canvas>

// =====================================================
//  ツールバー折りたたみ（スマホ対応）
// =====================================================
function toggleBar(){
  const bar=document.getElementById('bar');
  const btn=document.getElementById('bar-toggle');
  bar.classList.toggle('collapsed');
  btn.textContent=bar.classList.contains('collapsed')?'\u2630 メニュー':'\u2715 閉じる';
}
// スマホ（タッチデバイス or 小さい画面）ではデフォルトでバーを閉じる
document.addEventListener('DOMContentLoaded',()=>{
  const isMobile=('ontouchstart' in window||navigator.maxTouchPoints>0)&&window.innerWidth<=1024;
  if(isMobile){
    const bar=document.getElementById('bar');
    const btn=document.getElementById('bar-toggle');
    bar.classList.add('collapsed');
    btn.textContent='\u2630 メニュー';
  }
});

function exportCIF(){
  const info=DB[curMat], a=info.a, bond=info.bond, phase=curPhase;
  const numLayers=parseInt(document.getElementById('sl-layers').value);
  const expansion=parseFloat(document.getElementById('sl-gap').value);
  const interKey=document.getElementById('sel-inter').value;
  const inter=INTER[interKey];
  const Na=parseInt(document.getElementById('sl-na').value);
  const Nb=parseInt(document.getElementById('sl-nb').value);

  const c_layer=phase==='2H'?info.c2H/2:phase==='3R'?(info.c3R||info.c2H*1.5)/3:phase==='1Tp'?(info.c1Tp||info.c1T*2)/(info.nlc||2):info.c1T;
  const r_inp=a/S3;
  const d_xm=info.dxm||Math.sqrt(Math.max(bond*bond-r_inp*r_inp,0.1));
  const sandwich=2*d_xm;
  const normalGap=c_layer-sandwich;
  const effExpansion=Math.max(expansion, inter.minGap);
  const expandedGap=normalGap*effExpansion;
  const layerStep=sandwich+expandedGap;

  // スーパーセルの実空間サイズ
  const aU=phase==='1Tp'?(info.a1Tp||a*2):a;
  const bU=phase==='1Tp'?(info.b1Tp||a):a;
  const cellA=(phase==='1Tp'?aU:a)*Na;
  const cellB=(phase==='1Tp'?bU:a)*Nb;
  const cellC=numLayers*layerStep;

  // インターカラントの回転・圧縮座標を事前計算 (画面と一致)
  let cifCompCoords=[];
  if(interKey!=='none'){
    // 1) 回転
    const rA=parseFloat(document.getElementById('sl-rot-a').value)*Math.PI/180;
    const rB=parseFloat(document.getElementById('sl-rot-b').value)*Math.PI/180;
    const rC=parseFloat(document.getElementById('sl-rot-c').value)*Math.PI/180;
    const rotMat=new THREE.Matrix4().makeRotationY(rC)
      .multiply(new THREE.Matrix4().makeRotationZ(rB))
      .multiply(new THREE.Matrix4().makeRotationX(rA));
    const rotCoords=inter.atoms.map(at=>
      new THREE.Vector3(at.dx,at.dy,at.dz).applyMatrix4(rotMat));
    // 2) 圧縮
    const yVals=rotCoords.map(v=>v.y);
    const molH=Math.max(...yVals)-Math.min(...yVals);
    const availGap=Math.max(0.5, expandedGap-1.5);
    const compF=molH>0.1?Math.min(1.0, availGap/molH):1.0;
    cifCompCoords=rotCoords.map(v=>new THREE.Vector3(v.x, v.y*compF, v.z));
    // 3) 結合長保存
    if(compF<0.999 && inter.bonds && inter.bonds.length>0){
      const origL=inter.bonds.map(([ai,bi])=>rotCoords[ai].distanceTo(rotCoords[bi]));
      for(let iter=0;iter<5;iter++){
        inter.bonds.forEach(([ai,bi],bIdx)=>{
          const L=origL[bIdx];
          const pa=cifCompCoords[ai], pb=cifCompCoords[bi];
          const dx=pb.x-pa.x, dy=pb.y-pa.y, dz=pb.z-pa.z;
          const curL=Math.sqrt(dx*dx+dy*dy+dz*dz);
          if(curL<0.01) return;
          const cx2=(pa.x+pb.x)/2, cy2=(pa.y+pb.y)/2, cz2=(pa.z+pb.z)/2;
          const latSq=dx*dx+dz*dz;
          const needLatSq=L*L-dy*dy;
          if(needLatSq>0&&latSq>0.001){
            const ls=Math.sqrt(needLatSq/latSq);
            pa.x=cx2-dx*ls/2; pa.z=cz2-dz*ls/2;
            pb.x=cx2+dx*ls/2; pb.z=cz2+dz*ls/2;
            pa.y=cy2-dy/2; pb.y=cy2+dy/2;
          }
        });
      }
    }
    // 4) Y重心センタリング
    const ccY=cifCompCoords.reduce((s,v)=>s+v.y,0)/cifCompCoords.length;
    cifCompCoords.forEach(v=>v.y-=ccY);
  }

  // 全原子をfractional coordinatesで収集
  const atomList=[]; // {el, fx, fy, fz}

  for(let l=0;l<numLayers;l++){
    const yC=l*layerStep+d_xm;
    for(let i=0;i<Na;i++) for(let j=0;j<Nb;j++){
      if(phase==='1T'){
        const[mx,mz]=fracToXZ(i,j,a);
        atomList.push({el:info.m, fx:mx/cellA, fy:yC/cellC, fz:mz/cellB});
        const[xtx,xtz]=fracToXZ(i+1/3,j+2/3,a);
        atomList.push({el:info.x, fx:xtx/cellA, fy:(yC+d_xm)/cellC, fz:xtz/cellB});
        const[xbx,xbz]=fracToXZ(i+2/3,j+1/3,a);
        atomList.push({el:info.x, fx:xbx/cellA, fy:(yC-d_xm)/cellC, fz:xbz/cellB});
      } else if(phase==='1Tp'){
        // 1T' CIF: same positions as buildStructure
        const aUn=aU/Na, bUn=bU/Na;
        const baseX=i*aUn, baseZ=j*bUn;
        const dimerD=info.dimerD||2.85;
        if(info.triclinic){
          const bHn=bUn/2;
          for(let mm=0;mm<2;mm++){
            const zOff=mm*bHn;
            const d0t=Math.sqrt(aUn*aUn/4+bHn*bHn/4);
            const dt=(d0t-dimerD)/2;
            const uxt=(aUn/2)/d0t, uzt=(bHn/2)/d0t;
            atomList.push({el:info.m, fx:(baseX+dt*uxt)/cellA, fy:yC/cellC, fz:(baseZ+zOff+dt*uzt)/cellB});
            atomList.push({el:info.m, fx:(baseX+aUn/2-dt*uxt)/cellA, fy:yC/cellC, fz:(baseZ+zOff+bHn/2-dt*uzt)/cellB});
            atomList.push({el:info.x, fx:(baseX+aUn/6)/cellA, fy:(yC+d_xm)/cellC, fz:(baseZ+zOff+bHn/2)/cellB});
            atomList.push({el:info.x, fx:(baseX+2*aUn/3)/cellA, fy:(yC+d_xm)/cellC, fz:(baseZ+zOff)/cellB});
            atomList.push({el:info.x, fx:(baseX+aUn/3)/cellA, fy:(yC-d_xm)/cellC, fz:(baseZ+zOff)/cellB});
            atomList.push({el:info.x, fx:(baseX+5*aUn/6)/cellA, fy:(yC-d_xm)/cellC, fz:(baseZ+zOff+bHn/2)/cellB});
          }
        } else {
          const d0=Math.sqrt(aUn*aUn/4+bUn*bUn/4);
          const delta=(d0-dimerD)/2;
          const ux2=(aUn/2)/d0, uz2=(bUn/2)/d0;
          atomList.push({el:info.m, fx:(baseX+delta*ux2)/cellA, fy:yC/cellC, fz:(baseZ+delta*uz2)/cellB});
          atomList.push({el:info.m, fx:(baseX+aUn/2-delta*ux2)/cellA, fy:yC/cellC, fz:(baseZ+bUn/2-delta*uz2)/cellB});
          atomList.push({el:info.x, fx:(baseX+aUn/6)/cellA, fy:(yC+d_xm)/cellC, fz:(baseZ+bUn/2)/cellB});
          atomList.push({el:info.x, fx:(baseX+2*aUn/3)/cellA, fy:(yC+d_xm)/cellC, fz:baseZ/cellB});
          atomList.push({el:info.x, fx:(baseX+aUn/3)/cellA, fy:(yC-d_xm)/cellC, fz:baseZ/cellB});
          atomList.push({el:info.x, fx:(baseX+5*aUn/6)/cellA, fy:(yC-d_xm)/cellC, fz:(baseZ+bUn/2)/cellB});
        }
      } else if(phase==='3R'){
        // 3R ABC stacking: each layer translates by (+1/3, +1/3) in fractional coords
        const shift=l%3;
        const mf1=(1/3+shift/3)%1, mf2=(2/3+shift/3)%1;
        const xf1=(2/3+shift/3)%1, xf2=(1/3+shift/3)%1;
        const[mx,mz]=fracToXZ(i+mf1,j+mf2,a);
        atomList.push({el:info.m, fx:mx/cellA, fy:yC/cellC, fz:mz/cellB});
        const[xx,xz]=fracToXZ(i+xf1,j+xf2,a);
        atomList.push({el:info.x, fx:xx/cellA, fy:(yC+d_xm)/cellC, fz:xz/cellB});
        atomList.push({el:info.x, fx:xx/cellA, fy:(yC-d_xm)/cellC, fz:xz/cellB});
      } else {
        const mf=l%2===0?[1/3,2/3]:[2/3,1/3], xf=l%2===0?[2/3,1/3]:[1/3,2/3];
        const[mx,mz]=fracToXZ(i+mf[0],j+mf[1],a);
        atomList.push({el:info.m, fx:mx/cellA, fy:yC/cellC, fz:mz/cellB});
        const[xx,xz]=fracToXZ(i+xf[0],j+xf[1],a);
        atomList.push({el:info.x, fx:xx/cellA, fy:(yC+d_xm)/cellC, fz:xz/cellB});
        atomList.push({el:info.x, fx:xx/cellA, fy:(yC-d_xm)/cellC, fz:xz/cellB});
      }

    }

    // インターカラント (画面と同じ回転・圧縮・オフセットを適用)
    if(interKey!=='none'&&l<numLayers-1){
      const yInter=yC+d_xm+expandedGap/2;
      const sp=inter.spacing;
      const cnI=Math.max(1,Math.floor(Na/sp)), cnJ=Math.max(1,Math.floor(Nb/sp));
      const coI=(Na-(cnI-1)*sp)/2, coJ=(Nb-(cnJ-1)*sp)/2;
      for(let ni=0;ni<cnI;ni++) for(let nj=0;nj<cnJ;nj++){
        const fi=coI+ni*sp, fj=coJ+nj*sp;
        const[bx,bz]=fracToXZ(fi,fj,a);
        cifCompCoords.forEach((rv,idx)=>{
          atomList.push({
            el:inter.atoms[idx].el,
            fx:(bx+rv.x+interOffset.dx)/cellA,
            fy:(yInter+rv.y)/cellC,
            fz:(bz+rv.z+interOffset.dz)/cellB
          });
        });
      }
    }
  }

  // fractional座標を0-1に正規化
  atomList.forEach(at=>{
    at.fx=((at.fx%1)+1)%1;
    at.fy=((at.fy%1)+1)%1;
    at.fz=((at.fz%1)+1)%1;
  });

  // CIF文字列を生成
  const matName=`${info.m}${info.x}2`;
  const interName=interKey!=='none'?`_${interKey}`:'';
  const phaseLabel=phase==='1Tp'?"1T'":phase;
  const title=`${matName}_${phaseLabel}${interName}_${Na}x${Nb}x${numLayers}`;

  let cif=`data_${title.replace(/'/g,'')}\n`;
  cif+=`_chemical_name_common '${matName} ${phaseLabel}${interName}'\n`;
  cif+=`_cell_length_a ${cellA.toFixed(4)}\n`;
  cif+=`_cell_length_b ${cellB.toFixed(4)}\n`;
  cif+=`_cell_length_c ${cellC.toFixed(4)}\n`;
  cif+=`_cell_angle_alpha 90.0000\n`;
  cif+=`_cell_angle_beta ${(phase==='1Tp'&&info.beta?info.beta:90).toFixed(4)}\n`;
  cif+=`_cell_angle_gamma 120.0000\n`;
  cif+=`_symmetry_space_group_name_H-M 'P 1'\n`;
  cif+=`_symmetry_Int_Tables_number 1\n\n`;
  cif+=`loop_\n`;
  cif+=`_atom_site_label\n`;
  cif+=`_atom_site_type_symbol\n`;
  cif+=`_atom_site_fract_x\n`;
  cif+=`_atom_site_fract_y\n`;
  cif+=`_atom_site_fract_z\n`;

  const elCount={};
  atomList.forEach(at=>{
    elCount[at.el]=(elCount[at.el]||0)+1;
    const label=at.el+elCount[at.el];
    cif+=`${label} ${at.el} ${at.fx.toFixed(6)} ${at.fz.toFixed(6)} ${at.fy.toFixed(6)}\n`;
  });

  // ダウンロード
  const blob=new Blob([cif],{type:'text/plain'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=title+'.cif';
  link.click();
  URL.revokeObjectURL(link.href);
}

const S3 = Math.sqrt(3);
function fracToXZ(f1,f2,a) { return [f1*a+f2*(-a/2), f2*(a*S3/2)]; }
function makeCyl(p1,p2,r,mat) {
  const d=new THREE.Vector3().subVectors(p2,p1), len=d.length();
  if(len<0.01)return null;
  const g=new THREE.CylinderGeometry(r,r,len,6,1);
  g.translate(0,len/2,0); g.rotateX(Math.PI/2);
  const m=new THREE.Mesh(g,mat); m.position.copy(p1); m.lookAt(p2); return m;
}

const undoStack=[];
const MAX_UNDO=50;

function captureState(){
  return {
    curMat, curPhase, clickMode,
    interOffset:{dx:interOffset.dx,dz:interOffset.dz},
    gap:document.getElementById('sl-gap').value,
    layers:document.getElementById('sl-layers').value,
    na:document.getElementById('sl-na').value,

    rotA:document.getElementById('sl-rot-a').value,
    rotB:document.getElementById('sl-rot-b').value,
    rotC:document.getElementById('sl-rot-c').value,
    inter:document.getElementById('sel-inter').value,
    poly:document.getElementById('chk-poly').checked,
    cell:document.getElementById('chk-cell').checked,

function pushUndo(){
  const s=captureState();
  undoStack.push(s);
  if(undoStack.length>MAX_UNDO) undoStack.shift();
  updateUndoBtn();
}
function restoreState(s){
  curMat=s.curMat; curPhase=s.curPhase;
  interOffset.dx=s.interOffset.dx; interOffset.dz=s.interOffset.dz;
  document.getElementById('sel-mat').value=s.curMat;
  document.getElementById('sel-inter').value=s.inter;
  document.getElementById('sl-gap').value=s.gap; document.getElementById('v-gap').value=parseFloat(s.gap).toFixed(1);
  document.getElementById('sl-layers').value=s.layers; document.getElementById('v-layers').value=s.layers;
  document.getElementById('sl-na').value=s.na; document.getElementById('v-na').value=s.na;
  document.getElementById('sl-nb').value=s.nb; document.getElementById('v-nb').value=s.nb;
  document.getElementById('sl-rot-a').value=s.rotA; document.getElementById('v-rot-a').value=s.rotA;
  document.getElementById('sl-rot-b').value=s.rotB; document.getElementById('v-rot-b').value=s.rotB;
  document.getElementById('sl-rot-c').value=s.rotC; document.getElementById('v-rot-c').value=s.rotC;
  document.getElementById('chk-poly').checked=s.poly;
  document.getElementById('chk-cell').checked=s.cell;
  document.getElementById('chk-dist').checked=s.dist;
  if(s.atomM){document.getElementById('sl-atom-m').value=s.atomM;document.getElementById('v-atom-m').value=parseFloat(s.atomM).toFixed(1);}
  if(s.atomX){document.getElementById('sl-atom-x').value=s.atomX;document.getElementById('v-atom-x').value=parseFloat(s.atomX).toFixed(1);}
  if(s.atomI){document.getElementById('sl-atom-i').value=s.atomI;document.getElementById('v-atom-i').value=parseFloat(s.atomI).toFixed(1);}
  if(s.bondR){document.getElementById('sl-bond-r').value=s.bondR;document.getElementById('v-bond-r').value=parseFloat(s.bondR).toFixed(1);}
  setClickMode(s.clickMode);
  buildStructure();
  updateBg();
}
function doUndo(){
  if(undoStack.length===0) return;
  const s=undoStack.pop();
  restoreState(s);
  updateUndoBtn();
}

}

//  Build Structure
// =====================================================
function buildStructure() {
  clearSelection();
  while(structGroup.children.length) structGroup.remove(structGroup.children[0]);

  const info=DB[curMat], a=info.a, bond=info.bond, phase=curPhase;
  const numLayers=parseInt(document.getElementById('sl-layers').value);
  const expansion=parseFloat(document.getElementById('sl-gap').value);
  const showPoly=document.getElementById('chk-poly').checked;
  const showCell=document.getElementById('chk-cell').checked;
  const interKey=document.getElementById('sel-inter').value;
  const inter=INTER[interKey];

  const c_layer=phase==='2H'?info.c2H/2:phase==='3R'?(info.c3R||info.c2H*1.5)/3:phase==='1Tp'?(info.c1Tp||info.c1T*2)/(info.nlc||2):info.c1T;
  const aEff=phase==='1Tp'?(info.a1Tp||info.a):info.a;
  const bEff=phase==='1Tp'?(info.b1Tp||info.a):info.a;
  const r_inp=a/S3;
  const d_xm=info.dxm||Math.sqrt(Math.max(bond*bond-r_inp*r_inp,0.1));
  const sandwich=2*d_xm;
  const normalGap=c_layer-sandwich;
  const effExpansion=Math.max(expansion, inter.minGap);
  const expandedGap=normalGap*effExpansion;
  const layerStep=sandwich+expandedGap;

  // Update gap slider display to show effective value
  document.getElementById('v-gap').value = effExpansion>expansion?effExpansion.toFixed(1):expansion.toFixed(1);
  // 実際の層間金属間距離（Å）を表示（左下パネルのM–M距離と一致）
  document.getElementById('v-gap-abs').value = layerStep.toFixed(3);


  // カスタム色が設定されていればMCOL/XCOLを上書き
  if(customMCol!==null) MCOL[info.m]=customMCol;
  if(customXCol!==null) XCOL[info.x]=customXCol;
  const matM=new THREE.MeshPhongMaterial({color:MCOL[info.m],shininess:80,specular:0x446688});
  const matX=new THREE.MeshPhongMaterial({color:XCOL[info.x],shininess:60,specular:0x888844});
  const matBond=new THREE.MeshPhongMaterial({color:0x8abbdd,transparent:true,opacity:0.55});
  const scaleM=parseFloat(document.getElementById('sl-atom-m').value)||1.0;
  const scaleX=parseFloat(document.getElementById('sl-atom-x').value)||1.0;
  const scaleI=parseFloat(document.getElementById('sl-atom-i').value)||1.0;
  const bondScale=parseFloat(document.getElementById('sl-bond-r').value)||1.0;
  const geoM=new THREE.SphereGeometry(0.45*scaleM,24,24);
  const geoX=new THREE.SphereGeometry(0.36*scaleX,20,20);

  const Na=parseInt(document.getElementById('sl-na').value);
  const Nb=parseInt(document.getElementById('sl-nb').value);
  const mAtoms=[], xAtoms=[];

  for(let l=0;l<numLayers;l++){
    const yC=l*layerStep+d_xm;
    for(let i=-1;i<=Na;i++) for(let j=-1;j<=Nb;j++){
      if(phase==='1T'){
        const[mx,mz]=fracToXZ(i,j,a); mAtoms.push(new THREE.Vector3(mx,yC,mz));
        const[xtx,xtz]=fracToXZ(i+1/3,j+2/3,a); xAtoms.push(new THREE.Vector3(xtx,yC+d_xm,xtz));
        const[xbx,xbz]=fracToXZ(i+2/3,j+1/3,a); xAtoms.push(new THREE.Vector3(xbx,yC-d_xm,xbz));
      } else if(phase==='1Tp'){
        const aU=aEff||(a*S3); const bU=bEff||a;
        const baseX=i*aU; const baseZ=j*bU;
        const dimerD=info.dimerD||2.85;
        if(info.triclinic){
          // Triclinic (ReS₂/ReSe₂): cell area ≈ 4× hexagonal → 4 M + 8 X per cell
          // Two 1T'-like dimer motifs stacked along b, connected by M-X bonds
          const bH=bU/2; // effective b per motif (≈ a_hex)
          for(let mm=0;mm<2;mm++){
            const zOff=mm*bH;
            const d0=Math.sqrt(aU*aU/4+bH*bH/4);
            const delta=(d0-dimerD)/2;
            const ux=(aU/2)/d0, uz=(bH/2)/d0;
            mAtoms.push(new THREE.Vector3(baseX+delta*ux, yC, baseZ+zOff+delta*uz));
            mAtoms.push(new THREE.Vector3(baseX+aU/2-delta*ux, yC, baseZ+zOff+bH/2-delta*uz));
            xAtoms.push(new THREE.Vector3(baseX+aU/6, yC+d_xm, baseZ+zOff+bH/2));
            xAtoms.push(new THREE.Vector3(baseX+2*aU/3, yC+d_xm, baseZ+zOff));
            xAtoms.push(new THREE.Vector3(baseX+aU/3, yC-d_xm, baseZ+zOff));
            xAtoms.push(new THREE.Vector3(baseX+5*aU/6, yC-d_xm, baseZ+zOff+bH/2));
          }
        } else {
          // Standard 1T' (P2₁/m): monoclinic cell with 2 M + 4 X per layer
          // Derived from hex 1T → monoclinic transformation:
          //   a_mono ≈ √3 × a_hex, b_mono ≈ a_hex
          // Undistorted positions: M1:(0,0) M2:(1/2,1/2)
          //   X_top1:(1/6,1/2) X_bot1:(1/3,0) X_top2:(2/3,0) X_bot2:(5/6,1/2)
          const d0=Math.sqrt(aU*aU/4+bU*bU/4);
          const delta=(d0-dimerD)/2;
          const ux=(aU/2)/d0, uz=(bU/2)/d0;
          mAtoms.push(new THREE.Vector3(baseX+delta*ux, yC, baseZ+delta*uz));
          mAtoms.push(new THREE.Vector3(baseX+aU/2-delta*ux, yC, baseZ+bU/2-delta*uz));
          xAtoms.push(new THREE.Vector3(baseX+aU/6, yC+d_xm, baseZ+bU/2));
          xAtoms.push(new THREE.Vector3(baseX+2*aU/3, yC+d_xm, baseZ));
          xAtoms.push(new THREE.Vector3(baseX+aU/3, yC-d_xm, baseZ));
          xAtoms.push(new THREE.Vector3(baseX+5*aU/6, yC-d_xm, baseZ+bU/2));
        }
      } else if(phase==='3R'){
        // 3R: same trigonal prismatic as 2H but with ABC stacking
        // Each layer shifted by (1/3, 1/3) in fractional coords → translational, not rotational
        const shift=l%3; // 0,1,2 → A,B,C
        const mf1=(1/3+shift/3)%1, mf2=(2/3+shift/3)%1;
        const xf1=(2/3+shift/3)%1, xf2=(1/3+shift/3)%1;
        const[mx,mz]=fracToXZ(i+mf1,j+mf2,a); mAtoms.push(new THREE.Vector3(mx,yC,mz));
        const[xx,xz]=fracToXZ(i+xf1,j+xf2,a);
        xAtoms.push(new THREE.Vector3(xx,yC+d_xm,xz));
        xAtoms.push(new THREE.Vector3(xx,yC-d_xm,xz));
      } else {
        // 2H: AB stacking trigonal prismatic
        const mf=l%2===0?[1/3,2/3]:[2/3,1/3], xf=l%2===0?[2/3,1/3]:[1/3,2/3];
        const[mx,mz]=fracToXZ(i+mf[0],j+mf[1],a); mAtoms.push(new THREE.Vector3(mx,yC,mz));
        const[xx,xz]=fracToXZ(i+xf[0],j+xf[1],a);
        xAtoms.push(new THREE.Vector3(xx,yC+d_xm,xz));
        xAtoms.push(new THREE.Vector3(xx,yC-d_xm,xz));
      }
    }
  }

  // Bounding box
  const pad=0.5;
  let dXMin,dXMax,dZMin,dZMax;
  if(phase==='1Tp'){
    const aU=aEff||a*2, bU=bEff||a;
    dXMin=-aU*0.5-pad; dXMax=Na*aU+pad;
    dZMin=-pad; dZMax=Nb*bU+pad;
  } else {
    const[x0]=fracToXZ(0,0,a),[xNa]=fracToXZ(Na,0,a),[,zNb]=fracToXZ(0,Nb,a),[xNmin]=fracToXZ(0,Nb,a);
    dXMin=Math.min(x0,xNmin)-pad; dXMax=xNa+pad; dZMin=-pad; dZMax=zNb+pad;
  }
  const inB=p=>p.x>=dXMin&&p.x<=dXMax&&p.z>=dZMin&&p.z<=dZMax;

  const cx=(dXMin+dXMax)/2, cy=((numLayers-1)*layerStep+sandwich)/2, cz=(dZMin+dZMax)/2;
  const off=new THREE.Vector3(-cx,-cy,-cz);

  const visM=mAtoms.filter(inB), visX=xAtoms.filter(inB);
  visM.forEach(p=>{const m=new THREE.Mesh(geoM,matM);m.position.copy(p).add(off);m.userData={isAtom:true,el:info.m};structGroup.add(m);});
  visX.forEach(p=>{const m=new THREE.Mesh(geoX,matX);m.position.copy(p).add(off);m.userData={isAtom:true,el:info.x};structGroup.add(m);});

  // Metal-Metal bonds for 1T' (zigzag chains)
  if(phase==='1Tp'){
    const mmCut=(info.dimerD||2.85)+0.3;
    const mmCut2=mmCut*mmCut;
    const matMM=new THREE.MeshPhongMaterial({color:0xff6644,transparent:true,opacity:0.7});
    for(let i=0;i<visM.length;i++){
      for(let j=i+1;j<visM.length;j++){
        const d2=visM[i].distanceToSquared(visM[j]);
        if(d2>0.01&&d2<mmCut2){
          const c=makeCyl(visM[i].clone().add(off),visM[j].clone().add(off),0.08*bondScale,matMM);
          if(c)structGroup.add(c);
        }
      }
    }
  }

  // Bonds
  const bCut=bond+0.2, bCut2=bCut*bCut;
  visM.forEach(mp=>{
    const nb=[];
    visX.forEach(xp=>{
      const d2=mp.distanceToSquared(xp);
      if(d2>0.01&&d2<bCut2){
        const c=makeCyl(mp.clone().add(off),xp.clone().add(off),0.06*bondScale,matBond);
        if(c)structGroup.add(c);
        nb.push(xp.clone().add(off));
      }
    });
    // Polyhedra
    if(showPoly&&nb.length>=6){
      const mPos=mp.clone().add(off);
      const srt=(arr)=>arr.sort((a,b)=>Math.atan2(a.z-mPos.z,a.x-mPos.x)-Math.atan2(b.z-mPos.z,b.x-mPos.x));
      const top3=srt(nb.filter(n=>n.y>mPos.y)).slice(0,3);
      const bot3=srt(nb.filter(n=>n.y<mPos.y)).slice(0,3);
      if(top3.length===3&&bot3.length===3){
        const fv=[],ev=[];
        fv.push(top3[0].x,top3[0].y,top3[0].z,top3[1].x,top3[1].y,top3[1].z,top3[2].x,top3[2].y,top3[2].z);
        fv.push(bot3[0].x,bot3[0].y,bot3[0].z,bot3[2].x,bot3[2].y,bot3[2].z,bot3[1].x,bot3[1].y,bot3[1].z);
        for(let ti=0;ti<3;ti++){
          const tni=(ti+1)%3;
          if(phase==='1T'||phase==='1Tp'){
            let bj=0,bd=Infinity;
            for(let k=0;k<3;k++){const d=top3[ti].distanceTo(bot3[k])+top3[tni].distanceTo(bot3[k]);if(d<bd){bd=d;bj=k;}}
            fv.push(top3[ti].x,top3[ti].y,top3[ti].z,top3[tni].x,top3[tni].y,top3[tni].z,bot3[bj].x,bot3[bj].y,bot3[bj].z);
            const bnj=(bj+2)%3;
            fv.push(top3[ti].x,top3[ti].y,top3[ti].z,bot3[bj].x,bot3[bj].y,bot3[bj].z,bot3[bnj].x,bot3[bnj].y,bot3[bnj].z);
          } else {
            let bo=0,bd=Infinity;
            for(let o=0;o<3;o++){let d=0;for(let k=0;k<3;k++)d+=top3[k].distanceTo(bot3[(k+o)%3]);if(d<bd){bd=d;bo=o;}}
            const bi=(ti+bo)%3,bni=(tni+bo)%3;
            fv.push(top3[ti].x,top3[ti].y,top3[ti].z,top3[tni].x,top3[tni].y,top3[tni].z,bot3[bi].x,bot3[bi].y,bot3[bi].z);
            fv.push(top3[tni].x,top3[tni].y,top3[tni].z,bot3[bni].x,bot3[bni].y,bot3[bni].z,bot3[bi].x,bot3[bi].y,bot3[bi].z);
          }
        }
        const pcol=(phase==='1T'||phase==='1Tp')?0x3399ff:0x33cc88;
        const fg=new THREE.BufferGeometry();fg.setAttribute('position',new THREE.Float32BufferAttribute(fv,3));fg.computeVertexNormals();
        structGroup.add(new THREE.Mesh(fg,new THREE.MeshBasicMaterial({color:pcol,transparent:true,opacity:0.07,side:THREE.DoubleSide,depthWrite:false})));
        for(let i=0;i<3;i++){
          ev.push(top3[i].x,top3[i].y,top3[i].z,top3[(i+1)%3].x,top3[(i+1)%3].y,top3[(i+1)%3].z);
          ev.push(bot3[i].x,bot3[i].y,bot3[i].z,bot3[(i+1)%3].x,bot3[(i+1)%3].y,bot3[(i+1)%3].z);
        }
        for(let ti=0;ti<3;ti++)for(let bi=0;bi<3;bi++){
          if(top3[ti].distanceTo(bot3[bi])<bond*1.1)
            ev.push(top3[ti].x,top3[ti].y,top3[ti].z,bot3[bi].x,bot3[bi].y,bot3[bi].z);
        }
        const eg=new THREE.BufferGeometry();eg.setAttribute('position',new THREE.Float32BufferAttribute(ev,3));
        structGroup.add(new THREE.LineSegments(eg,new THREE.LineBasicMaterial({color:pcol,transparent:true,opacity:0.2})));
      }
    }
  });

  // ===================== Intercalant molecules =====================
  // 層間圧縮モデル:
  //   層間ギャップが分子の自由高さより小さい場合、
  //   結合長を保存しつつ分子を扁平に変形させる
  //   (c軸方向を圧縮、ab面方向に展開 → パンケーキ型変形)
  //   圧縮率 f_c = gap / mol_height (f_c ≤ 1)
  //   結合長保存: 各結合について dy を f_c 倍に縮め、
  //   dx,dz を sqrt((L²-dy'²)/(dx²+dz²)) でスケールして L を維持
  if(interKey!=='none'){
    const matIBond=new THREE.MeshPhongMaterial({color:0xaaaaaa,transparent:true,opacity:0.6});
    const sp=inter.spacing;

    // --- 1) 3軸回転行列を構築 (ループ外で1回) ---
    const rA=parseFloat(document.getElementById('sl-rot-a').value)*Math.PI/180;
    const rB=parseFloat(document.getElementById('sl-rot-b').value)*Math.PI/180;
    const rC=parseFloat(document.getElementById('sl-rot-c').value)*Math.PI/180;
    const rotMat=new THREE.Matrix4().makeRotationY(rC)
      .multiply(new THREE.Matrix4().makeRotationZ(rB))
      .multiply(new THREE.Matrix4().makeRotationX(rA));

    // --- 2) 回転後の座標を計算 ---
    const rotCoords=inter.atoms.map(at=>{
      return new THREE.Vector3(at.dx,at.dy,at.dz).applyMatrix4(rotMat);
    });

    // --- 3) 層間圧縮を計算 ---
    // 回転後の分子のy方向 (c軸=層間方向) の広がり
    const yVals=rotCoords.map(v=>v.y);
    const molYmin=Math.min(...yVals), molYmax=Math.max(...yVals);
    const molHeight=molYmax-molYmin;
    // 利用可能ギャップ (vdW半径分のバッファ 1.5Å)
    const vdwBuf=1.5;
    const availGap=Math.max(0.5, expandedGap-vdwBuf);
    // 圧縮率: 1.0 = 圧縮なし (自由分子), < 1.0 = 扁平化
    const compF = molHeight>0.1 ? Math.min(1.0, availGap/molHeight) : 1.0;

    // --- 4) 結合長保存型の圧縮座標を計算 ---
    // まず単純圧縮 (dy *= compF) した座標を作成
    const compCoords=rotCoords.map(v=>new THREE.Vector3(v.x, v.y*compF, v.z));

    // 結合長を保存するために反復的に補正 (3回イテレーション)
    if(compF<0.999 && inter.bonds && inter.bonds.length>0){
      // 元の結合長を記録
      const origLengths=inter.bonds.map(([ai,bi])=>{
        return rotCoords[ai].distanceTo(rotCoords[bi]);
      });
      // 反復補正: 結合長制約を満たすように座標を調整
      for(let iter=0;iter<5;iter++){
        inter.bonds.forEach(([ai,bi],bIdx)=>{
          const L=origLengths[bIdx];
          const pa=compCoords[ai], pb=compCoords[bi];
          const dx=pb.x-pa.x, dy=pb.y-pa.y, dz=pb.z-pa.z;
          const curL=Math.sqrt(dx*dx+dy*dy+dz*dz);
          if(curL<0.01) return;
          // 結合長の差分
          const scale=L/curL;
          // 中心を保ちつつ両端を移動
          const cx=(pa.x+pb.x)/2, cy=(pa.y+pb.y)/2, cz=(pa.z+pb.z)/2;
          // dy方向は圧縮を維持しつつ、dx,dz方向で結合長を補正
          const dyNew=dy; // y方向は変えない (層間圧縮を維持)
          const latSq=dx*dx+dz*dz;
          const needLatSq=L*L-dyNew*dyNew;
          if(needLatSq>0 && latSq>0.001){
            const latScale=Math.sqrt(needLatSq/latSq);
            const dxNew=dx*latScale, dzNew=dz*latScale;
            pa.x=cx-dxNew/2; pa.z=cz-dzNew/2;
            pb.x=cx+dxNew/2; pb.z=cz+dzNew/2;
            pa.y=cy-dyNew/2; pb.y=cy+dyNew/2;
          } else if(needLatSq<=0){
            // 結合が完全に水平になれない → dyを少し緩和
            const newDy=Math.sign(dy)*L*0.95;
            const remLat=Math.sqrt(Math.max(0,L*L-newDy*newDy));
            const latDir=latSq>0.001?Math.sqrt(latSq):1;
            pa.x=cx-(dx/latDir)*remLat/2; pa.z=cz-(dz/latDir)*remLat/2;
            pb.x=cx+(dx/latDir)*remLat/2; pb.z=cz+(dz/latDir)*remLat/2;
            pa.y=cy-newDy/2; pb.y=cy+newDy/2;
          }
        });
      }
    }

    // 圧縮後の重心 (centroid) でセンタリング
    // parseCIFで重心=0に設定済み → 回転・圧縮で保存されるが、
    // 結合長保存の反復で微小ドリフトする可能性があるため再計算
    const compCenterY=compCoords.reduce((s,v)=>s+v.y,0)/compCoords.length;
    compCoords.forEach(v=>v.y-=compCenterY);

    // 情報パネル用に圧縮率を保存
    window._lastCompF = compF;

    // --- 5) 各ギャップに分子を配置 (中心寄せ) ---
    // 配置候補を生成してから中心に最も近い順に配置
    // 配置格子をスーパーセル中心に対称配置
    const numI=Math.max(1, Math.floor(Na/sp));
    const numJ=Math.max(1, Math.floor(Nb/sp));
    const offI=(Na-(numI-1)*sp)/2;  // 中心に対称なオフセット
    const offJ=(Nb-(numJ-1)*sp)/2;
    const placePts=[];
    for(let ni=0;ni<numI;ni++) for(let nj=0;nj<numJ;nj++){
      const fi=offI+ni*sp, fj=offJ+nj*sp;
      const[bx,bz]=fracToXZ(fi,fj,a);
      if(bx<dXMin||bx>dXMax||bz<dZMin||bz>dZMax) continue;
      placePts.push({bx,bz});
    }
    // 配置点がなければスーパーセル中心に1つ配置
    if(placePts.length===0){
      const[cbx,cbz]=fracToXZ(Na/2,Nb/2,a);
      placePts.push({bx:cbx,bz:cbz});
    }

    for(let l=0;l<numLayers-1;l++){
      // ギャップ中心 = 層lの上部カルコゲンと層l+1の下部カルコゲンの中間
      const topOfLayerL = l*layerStep + sandwich;
      const botOfLayerU = (l+1)*layerStep;
      const gapCenterY = (topOfLayerL + botOfLayerU) / 2;

      for(let pi=0;pi<placePts.length;pi++){
        const{bx,bz}=placePts[pi];

        compCoords.forEach((rv,idx)=>{
          const at=inter.atoms[idx];
          const geo=new THREE.SphereGeometry(at.r*scaleI,16,16);
          const mat=new THREE.MeshPhongMaterial({color:at.color,shininess:60});
          const mesh=new THREE.Mesh(geo,mat);
          mesh.position.set(bx+rv.x+off.x+interOffset.dx, gapCenterY+rv.y+off.y, bz+rv.z+off.z+interOffset.dz);
          mesh.userData={isAtom:true,el:at.el||'?',isInter:true,atomIdx:idx};
          structGroup.add(mesh);
        });

        if(inter.bonds){
          inter.bonds.forEach(([ai,bi])=>{
            const r1=compCoords[ai], r2=compCoords[bi];
            const p1=new THREE.Vector3(bx+r1.x+off.x+interOffset.dx, gapCenterY+r1.y+off.y, bz+r1.z+off.z+interOffset.dz);
            const p2=new THREE.Vector3(bx+r2.x+off.x+interOffset.dx, gapCenterY+r2.y+off.y, bz+r2.z+off.z+interOffset.dz);
            const c=makeCyl(p1,p2,0.05*bondScale,matIBond);
            if(c){c.userData={isInter:true};structGroup.add(c);}
          });
        }
      }
    }
  }

  // Unit cell
  if(showCell){
    const matL=new THREE.LineBasicMaterial({color:0x58a6ff,transparent:true,opacity:0.3});
    const p0=fracToXZ(0,0,a),p1=fracToXZ(1,0,a),p2=fracToXZ(1,1,a),p3=fracToXZ(0,1,a);
    const base=[[p0[0],p0[1]],[p1[0],p1[1]],[p2[0],p2[1]],[p3[0],p3[1]]];
    const ucH=layerStep, vts=[];
    for(let i=0;i<4;i++){
      const ni=(i+1)%4;
      vts.push(base[i][0],0,base[i][1],base[ni][0],0,base[ni][1]);
      vts.push(base[i][0],ucH,base[i][1],base[ni][0],ucH,base[ni][1]);
      vts.push(base[i][0],0,base[i][1],base[i][0],ucH,base[i][1]);
    }
    const lg=new THREE.BufferGeometry();
    lg.setAttribute('position',new THREE.Float32BufferAttribute(vts.map((v,i)=>i%3===0?v+off.x:i%3===1?v+off.y:v+off.z),3));
    structGroup.add(new THREE.LineSegments(lg,matL));
  }

  // ===================== 層間金属距離の自動表示 (UIパネル) =====================
  const showDist=document.getElementById('chk-dist').checked;
  const ildPanel=document.getElementById('ilayer-dist-panel');
  if(showDist && numLayers>=2){
    const layerYs=[];
    for(let l=0;l<numLayers;l++) layerYs.push(l*layerStep+d_xm);
    const layerMetals=layerYs.map(yTarget=>{
      let best=null, bestX=Infinity;
      visM.forEach(p=>{
        if(Math.abs(p.y-yTarget)<0.1 && p.x<bestX){bestX=p.x;best=p;}
      });
      return best;
    }).filter(p=>p!==null);

    if(layerMetals.length>=2){
      let panelHTML=`<div class="ild-title">層間 ${info.m}–${info.m} 距離</div>`;
      for(let l=0;l<layerMetals.length-1;l++){
        const dist=layerMetals[l].distanceTo(layerMetals[l+1]);
        panelHTML+=`<div class="ild-row">L${l+1}–L${l+2}: <span style="color:#ffcc44;font-weight:bold">${dist.toFixed(3)} Å</span></div>`;
      }
      ildPanel.innerHTML=panelHTML;
      ildPanel.style.display='block';
    } else {
      ildPanel.style.display='none';
    }
  } else {
    ildPanel.style.display='none';
  }

  updateInfo(info,phase,c_layer,d_xm,normalGap,bond,interKey,effExpansion);
  updateLegend(info,interKey);

  // カメラを構造全体が収まるように自動調整（構造サイズ変更時のみ）
  const structW=(dXMax-dXMin), structH=numLayers*layerStep, structD=(dZMax-dZMin);
  const fitKey=numLayers+'_'+Na+'_'+Nb+'_'+curMat+'_'+curPhase+'_'+effExpansion.toFixed(2);
  if(fitKey!==buildStructure._lastFitKey){
    buildStructure._lastFitKey=fitKey;
    const fitRadius=Math.max(structW, structH, structD)*0.85+5;
    sph.radius=Math.max(8,Math.min(80,fitRadius));
    updateCam();
  }
}

// =====================================================
//  Info / Legend
// =====================================================
function updateInfo(info,phase,cL,dxm,gap,bond,interKey,effExp) {
  let sg,pt,cd;
  if(phase==='1Tp'&&info.triclinic){
    sg='P-1 (No.2)'; pt='歪み八面体 (三斜晶 / Re₄クラスター)'; cd='歪み八面体 (6配位)';
  } else if(phase==='1Tp'&&info.beta===90.0){
    sg='Pmn2₁ (No.31, Td型)'; pt='歪み八面体 (直方晶 Td)'; cd='歪み八面体 (6配位)';
  } else {
    const sgMap={'1T':'P-3m1 (No.164)','2H':'P6₃/mmc (No.194)','1Tp':'P2₁/m (No.11)','3R':'R3m (No.160)'};
    const ptMap={'1T':'CdI₂型 (八面体)','2H':'MoS₂型 (三角柱)','1Tp':'歪み八面体 (ジグザグ鎖)','3R':'菱面体 (三角柱 ABC積層)'};
    const cdMap={'1T':'八面体 (6配位)','2H':'三角柱 (6配位)','1Tp':'歪み八面体 (6配位)','3R':'三角柱 (6配位)'};
    sg=sgMap[phase]||sgMap['1T']; pt=ptMap[phase]||ptMap['1T']; cd=cdMap[phase]||cdMap['1T'];
  }
  const cf=phase==='2H'?info.c2H:phase==='3R'?(info.c3R||info.c2H*1.5):phase==='1Tp'?(info.c1Tp||info.c1T*2):info.c1T;
  const f=info.m+info.x+'₂';
  let lattice='';
  if(phase==='1Tp'){
    const aU=info.a1Tp||info.a*2, bU=info.b1Tp||info.a;
    lattice=`a = ${aU.toFixed(3)} Å, b = ${bU.toFixed(3)} Å, c = ${cf.toFixed(2)} Å`;
    if(info.triclinic){
      lattice+=`<br>α = ${info.alpha||90}°, β = ${info.beta||90}°, γ = ${info.gamma||90}°`;
    } else if(info.beta){
      lattice+=`, β = ${info.beta}°`;
    }
  } else {
    lattice=`a = ${info.a.toFixed(3)} Å, c = ${cf.toFixed(2)} Å`;
  }
  let html=`<strong>${f} — ${phase==='1Tp'?"1T'":phase}</strong><br>`+
    `空間群: <span class="hl">${sg}</span><br>構造型: ${pt}<br>`+
    `${lattice}<br>`+
    `${info.m}–${info.x} 結合長: <span class="hl">${bond.toFixed(2)} Å</span><br>`+
    `配位: ${cd}<br>層間 (vdW gap): ${gap.toFixed(2)} Å`;
  if(phase==='1Tp'&&info.dimerD){
    html+=`<br>${info.m}–${info.m} ダイマー距離: <span class="hl">${info.dimerD.toFixed(2)} Å</span>`;
  }
  if(interKey!=='none'){
    const inter=INTER[interKey];
    html+=`<br><span class="hl">挿入: ${inter.name}</span>`;
    if(effExp>1) html+=` (${effExp.toFixed(1)}× 拡大)`;
    const cf2=window._lastCompF||1;
    if(cf2<0.999) html+=`<br><span style="color:#ff8844">層間圧縮: ${(cf2*100).toFixed(0)}% (${cf2<0.5?'強圧縮':cf2<0.8?'中圧縮':'弱圧縮'})</span>`;
  }
  const wyckoffMap={
    '1T':`Wyckoff: ${info.m} 1a(0,0,0), ${info.x} 2d(⅓,⅔,±z)`,
    '2H':`Wyckoff: ${info.m} 2c(⅓,⅔,¼), ${info.x} 4f(⅔,⅓,z)`,
    '1Tp':`Wyckoff: ${info.m} 2e(x,¼,z), ${info.x} 4f(x,y,z)`,
    '3R':`Wyckoff: ${info.m} 3a(0,0,z), ${info.x} 6c(x,x̄,z)`
  };
  html+=`<br><span style="color:#555;font-size:.68rem">${wyckoffMap[phase]||''}</span>`;
  document.getElementById('info').innerHTML=html;
}

const MNAME={V:'バナジウム',Ti:'チタン',Mo:'モリブデン',W:'タングステン',Nb:'ニオブ',Ta:'タンタル',Pt:'白金',Zr:'ジルコニウム',Re:'レニウム'};
const XNAME={S:'硫黄',Se:'セレン',Te:'テルル'};

  document.getElementById('leg-x').style.background='#'+XCOL[info.x].toString(16).padStart(6,'0');

}

let viewLocked=false;
const viewBtns=()=>document.querySelectorAll('.view-btn');
function setView(dir) {
  viewBtns().forEach(b=>b.classList.remove('active'));
  viewBtns().forEach(b=>{if(b.dataset.dir===dir)b.classList.add('active');});

  if(dir==='free'){viewLocked=false;sph.theta=Math.PI*0.3;sph.phi=Math.PI*0.35;structGroup.rotation.y=0;updateCam();return;}
  viewLocked=true; structGroup.rotation.y=0;

  // Crystallographic axes: a→scene X, b→scene Z, c→scene Y
  if(dir==='x'){      // View along a-axis (from +X)
    sph.theta=0; sph.phi=Math.PI/2;
  } else if(dir==='y'){ // View along b-axis (from +Z)
    sph.theta=Math.PI/2; sph.phi=Math.PI/2;
  } else if(dir==='z'){ // View along c-axis (top-down, from +Y) rotated 90° for landscape
    sph.theta=Math.PI/2; sph.phi=0.001;
  }
  updateCam();
}

let isDrag=false, prev={x:0,y:0};
let sph={theta:Math.PI*0.3,phi:Math.PI*0.35,radius:20};

function updateCam(){
  const{radius:r,theta:t,phi:p}=sph;
  const pos=new THREE.Vector3(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
  perspCamera.position.copy(pos); perspCamera.lookAt(0,0,0);
  orthoCamera.position.copy(pos); orthoCamera.lookAt(0,0,0);
  const oSz=sph.radius*0.6, asp=window.innerWidth/window.innerHeight;
  orthoCamera.left=-oSz*asp;orthoCamera.right=oSz*asp;orthoCamera.top=oSz;orthoCamera.bottom=-oSz;
  orthoCamera.updateProjectionMatrix();
}
updateCam();

canvas.addEventListener('pointerdown',e=>{isDrag=true;prev={x:e.clientX,y:e.clientY};});
window.addEventListener('pointerup',()=>isDrag=false);
window.addEventListener('pointermove',e=>{
  if(!isDrag)return;
  if(viewLocked){viewLocked=false;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));}
  sph.theta-=(e.clientX-prev.x)*0.007;
  sph.phi=Math.max(0.1,Math.min(Math.PI-0.1,sph.phi+(e.clientY-prev.y)*0.007));
  prev={x:e.clientX,y:e.clientY};updateCam();
});
canvas.addEventListener('wheel',e=>{e.preventDefault();sph.radius=Math.max(5,Math.min(80,sph.radius+e.deltaY*0.015));updateCam();},{passive:false});

let tDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDrag=true;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tDist=Math.sqrt(dx*dx+dy*dy);}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDrag){sph.theta-=(e.touches[0].clientX-prev.x)*0.007;sph.phi=Math.max(0.1,Math.min(Math.PI-0.1,sph.phi+(e.touches[0].clientY-prev.y)*0.007));prev={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCam();}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);sph.radius=Math.max(5,Math.min(80,sph.radius-(d-tDist)*0.03));tDist=d;updateCam();}
},{passive:false});
canvas.addEventListener('touchend',()=>isDrag=false);

// =====================================================
//  Atom Selection & Click Mode Handler
// =====================================================
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let selAtoms=[];  // [{mesh, origMat}]
let distLine=null, distLabelEl=document.getElementById('dist-label');
const SEL_MAT=new THREE.MeshPhongMaterial({color:0xffee44,emissive:0x886600,shininess:120});
const TETRA_CENTER_MAT=new THREE.MeshPhongMaterial({color:0xff4488,emissive:0x882244,shininess:120});

function clearSelection(){
  selAtoms.forEach(s=>{if(s.mesh.parent) s.mesh.material=s.origMat;});
  selAtoms=[];
  if(distLine){scene.remove(distLine);distLine=null;}
  distLabelEl.style.display='none';
  if(clickMode==='tetra'){tetraState={step:0,centerIdx:-1,corners:[],meshes:[]};updateModeStatus();}
}

function updateDistLabel(){
  if(selAtoms.length<2||!distLine) return;
  const p1=selAtoms[0].mesh.position, p2=selAtoms[1].mesh.position;
  const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
  mid.project(camera);
  distLabelEl.style.left=((mid.x*0.5+0.5)*window.innerWidth)+'px';
  distLabelEl.style.top=((-mid.y*0.5+0.5)*window.innerHeight)+'px';
}

function selectAtom(mesh){
  const entry={mesh, origMat:mesh.material};
  selAtoms.push(entry);
  mesh.material=SEL_MAT;
  return entry;
}

// ドラッグと区別するためのクリック判定（スマホはタッチのずれが大きいので閾値を広めに）
let clickStart={x:0,y:0,t:0};
const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0;
const CLICK_DIST_THRESH=isTouchDevice?15:5;
const CLICK_TIME_THRESH=isTouchDevice?500:300;
canvas.addEventListener('pointerdown',e=>{clickStart={x:e.clientX,y:e.clientY,t:Date.now()};});
canvas.addEventListener('pointerup',e=>{
  const dx=e.clientX-clickStart.x, dy=e.clientY-clickStart.y;
  if(Math.sqrt(dx*dx+dy*dy)>CLICK_DIST_THRESH || Date.now()-clickStart.t>CLICK_TIME_THRESH) return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(structGroup.children,false);
  const atomHit=hits.find(h=>h.object.userData&&h.object.userData.isAtom);

  // === 距離モード ===
  if(clickMode==='dist'){
    if(!atomHit){clearSelection();return;}
    const mesh=atomHit.object;
    if(selAtoms.some(s=>s.mesh===mesh)){clearSelection();return;}
    if(selAtoms.length>=2) clearSelection();
    selectAtom(mesh);
    if(selAtoms.length===2){
      const p1=selAtoms[0].mesh.position, p2=selAtoms[1].mesh.position;
      const dist=p1.distanceTo(p2);
      const lg=new THREE.BufferGeometry().setFromPoints([p1,p2]);
      distLine=new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xffcc44,linewidth:2,transparent:true,opacity:0.8}));
      scene.add(distLine);
      const el1=selAtoms[0].mesh.userData.el, el2=selAtoms[1].mesh.userData.el;
      distLabelEl.textContent=`${el1}–${el2}: ${dist.toFixed(3)} Å`;
      distLabelEl.style.display='block';
      updateDistLabel();
    }
    return;
  }

  // === 移動モード ===
  if(clickMode==='move'){
    if(!atomHit){clearSelection();return;}
    const mesh=atomHit.object;
    if(selAtoms.some(s=>s.mesh===mesh)){clearSelection();return;}
    if(selAtoms.length>=2) clearSelection();
    selectAtom(mesh);
    if(selAtoms.length===2){
      const ud0=selAtoms[0].mesh.userData, ud1=selAtoms[1].mesh.userData;
      const isI0=!!ud0.isInter, isI1=!!ud1.isInter;
      if(isI0===isI1){
        // 両方同じ種類 → 距離表示だけ
        const p1=selAtoms[0].mesh.position, p2=selAtoms[1].mesh.position;
        distLabelEl.textContent=`${ud0.el}–${ud1.el}: ${p1.distanceTo(p2).toFixed(3)} Å`;
        distLabelEl.style.display='block';
        const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
        mid.project(camera);
        distLabelEl.style.left=((mid.x*0.5+0.5)*window.innerWidth)+'px';
        distLabelEl.style.top=((-mid.y*0.5+0.5)*window.innerHeight)+'px';
        return;
      }
      // 挿入分子原子 + 層原子 → XZ平面移動
      const iSel=isI0?selAtoms[0]:selAtoms[1];
      const mSel=isI0?selAtoms[1]:selAtoms[0];
      const dxS=mSel.mesh.position.x-iSel.mesh.position.x;
      const dzS=mSel.mesh.position.z-iSel.mesh.position.z;
      interOffset.dx+=dxS;
      interOffset.dz+=dzS;
      clearSelection();
      buildStructure();
    }
    return;
  }

  // === 四面体モード ===
  if(clickMode==='tetra'){
    if(!atomHit){clearSelection();return;}
    const mesh=atomHit.object;
    const ud=mesh.userData;

    if(tetraState.step===0){
      // Step 0: 中心原子を選択（挿入分子のみ）
      if(!ud.isInter){distLabelEl.textContent='挿入分子の原子を選択してください';distLabelEl.style.display='block';
        setTimeout(()=>distLabelEl.style.display='none',1500);return;}
      clearSelection();
      tetraState.centerIdx=ud.atomIdx;
      const entry={mesh,origMat:mesh.material};
      selAtoms.push(entry);
      mesh.material=TETRA_CENTER_MAT;
      tetraState.meshes=[entry];
      tetraState.step=1;
      updateModeStatus();
      return;
    }

    if(tetraState.step>=1 && tetraState.step<=3){
      // Step 1-3: 結合先3原子を選択（挿入分子のみ）
      if(!ud.isInter){distLabelEl.textContent='挿入分子の原子を選択してください';distLabelEl.style.display='block';
        setTimeout(()=>distLabelEl.style.display='none',1500);return;}
      if(ud.atomIdx===tetraState.centerIdx) return;
      if(tetraState.corners.includes(ud.atomIdx)) return;
      tetraState.corners.push(ud.atomIdx);
      const entry={mesh,origMat:mesh.material};
      selAtoms.push(entry);
      mesh.material=SEL_MAT;
      tetraState.meshes.push(entry);
      tetraState.step++;
      updateModeStatus();
      return;
    }

    if(tetraState.step===4){
      // Step 4: TMD金属原子を選択（層の原子のみ）
      if(ud.isInter){distLabelEl.textContent='TMDの原子を選択してください';distLabelEl.style.display='block';
        setTimeout(()=>distLabelEl.style.display='none',1500);return;}
      const entry={mesh,origMat:mesh.material};
      selAtoms.push(entry);
      mesh.material=SEL_MAT;
      // 四面体配位を実行
      runTetraAlign(tetraState.centerIdx, tetraState.corners, mesh.position.clone());
      clearSelection();
      return;
    }
  }
});

// =====================================================
//  四面体配位 回転+移動
//  centerIdx: 中心原子の挿入分子内インデックス
//  cornerIdxs: 結合先3原子のインデックス配列
//  metalWorldPos: TMD原子のワールド座標
// =====================================================
function runTetraAlign(centerIdx, cornerIdxs, metalWorldPos){
  const interKey=document.getElementById('sel-inter').value;
  if(interKey==='none') return;
  const inter=INTER[interKey];
  if(!inter||!inter.atoms) return;

  const atoms=inter.atoms;
  const cAt=atoms[centerIdx];
  const cPos=new THREE.Vector3(cAt.dx,cAt.dy,cAt.dz);

  // 中心→結合先の単位ベクトル（未回転座標系）
  const dirs=cornerIdxs.map(ci=>{
    const a=atoms[ci];
    const v=new THREE.Vector3(a.dx-cAt.dx,a.dy-cAt.dy,a.dz-cAt.dz);
    v.normalize();
    return v;
  });

  // 第4方向 = -normalize(v1+v2+v3) （ローンペア方向）
  const sum=new THREE.Vector3();
  dirs.forEach(d=>sum.add(d));
  const d4=sum.negate().normalize();

  // ターゲット方向: 中心原子からTMD原子への方向
  // XZ移動後は真上/真下になるので、Y方向の符号で判定
  // まず現在の分子ギャップ中心Y座標を推定（中心原子のワールドY付近）
  // 金属が上にあれば(0,1,0)、下なら(0,-1,0)
  const interMeshes=[];
  structGroup.children.forEach(c=>{if(c.userData&&c.userData.isInter&&c.userData.atomIdx===centerIdx) interMeshes.push(c);});
  let centerWorldY=0;
  if(interMeshes.length>0) centerWorldY=interMeshes[0].position.y;
  const targetY=metalWorldPos.y>centerWorldY?1:-1;

  // グリッドサーチ: d4をRy(C)*Rz(B)*Rx(A)で回転し、Y成分が最大/最小になる角度を探す
  const deg=Math.PI/180;
  let bestA=0,bestB=0,bestC=0,bestDot=-Infinity;

  function rotD4y(rA,rB,rC){
    const ca=Math.cos(rA),sa=Math.sin(rA);
    const cb=Math.cos(rB),sb=Math.sin(rB);
    const cc=Math.cos(rC),sc=Math.sin(rC);
    let x1=d4.x, y1=ca*d4.y-sa*d4.z, z1=sa*d4.y+ca*d4.z;
    let x2=cb*x1-sb*y1, y2=sb*x1+cb*y1, z2=z1;
    let y3=y2; // Ry doesn't change y
    return y3*targetY; // maximize: dot with target
  }

  // Phase 1: coarse (15°)
  for(let a=0;a<360;a+=15) for(let b=0;b<360;b+=15) for(let c=0;c<180;c+=15){
    const dot=rotD4y(a*deg,b*deg,c*deg);
    if(dot>bestDot){bestDot=dot;bestA=a;bestB=b;bestC=c;}
  }
  // Phase 2: fine (1°)
  const r=12;
  const fA=bestA,fB=bestB,fC=bestC;
  for(let a=fA-r;a<=fA+r;a++) for(let b=fB-r;b<=fB+r;b++) for(let c=fC-r;c<=fC+r;c++){
    const dot=rotD4y(a*deg,b*deg,c*deg);
    if(dot>bestDot){bestDot=dot;bestA=a;bestB=b;bestC=c;}
  }

  // 回転スライダー更新
  const normA=((bestA%360)+360)%360, normB=((bestB%360)+360)%360, normC=((bestC%360)+360)%360;
  document.getElementById('sl-rot-a').value=normA;
  document.getElementById('v-rot-a').value=normA;
  document.getElementById('sl-rot-b').value=normB;
  document.getElementById('v-rot-b').value=normB;
  document.getElementById('sl-rot-c').value=normC;
  document.getElementById('v-rot-c').value=normC;

  // XZ移動: 回転適用後に中心原子がTMD原子のXZ上に来るようにする
  // 回転後の中心原子の相対座標を計算
  const rA2=normA*deg, rB2=normB*deg, rC2=normC*deg;
  const ca=Math.cos(rA2),sa=Math.sin(rA2);
  const cb=Math.cos(rB2),sb=Math.sin(rB2);
  const cc=Math.cos(rC2),sc=Math.sin(rC2);
  let x1=cAt.dx, y1=ca*cAt.dy-sa*cAt.dz, z1=sa*cAt.dy+ca*cAt.dz;
  let x2=cb*x1-sb*y1, y2=sb*x1+cb*y1, z2=z1;
  let x3=cc*x2+sc*z2, z3=-sc*x2+cc*z2;
  // 圧縮後のオフセットも考慮する必要があるが、近似的に回転後座標で十分
  // buildStructure内で配置される位置: bx + x3 + off.x + interOffset.dx
  // TMD原子位置: metalWorldPos.x
  // → interOffset.dx = metalWorldPos.x - (bx + x3 + off.x)
  // 配置基準点(bx, bz)は最も近い配置ポイント - 現在のオフセットをリセットして再計算

  // まずオフセットリセットして一度リビルドし、配置位置を取得
  interOffset={dx:0, dz:0};
  buildStructure();

  // リビルド後、中心原子のメッシュを探す
  let centerMesh=null;
  structGroup.children.forEach(c=>{
    if(c.userData&&c.userData.isInter&&c.userData.atomIdx===centerIdx&&!centerMesh) centerMesh=c;
  });
  if(centerMesh){
    interOffset.dx=metalWorldPos.x-centerMesh.position.x;
    interOffset.dz=metalWorldPos.z-centerMesh.position.z;
  }

  buildStructure();
  distLabelEl.textContent='四面体配位 完了';
  distLabelEl.style.display='block';
  setTimeout(()=>distLabelEl.style.display='none',2000);
}

function syncSliderToNum(slId){
  const sl=document.getElementById(slId);
  const k=slId.replace('sl-','');
  const vId=slId.startsWith('sl-rot-')?'v-rot-'+k.replace('rot-',''):'v-'+k;
  const vEl=document.getElementById(vId);
  const decIds=['sl-gap','sl-atom-m','sl-atom-x','sl-atom-i','sl-bond-r'];
  vEl.value=decIds.includes(slId)?parseFloat(sl.value).toFixed(1):sl.value;
}
function syncNumToSlider(vId){
  pushUndo();
  const vEl=document.getElementById(vId);
  let slId;
  if(vId.startsWith('v-rot-')){ slId='sl-rot-'+vId.replace('v-rot-',''); }
  else { slId='sl-'+vId.replace('v-',''); }
  const sl=document.getElementById(slId);
  let v=parseFloat(vEl.value);
  const mn=parseFloat(sl.min), mx=parseFloat(sl.max), st=parseFloat(sl.step);
  if(isNaN(v)) v=parseFloat(sl.value);
  v=Math.max(mn,Math.min(mx,Math.round(v/st)*st));
  sl.value=v;
  const decIds2=['sl-gap','sl-atom-m','sl-atom-x','sl-atom-i','sl-bond-r'];
  vEl.value=decIds2.includes(slId)?v.toFixed(1):v;
  buildStructure();
}
function stepSlider(slId, dir){
  pushUndo();
  const sl=document.getElementById(slId);
  const st=parseFloat(sl.step), mn=parseFloat(sl.min), mx=parseFloat(sl.max);
  let v=parseFloat(sl.value)+dir*st;
  v=Math.max(mn,Math.min(mx,Math.round(v/st)*st));
  sl.value=v;
  syncSliderToNum(slId);
  buildStructure();
}

// 層間距離（Å: M–M金属間距離）からの逆算入力
document.getElementById('v-gap-abs').addEventListener('change',function(){
  pushUndo();
  const targetDist=parseFloat(this.value);
  if(isNaN(targetDist)||targetDist<=0) return;
  // 現在の材料のパラメータ
  const info=DB[curMat], phase=curPhase;
  const c_layer=phase==='2H'?info.c2H/2:phase==='3R'?(info.c3R||info.c2H*1.5)/3:phase==='1Tp'?(info.c1Tp||info.c1T*2)/(info.nlc||2):info.c1T;
  const r_inp=info.a/S3;
  const d_xm=info.dxm||Math.sqrt(Math.max(info.bond*info.bond-r_inp*r_inp,0.1));
  const sandwich=2*d_xm;
  const normalGap=c_layer-sandwich;
  if(normalGap<=0) return;
  // layerStep = sandwich + normalGap * ratio → ratio = (targetDist - sandwich) / normalGap
  let ratio=(targetDist-sandwich)/normalGap;
  ratio=Math.max(1.0, Math.round(ratio*10)/10);
  const maxRatio=parseFloat(document.getElementById('sl-gap').max);
  if(ratio>maxRatio){
    document.getElementById('sl-gap').max=ratio;
    document.getElementById('v-gap').max=ratio;
  }
  document.getElementById('sl-gap').value=ratio;
  document.getElementById('v-gap').value=ratio.toFixed(1);
  buildStructure();
});

let cifCounter = 0; // カスタム分子の連番

function parseCIF(text, fileName) {
  const lines = text.split(/\r?\n/);
  let atoms = []; // {el, x, y, z}
  let cellA=1,cellB=1,cellC=1,alpha=90,beta=90,gamma=90;
  let hasFrac=false, hasCart=false;

  // 1) セルパラメータを探す
  for(const line of lines){
    const t=line.trim();
    if(t.startsWith('_cell_length_a')) cellA=parseFloat(t.split(/\s+/)[1])||1;
    if(t.startsWith('_cell_length_b')) cellB=parseFloat(t.split(/\s+/)[1])||1;
    if(t.startsWith('_cell_length_c')) cellC=parseFloat(t.split(/\s+/)[1])||1;
    if(t.startsWith('_cell_angle_alpha')) alpha=parseFloat(t.split(/\s+/)[1])||90;
    if(t.startsWith('_cell_angle_beta'))  beta =parseFloat(t.split(/\s+/)[1])||90;
    if(t.startsWith('_cell_angle_gamma')) gamma=parseFloat(t.split(/\s+/)[1])||90;
  }

  // 2) loop_ ブロックから原子座標を抽出
  let inLoop=false, headers=[], dataLines=[];
  for(let i=0;i<lines.length;i++){
    const t=lines[i].trim();
    if(t==='loop_'){
      // 新しいloopを検出 — 前のloopの処理
      if(headers.length>0 && dataLines.length>0) processLoop(headers,dataLines);
      inLoop=true; headers=[]; dataLines=[]; continue;
    }
    if(inLoop){
      if(t.startsWith('_')){ headers.push(t.split(/\s+/)[0]); }
      else if(t==='' || t.startsWith('#') || t.startsWith('loop_') || t.startsWith('data_')){
        if(headers.length>0 && dataLines.length>0) processLoop(headers,dataLines);
        inLoop = t==='loop_'; headers=[]; dataLines=[];
        if(t==='loop_') inLoop=true;
      } else { dataLines.push(t); }
    }
  }
  if(headers.length>0 && dataLines.length>0) processLoop(headers,dataLines);

  function processLoop(hdr,data){
    // _atom_site 関連のヘッダーがあるか確認
    const iLabel  = hdr.indexOf('_atom_site_label');
    const iSymbol = hdr.indexOf('_atom_site_type_symbol');
    const iFx = hdr.indexOf('_atom_site_fract_x');
    const iFy = hdr.indexOf('_atom_site_fract_y');
    const iFz = hdr.indexOf('_atom_site_fract_z');
    const iCx = hdr.indexOf('_atom_site_Cartn_x');
    const iCy = hdr.indexOf('_atom_site_Cartn_y');
    const iCz = hdr.indexOf('_atom_site_Cartn_z');

    if(iFx>=0 && iFy>=0 && iFz>=0) hasFrac=true;
    if(iCx>=0 && iCy>=0 && iCz>=0) hasCart=true;
    if(!hasFrac && !hasCart) return;

    const iEl = iSymbol>=0 ? iSymbol : iLabel;
    if(iEl<0) return;

    data.forEach(line=>{
      // CIF のフィールド分割（引用符対応）
      const cols = line.match(/'[^']*'|"[^"]*"|\S+/g);
      if(!cols || cols.length<hdr.length) return;
      let el = cols[iEl].replace(/['"]/g,'').replace(/[0-9+\-]/g,'');
      // 元素記号を正規化 (先頭大文字 + 残り小文字)
      el = el.charAt(0).toUpperCase() + el.slice(1).toLowerCase();

      let x,y,z;
      if(hasCart){
        x=parseFloat(cols[iCx]); y=parseFloat(cols[iCy]); z=parseFloat(cols[iCz]);
      } else {
        // 分率座標 → Cartesian (一般三斜晶系対応)
        const fx=parseFloat(cols[iFx]), fy=parseFloat(cols[iFy]), fz=parseFloat(cols[iFz]);
        const ar=alpha*Math.PI/180, br=beta*Math.PI/180, gr=gamma*Math.PI/180;
        const cosA=Math.cos(ar),cosB=Math.cos(br),cosG=Math.cos(gr),sinG=Math.sin(gr);
        const v=Math.sqrt(1-cosA*cosA-cosB*cosB-cosG*cosG+2*cosA*cosB*cosG);
        x = fx*cellA + fy*cellB*cosG + fz*cellC*cosB;
        y = fy*cellB*sinG + fz*cellC*(cosA-cosB*cosG)/sinG;
        z = fz*cellC*v/sinG;
      }
      if(!isNaN(x)&&!isNaN(y)&&!isNaN(z)) atoms.push({el,x,y,z});
    });
  }

  if(atoms.length===0){ alert('CIFから原子座標を読み取れませんでした'); return null; }

  // 3) 重心を原点に移動
  const cx=atoms.reduce((s,a)=>s+a.x,0)/atoms.length;
  const cy=atoms.reduce((s,a)=>s+a.y,0)/atoms.length;
  const cz=atoms.reduce((s,a)=>s+a.z,0)/atoms.length;
  atoms.forEach(a=>{a.x-=cx;a.y-=cy;a.z-=cz;});

  // 4) 結合を共有結合半径の和で自動判定 (1.15倍のマージン)
  const bonds=[];
  for(let i=0;i<atoms.length;i++){
    for(let j=i+1;j<atoms.length;j++){
      const dx=atoms[i].x-atoms[j].x, dy=atoms[i].y-atoms[j].y, dz=atoms[i].z-atoms[j].z;
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      const ri=CRAD[atoms[i].el]||CRAD.default, rj=CRAD[atoms[j].el]||CRAD.default;
      if(d>0.4 && d<(ri+rj)*1.15) bonds.push([i,j]);
    }
  }

  // 5) dy方向 (層間方向) の広がりを計算して minGap を決定
  const dyMin=Math.min(...atoms.map(a=>a.y)), dyMax=Math.max(...atoms.map(a=>a.y));
  const molHeight=dyMax-dyMin;
  const dxMax2=Math.max(...atoms.map(a=>Math.sqrt(a.x*a.x+a.z*a.z)));
  // 分子が層間に確実に収まるよう、vdWバッファ(3Å)込みで計算
  // TMDの典型的なnormalGapは2.5-3.5Å → それに対する拡大率
  const normalGapEst=3.0;
  const estMinGap = Math.max(1.5, (molHeight+3.0)/normalGapEst);
  const estSpacing = Math.max(1, Math.ceil((dxMax2*2+1.0)/3.5));

  // 6) INTER エントリを構築
  const mainEl = atoms.reduce((acc,a)=>{acc[a.el]=(acc[a.el]||0)+1;return acc;},{});
  const dominant = Object.entries(mainEl).sort((a,b)=>b[1]-a[1])[0][0];
  const color = EL_COL[dominant] || 0x88aacc;

  const entry = {
    name: fileName.replace(/\.cif$/i,''),
    color: color,
    atoms: atoms.map(a=>({
      el:a.el,
      color: EL_COL[a.el]||0x88aacc,
      r: EL_RAD[a.el]||EL_RAD.default,
      dx:a.x, dy:a.y, dz:a.z
    })),
    minGap: Math.round(estMinGap*10)/10,
    spacing: estSpacing,
    bonds: bonds
  };
  return entry;
}

// =====================================================
//  XYZ File Parser
// =====================================================
function parseXYZ(text, fileName){
  const lines=text.trim().split('\n');
  if(lines.length<3){alert('XYZファイルが短すぎます');return null;}
  const nAtoms=parseInt(lines[0].trim());
  if(isNaN(nAtoms)||nAtoms<1){alert('XYZ原子数を読み取れません');return null;}
  // line 1 = comment, lines 2..nAtoms+1 = atoms
  const atoms=[];
  for(let i=2;i<2+nAtoms&&i<lines.length;i++){
    const parts=lines[i].trim().split(/\s+/);
    if(parts.length<4) continue;
    let el=parts[0].replace(/[^a-zA-Z]/g,'');
    el=el.charAt(0).toUpperCase()+(el.slice(1).toLowerCase());
    const x=parseFloat(parts[1]),y=parseFloat(parts[2]),z=parseFloat(parts[3]);
    if(isNaN(x)||isNaN(y)||isNaN(z)) continue;
    atoms.push({el,x,y,z});
  }
  if(atoms.length===0){alert('XYZから原子座標を読み取れませんでした');return null;}
  // Center
  const cx=atoms.reduce((s,a)=>s+a.x,0)/atoms.length;
  const cy=atoms.reduce((s,a)=>s+a.y,0)/atoms.length;
  const cz=atoms.reduce((s,a)=>s+a.z,0)/atoms.length;
  atoms.forEach(a=>{a.x-=cx;a.y-=cy;a.z-=cz;});
  // Bonds
  const bonds=[];
  for(let i=0;i<atoms.length;i++) for(let j=i+1;j<atoms.length;j++){
    const dx=atoms[i].x-atoms[j].x,dy=atoms[i].y-atoms[j].y,dz=atoms[i].z-atoms[j].z;
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    const ri=CRAD[atoms[i].el]||CRAD.default, rj=CRAD[atoms[j].el]||CRAD.default;
    if(d>0.4&&d<(ri+rj)*1.15) bonds.push([i,j]);
  }
  const dyMin=Math.min(...atoms.map(a=>a.y)),dyMax=Math.max(...atoms.map(a=>a.y));
  const molH=dyMax-dyMin;
  const dxMax2=Math.max(...atoms.map(a=>Math.sqrt(a.x*a.x+a.z*a.z)));
  const mainEl=atoms.reduce((acc,a)=>{acc[a.el]=(acc[a.el]||0)+1;return acc;},{});
  const dominant=Object.entries(mainEl).sort((a,b)=>b[1]-a[1])[0][0];
  return{
    name:fileName.replace(/\.xyz$/i,''),
    color:EL_COL[dominant]||0x88aacc,
    atoms:atoms.map(a=>({
      el:a.el, color:EL_COL[a.el]||0x88aacc,
      r:EL_RAD[a.el]||EL_RAD.default,
      dx:a.x, dy:a.y, dz:a.z
    })),
    minGap:Math.round(Math.max(1.5,(molH+3.0)/3.0)*10)/10,
    spacing:Math.max(1,Math.ceil((dxMax2*2+1.0)/3.5)),
    bonds
  };
}

document.getElementById('mol-input').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const text=ev.target.result;
    const isXYZ=/\.xyz$/i.test(file.name);
    const entry=isXYZ?parseXYZ(text,file.name):parseCIF(text,file.name);
    if(!entry) return;
    cifCounter++;
    const key='mol_'+cifCounter;
    INTER[key]=entry;
    const og=document.getElementById('og-custom');
    og.style.display='';
    const opt=document.createElement('option');
    opt.value=key;
    opt.textContent=entry.name+' ('+entry.atoms.length+'原子)';
    og.appendChild(opt);
    document.getElementById('sel-inter').value=key;
    buildStructure();
  };
  reader.readAsText(file);
  this.value='';
});
