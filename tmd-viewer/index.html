// STO-3G coefficients {alpha, coeff} for zeta=1, scaled by zeta^2
const STO3G={
  '1s':{a:[0.109818,0.405771,2.22766],c:[0.444635,0.535328,0.154329]},
  '2s':{a:[0.0751386,0.231031,0.994203],c:[0.700115,0.399513,-0.0999672]},
  '2p':{a:[0.0751386,0.231031,0.994203],c:[0.391957,0.607684,0.155916]},
  '3s':{a:[0.0334946,0.104982,0.383108],c:[0.700115,0.399513,-0.0999672]},
  '3p':{a:[0.0334946,0.104982,0.383108],c:[0.391957,0.607684,0.155916]},
  '4s':{a:[0.0190633,0.0620511,0.212198],c:[0.700115,0.399513,-0.0999672]},
  '4p':{a:[0.0190633,0.0620511,0.212198],c:[0.391957,0.607684,0.155916]}
};

// Primitive Gaussian overlap: <g_A|g_B> for s-type
function gOvS(aA,pA,aB,pB){
  const g=aA+aB,mu=aA*aB/g;
  const dx=pA[0]-pB[0],dy=pA[1]-pB[1],dz=pA[2]-pB[2];
  return Math.pow(Math.PI/g,1.5)*Math.exp(-mu*(dx*dx+dy*dy+dz*dz));
}

// Gaussian product center
function gPC(aA,pA,aB,pB){
  const g=aA+aB;
  return[(aA*pA[0]+aB*pB[0])/g,(aA*pA[1]+aB*pB[1])/g,(aA*pA[2]+aB*pB[2])/g];
}

// Overlap between primitive Gaussians with angular momentum
// lA/lB: [lx,ly,lz] cartesian angular momentum
function primOverlap(aA,pA,lA,aB,pB,lB){
  const g=aA+aB, P=gPC(aA,pA,aB,pB);
  const mu=aA*aB/g;
  const dx=pA[0]-pB[0],dy=pA[1]-pB[1],dz=pA[2]-pB[2];
  const K=Math.exp(-mu*(dx*dx+dy*dy+dz*dz));
  // Compute 1D overlaps for each axis using recursion
  function ov1d(lA,lB,PA,PB,g){
    // PA=P-A, PB=P-B
    if(lA===0&&lB===0) return 1;
    if(lA===1&&lB===0) return PA;
    if(lA===0&&lB===1) return PB;
    if(lA===1&&lB===1) return PA*PB+1/(2*g);
    return 0; // we only need l=0,1
  }
  const sx=ov1d(lA[0],lB[0],P[0]-pA[0],P[0]-pB[0],g);
  const sy=ov1d(lA[1],lB[1],P[1]-pA[1],P[1]-pB[1],g);
  const sz=ov1d(lA[2],lB[2],P[2]-pA[2],P[2]-pB[2],g);
  return Math.pow(Math.PI/g,1.5)*K*sx*sy*sz;
}

// Normalization constant for a primitive Gaussian
function gNorm(a,l){
  // N^2 * integral |G|^2 = 1
  const L=l[0]+l[1]+l[2];
  if(L===0) return Math.pow(2*a/Math.PI,0.75);
  if(L===1) return Math.pow(128*a*a*a*a*a/(Math.PI*Math.PI*Math.PI),0.25);
  return 1;
}

// Build basis set for a molecule
// atoms: [{el,x,y,z}] coordinates in Angstrom
function buildBasis(atoms){
  const basis=[];
  atoms.forEach((at,ai)=>{
    const par=EHT_P[at.el];
    if(!par) return;
    const pos=[at.x,at.y,at.z];
    par.forEach(orb=>{
      const key=orb.n+(orb.l===0?'s':'p');
      const sto=STO3G[key];
      if(!sto) return;
      const z2=orb.z*orb.z;
      if(orb.l===0){
        // s orbital
        const prims=sto.a.map((a,i)=>({a:a*z2,c:sto.c[i],l:[0,0,0]}));
        // normalize
        prims.forEach(p=>p.N=gNorm(p.a,p.l));
        basis.push({atom:ai,pos,ip:orb.ip,l:0,m:0,prims,label:at.el+key});
      } else {
        // px, py, pz
        for(let m=0;m<3;m++){
          const lv=[0,0,0]; lv[m]=1;
          const prims=sto.a.map((a,i)=>({a:a*z2,c:sto.c[i],l:lv.slice()}));
          prims.forEach(p=>p.N=gNorm(p.a,p.l));
          basis.push({atom:ai,pos,ip:orb.ip,l:1,m,prims,label:at.el+key+['x','y','z'][m]});
        }
      }
    });
  });
  return basis;
}

// Compute overlap between two contracted GTOs
function cOverlap(bA,bB){
  let S=0;
  for(const pA of bA.prims){
    for(const pB of bB.prims){
      S+=pA.N*pA.c*pB.N*pB.c*primOverlap(pA.a,bA.pos,pA.l,pB.a,bB.pos,pB.l);
    }
  }
  return S;
}

// Build overlap matrix
function buildSMat(basis){
  const n=basis.length, S=new Float64Array(n*n);
  for(let i=0;i<n;i++){
    S[i*n+i]=1.0; // self-overlap = 1 (if normalized)
    for(let j=i+1;j<n;j++){
      const v=cOverlap(basis[i],basis[j]);
      S[i*n+j]=v; S[j*n+i]=v;
    }
  }
  // Fix diagonal (compute actual self-overlap for correctness)
  for(let i=0;i<n;i++) S[i*n+i]=cOverlap(basis[i],basis[i]);
  return S;
}

// Build EHT Hamiltonian (Wolfsberg-Helmholz)
function buildHMat(basis,S){
  const n=basis.length, H=new Float64Array(n*n);
  const K=1.75; // Wolfsberg-Helmholz constant
  for(let i=0;i<n;i++){
    H[i*n+i]=basis[i].ip; // diagonal = VSIP
    for(let j=i+1;j<n;j++){
      const v=0.5*K*(basis[i].ip+basis[j].ip)*S[i*n+j];
      H[i*n+j]=v; H[j*n+i]=v;
    }
  }
  return H;
}

// Jacobi eigenvalue decomposition for symmetric matrix
function jacobiEigen(A,n,maxIter){
  maxIter=maxIter||200;
  const V=new Float64Array(n*n);
  const D=new Float64Array(n*n);
  for(let i=0;i<n*n;i++) D[i]=A[i];
  for(let i=0;i<n;i++) V[i*n+i]=1;

  for(let iter=0;iter<maxIter;iter++){
    // Find max off-diagonal
    let mx=0,p=0,q=1;
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
      const v=Math.abs(D[i*n+j]);
      if(v>mx){mx=v;p=i;q=j;}
    }
    if(mx<1e-12) break;

    const app=D[p*n+p],aqq=D[q*n+q],apq=D[p*n+q];
    let theta;
    if(Math.abs(app-aqq)<1e-15) theta=Math.PI/4;
    else theta=0.5*Math.atan(2*apq/(app-aqq));
    const c=Math.cos(theta),s=Math.sin(theta);

    // Rotate
    for(let i=0;i<n;i++){
      const ip=D[i*n+p],iq=D[i*n+q];
      D[i*n+p]=c*ip+s*iq; D[i*n+q]=-s*ip+c*iq;
    }
    for(let j=0;j<n;j++){
      const pj=D[p*n+j],qj=D[q*n+j];
      D[p*n+j]=c*pj+s*qj; D[q*n+j]=-s*pj+c*qj;
    }
    // Eigenvectors
    for(let i=0;i<n;i++){
      const vp=V[i*n+p],vq=V[i*n+q];
      V[i*n+p]=c*vp+s*vq; V[i*n+q]=-s*vp+c*vq;
    }
  }
  const evals=[];
  for(let i=0;i<n;i++) evals.push(D[i*n+i]);
  return{evals,V};
}

// Solve generalized eigenvalue problem HC=SCE
// via Löwdin orthogonalization: S^{-1/2} H S^{-1/2}
function solveHSC(H,S,n){
  // 1. Diagonalize S
  const sEig=jacobiEigen(S,n);
  // 2. Build S^{-1/2}
  const Sh=new Float64Array(n*n);
  for(let i=0;i<n;i++){
    const si=sEig.evals[i];
    const inv=si>1e-8?1/Math.sqrt(si):0;
    for(let a=0;a<n;a++) for(let b=0;b<n;b++){
      Sh[a*n+b]+=inv*sEig.V[a*n+i]*sEig.V[b*n+i];
    }
  }
  // 3. H' = Sh * H * Sh
  const tmp=new Float64Array(n*n);
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    let v=0; for(let k=0;k<n;k++) v+=Sh[i*n+k]*H[k*n+j]; tmp[i*n+j]=v;
  }
  const Hp=new Float64Array(n*n);
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    let v=0; for(let k=0;k<n;k++) v+=tmp[i*n+k]*Sh[k*n+j]; Hp[i*n+j]=v;
  }
  // 4. Diagonalize H'
  const hEig=jacobiEigen(Hp,n);
  return hEig.evals.slice().sort((a,b)=>a-b);
}

// Repulsive pair potential (prevents atoms from collapsing)
function eRepulsive(atoms){
  let E=0;
  for(let i=0;i<atoms.length;i++){
    for(let j=i+1;j<atoms.length;j++){
      const dx=atoms[i].x-atoms[j].x,dy=atoms[i].y-atoms[j].y,dz=atoms[i].z-atoms[j].z;
      let r=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(r<0.5) r=0.5;
      const Zi=EHT_NEL[atoms[i].el]||1, Zj=EHT_NEL[atoms[j].el]||1;
      E+=Zi*Zj*27.2114/r*Math.exp(-1.5*r);
    }
  }
  return E;
}

// vdW radii for layer-molecule interaction (Å)
const VDW_R={H:1.20,Li:1.82,C:1.70,N:1.55,O:1.52,Na:2.27,K:2.75,Rb:3.03,S:1.80,Se:1.90,Te:2.06};

// Layer confinement potential: molecule atoms between two walls at y=±gap/2
// Uses LJ 9-3 wall potential (integrated LJ 12-6 over infinite plane)
function eLayerConfinement(atoms, gap, chalcogen){
  const sigma=VDW_R[chalcogen]||1.80;
  let E=0;
  for(const a of atoms){
    const sigA=(VDW_R[a.el]||1.70);
    const sig=(sigA+sigma)/2; // Lorentz combining rule
    const eps=0.05; // eV, typical vdW well depth
    // Distance from atom to top wall (+gap/2) and bottom wall (-gap/2)
    const dTop=gap/2-a.y;
    const dBot=a.y+gap/2;
    // LJ 9-3 wall potential: E = eps * [2/15*(sig/d)^9 - (sig/d)^3]
    for(const d of [dTop,dBot]){
      if(d<0.3){ E+=1000; continue; } // hard wall penalty
      const sd=sig/d;
      const sd3=sd*sd*sd;
      E+=eps*(2/15*sd3*sd3*sd3 - sd3);
    }
  }
  return E;
}

// Elastic energy for layer expansion (harmonic spring)
// k_layer: spring constant in eV/Å², gap0: natural gap without intercalant
function eElastic(gap, gap0, kLayer){
  return 0.5*kLayer*(gap-gap0)*(gap-gap0);
}

// Total energy: EHT(molecule) + repulsion + layer confinement + elastic
function ehtEnergy(atoms, gap, gap0, chalcogen){
  if(!atoms||atoms.length<2) return 0;
  let nEl=0;
  atoms.forEach(a=>{nEl+=(EHT_NEL[a.el]||0);});
  if(atoms.some(a=>!EHT_P[a.el])) return NaN;

  const basis=buildBasis(atoms);
  const n=basis.length;
  if(n===0) return NaN;

  const S=buildSMat(basis);
  const H=buildHMat(basis,S);
  const evals=solveHSC(H,S,n);

  const nOcc=Math.floor(nEl/2);
  let Eel=0;
  for(let i=0;i<nOcc&&i<evals.length;i++) Eel+=2*evals[i];
  if(nEl%2===1&&nOcc<evals.length) Eel+=evals[nOcc];

  let Etot=Eel+eRepulsive(atoms);

  // Layer confinement (optional: only when gap is provided)
  if(typeof gap==='number'&&gap>0){
    Etot+=eLayerConfinement(atoms, gap, chalcogen||'Se');
    const kL=2.0; // eV/Å² layer stiffness
    Etot+=eElastic(gap, gap0||gap, kL);
  }
  return Etot;
}

// Numerical gradient for atoms + gap (central difference)
function ehtGradientWithGap(atoms, gap, gap0, chalcogen){
  const h=0.005;
  const grad=atoms.map(()=>({x:0,y:0,z:0}));
  const keys=['x','y','z'];
  for(let i=0;i<atoms.length;i++){
    for(const k of keys){
      const orig=atoms[i][k];
      atoms[i][k]=orig+h;
      const ep=ehtEnergy(atoms,gap,gap0,chalcogen);
      atoms[i][k]=orig-h;
      const em=ehtEnergy(atoms,gap,gap0,chalcogen);
      atoms[i][k]=orig;
      grad[i][k]=(ep-em)/(2*h);
    }
  }
  // Gradient w.r.t. gap
  const epG=ehtEnergy(atoms,gap+h,gap0,chalcogen);
  const emG=ehtEnergy(atoms,gap-h,gap0,chalcogen);
  const gGap=(epG-emG)/(2*h);
  return{grad,gGap};
}

// =====================================================
//  Rotation Optimizer: find orientation that minimizes
//  layer height (y-extent) → minimizes interlayer gap
//  Molecule shape is FIXED, only rotation changes.
// =====================================================
function molYExtent(atoms, rA, rB, rC){
  // Apply rotation Ry(C)*Rz(B)*Rx(A) and return y-span + vdW buffer
  const ca=Math.cos(rA),sa=Math.sin(rA);
  const cb=Math.cos(rB),sb=Math.sin(rB);
  const cc=Math.cos(rC),sc=Math.sin(rC);
  let yMin=Infinity, yMax=-Infinity;
  for(const a of atoms){
    // Rx(A)
    let x1=a.dx, y1=ca*a.dy-sa*a.dz, z1=sa*a.dy+ca*a.dz;
    // Rz(B)
    let x2=cb*x1-sb*y1, y2=sb*x1+cb*y1, z2=z1;
    // Ry(C)
    let x3=cc*x2+sc*z2, y3=y2, z3=-sc*x2+cc*z2;
    // Add vdW radius for this atom
    const vr=VDW_R[a.el]||1.70;
    if(y3-vr<yMin) yMin=y3-vr;
    if(y3+vr>yMax) yMax=y3+vr;
  }
  return yMax-yMin;
}

function runOptimize(){
  const interKey=document.getElementById('sel-inter').value;
  if(interKey==='none'){alert('挿入分子を選択してください');return;}
  const inter=INTER[interKey];
  if(!inter||!inter.atoms||inter.atoms.length<2){alert('この分子は最適化できません');return;}

  const matInfo=DB[curMat], phase=curPhase;
  const r_inp=matInfo.a/S3;
  const d_xm=matInfo.dxm||Math.sqrt(Math.max(matInfo.bond*matInfo.bond-r_inp*r_inp,0.1));
  const c_layer=phase==='2H'?matInfo.c2H/2:phase==='3R'?(matInfo.c3R||matInfo.c2H*1.5)/3:phase==='1Tp'?(matInfo.c1Tp||matInfo.c1T*2)/(matInfo.nlc||2):matInfo.c1T;
  const normalGap=c_layer-2*d_xm;

  const panel=document.getElementById('opt-panel');
  const fill=document.getElementById('opt-fill');
  const status=document.getElementById('opt-status');
  const log=document.getElementById('opt-log');
  panel.style.display='block';
  fill.style.width='0%'; fill.style.background='#58a6ff';
  log.innerHTML=`<span style="color:#8888ff">${inter.name} の向きを最適化中...</span><br>`;
  document.getElementById('btn-opt').disabled=true;

  const t0=performance.now();
  const atoms=inter.atoms;
  const deg=Math.PI/180;

  // Phase 1: Coarse grid search (15° steps)
  let bestA=0,bestB=0,bestC=0,bestH=Infinity;
  const step1=15;
  for(let a=0;a<360;a+=step1) for(let b=0;b<360;b+=step1) for(let c=0;c<180;c+=step1){
    const h=molYExtent(atoms,a*deg,b*deg,c*deg);
    if(h<bestH){bestH=h;bestA=a;bestB=b;bestC=c;}
  }
  log.innerHTML+=`粗探索: a=${bestA}° b=${bestB}° c=${bestC}° → 高さ${bestH.toFixed(2)}Å<br>`;
  fill.style.width='50%';

  // Phase 2: Fine grid search (1° steps around best)
  const r=10; // ±10° range
  for(let a=bestA-r;a<=bestA+r;a+=1) for(let b=bestB-r;b<=bestB+r;b+=1) for(let c=bestC-r;c<=bestC+r;c+=1){
    const h=molYExtent(atoms,a*deg,b*deg,c*deg);
    if(h<bestH){bestH=h;bestA=a;bestB=b;bestC=c;}
  }

  const dt=((performance.now()-t0)).toFixed(0);
  log.innerHTML+=`精密探索: a=${bestA}° b=${bestB}° c=${bestC}° → 高さ${bestH.toFixed(3)}Å<br>`;

  // Calculate optimal gap = molecule height + vdW buffer (2.0Å)
  // bestH は VDW半径込み → 追加バッファは控えめでOK
  const optGap=bestH+2.0;
  const optRatio=Math.max(1.0, optGap/normalGap);
  const cr=Math.min(5.0,optRatio);

  // Apply rotation sliders
  const normA=((bestA%360)+360)%360, normB=((bestB%360)+360)%360, normC=((bestC%360)+360)%360;
  document.getElementById('sl-rot-a').value=normA;
  document.getElementById('v-rot-a').value=normA;
  document.getElementById('sl-rot-b').value=normB;
  document.getElementById('v-rot-b').value=normB;
  document.getElementById('sl-rot-c').value=normC;
  document.getElementById('v-rot-c').value=normC;

  // Update inter.minGap to reflect optimized orientation
  const oldMinGap=inter.minGap;
  inter.minGap=Math.round(optRatio*10)/10;

  // Apply gap slider (set to optimized ratio)
  document.getElementById('sl-gap').value=cr.toFixed(1);
  document.getElementById('v-gap').value=cr.toFixed(1);

  fill.style.width='100%'; fill.style.background='#44cc88';
  status.textContent=`完了! ${dt}ms`;
  log.innerHTML+=`<span style="color:#44cc88">━━ 完了 (${dt}ms) ━━</span><br>`;
  log.innerHTML+=`<span style="color:#ffcc44">最小高さ: ${bestH.toFixed(3)}Å</span><br>`;
  log.innerHTML+=`<span style="color:#ffcc44">最適gap: ${optGap.toFixed(2)}Å (${optRatio.toFixed(2)}×)</span><br>`;
  log.innerHTML+=`<span style="color:#888">minGap: ${oldMinGap}× → ${inter.minGap}×</span><br>`;
  if(optRatio<=1.0) log.innerHTML+=`<span style="color:#44cc88">自然gap内に収まります!</span><br>`;

  document.getElementById('btn-opt').disabled=false;
  buildStructure();
  setTimeout(()=>{panel.style.display='none';},5000);
}

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);updateDistLabel();}
buildStructure();
animate();

// info-wrapをバーの下に追従させる
(function(){
  const bar=document.getElementById('bar'), iw=document.getElementById('info-wrap');
  const infoDiv=document.getElementById('info');
  function syncInfoTop(){
    if(!bar||!iw) return;
    const t=bar.offsetHeight+6;
    iw.style.top=t+'px';
    if(infoDiv) infoDiv.style.maxHeight=(window.innerHeight-t-60)+'px';
  }
  syncInfoTop();
  if(window.ResizeObserver){new ResizeObserver(syncInfoTop).observe(bar);}
  else{window.addEventListener('resize',syncInfoTop);}
})();

  const w=window.innerWidth, h=window.innerHeight, asp=w/h;

  updateCam();renderer.setSize(w,h);
});
