<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>DMM Monitor — リアルタイム電流・電圧モニター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#ccc;font-family:'Helvetica Neue',Arial,'Segoe UI','Meiryo','Hiragino Sans',sans-serif;min-height:100vh}

  header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.06)}
  header h1{font-size:1.2rem;color:#fff;display:flex;align-items:center;gap:10px}
  header h1 .icon{font-size:1.5rem}
  .back-link{color:#58a6ff;text-decoration:none;font-size:.8rem}
  .back-link:hover{text-decoration:underline}

  .status-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .status-dot.live{background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite}
  .status-dot.offline{background:#ef4444}
  .status-dot.stale{background:#eab308}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .status-text{font-size:.78rem;color:#999}

  /* 現在値カード */
  .current-values{display:flex;gap:16px;padding:20px 24px;flex-wrap:wrap}
  .val-card{flex:1;min-width:200px;background:rgba(20,25,40,0.85);border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;padding:20px;text-align:center}
  .val-card .label{font-size:.8rem;color:#888;margin-bottom:8px}
  .val-card .value{font-size:2.5rem;font-weight:bold;font-family:'Courier New',monospace;letter-spacing:0.02em}
  .val-card .unit{font-size:1rem;color:#888;margin-left:4px}
  .val-card.voltage .value{color:#58a6ff}
  .val-card.current .value{color:#f97316}
  .val-card .sub{font-size:.7rem;color:#555;margin-top:6px}
  .val-card .minmax{font-size:.68rem;color:#666;margin-top:4px;display:flex;justify-content:center;gap:12px}

  /* 制御パネル */
  .control-section{padding:0 24px 16px}
  .control-panel{background:rgba(20,25,40,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px}
  .control-panel h2{font-size:.9rem;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .control-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
  .control-field{display:flex;flex-direction:column;gap:4px}
  .control-field label{font-size:.75rem;color:#888}
  .control-field select,.control-field input{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    color:#ddd;padding:6px 10px;font-size:.82rem;min-width:100px}
  .control-field input:focus,.control-field select:focus{outline:none;border-color:#58a6ff}
  .btn-start{padding:8px 24px;background:#22c55e;color:#0a0e17;border:none;border-radius:6px;
    font-size:.9rem;font-weight:bold;cursor:pointer;transition:.15s}
  .btn-start:hover{background:#16a34a}
  .btn-stop{padding:8px 24px;background:#dc2626;color:#fff;border:none;border-radius:6px;
    font-size:.9rem;font-weight:bold;cursor:pointer;transition:.15s}
  .btn-stop:hover{background:#b91c1c;box-shadow:0 0 12px rgba(239,68,68,0.3)}
  .btn-stop:active{transform:scale(0.97)}
  .output-status{display:flex;align-items:center;gap:8px;font-size:.82rem}
  .output-status .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .output-status .dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e}
  .output-status .dot.off{background:#ef4444}
  .timer-display{font-size:1.5rem;font-family:'Courier New',monospace;color:#eab308;font-weight:bold}
  .timer-label{font-size:.7rem;color:#888}

  /* グラフ */
  .chart-section{padding:0 24px 20px}
  .chart-controls{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .chart-controls label{font-size:.78rem;color:#888}
  .chart-controls select,.chart-controls input{background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    color:#ddd;padding:4px 8px;font-size:.78rem}
  .chart-controls button{padding:4px 14px;background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3);
    border-radius:4px;font-size:.78rem;cursor:pointer;transition:.15s}
  .chart-controls button:hover{background:rgba(88,166,255,0.25)}
  .chart-controls button.active{background:#58a6ff;color:#0a0e17}

  .chart-wrap{background:rgba(15,18,28,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
  canvas{display:block;width:100%}

  /* データログ */
  .log-section{padding:0 24px 24px}
  .log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .log-header h2{font-size:.9rem;color:#fff}
  .log-table-wrap{max-height:300px;overflow-y:auto;background:rgba(15,18,28,0.6);border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;scrollbar-width:thin}
  table{width:100%;border-collapse:collapse;font-size:.75rem}
  th{background:rgba(88,166,255,0.08);color:#58a6ff;font-weight:600;position:sticky;top:0;z-index:1}
  th,td{padding:6px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.04)}
  td:first-child,th:first-child{text-align:left}
  tr:hover td{background:rgba(88,166,255,0.03)}

  /* 設定パネル */
  .settings-panel{padding:0 24px 24px;display:none}
  .settings-panel.open{display:block}
  .settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .setting-group{background:rgba(20,25,40,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:16px}
  .setting-group h3{font-size:.82rem;color:#58a6ff;margin-bottom:10px}
  .setting-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.78rem}
  .setting-row label{min-width:100px;color:#888}
  .setting-row input,.setting-row select{flex:1;background:#0e1220;border:1px solid #2a3040;border-radius:4px;
    color:#ddd;padding:4px 8px;font-size:.78rem}

  footer{padding:16px 24px;color:#444;font-size:.7rem;text-align:center;border-top:1px solid rgba(255,255,255,0.04)}
</style>
</head>
<body>

<header>
  <div>
    <a class="back-link" href="/">&#8592; Research Tools に戻る</a>
    <h1><span class="icon">&#9889;</span> DMM リアルタイムモニター</h1>
  </div>
  <div class="status-bar">
    <span class="status-dot offline" id="statusDot"></span>
    <span class="status-text" id="statusText">データ待機中...</span>
    <button class="chart-controls" style="padding:4px 12px;background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid rgba(88,166,255,0.3);border-radius:4px;font-size:.75rem;cursor:pointer" onclick="toggleSettings()">&#9881; 設定</button>
  </div>
</header>

<!-- 現在値 -->
<div class="current-values">
  <div class="val-card voltage">
    <div class="label">電圧 (Voltage)</div>
    <div><span class="value" id="curVoltage">---</span><span class="unit">V</span></div>
    <div class="minmax"><span id="vMin">Min: ---</span><span id="vMax">Max: ---</span></div>
    <div class="sub" id="vTime">最終更新: ---</div>
  </div>
  <div class="val-card current">
    <div class="label">電流 (Current)</div>
    <div><span class="value" id="curCurrent">---</span><span class="unit">A</span></div>
    <div class="minmax"><span id="iMin">Min: ---</span><span id="iMax">Max: ---</span></div>
    <div class="sub" id="iTime">最終更新: ---</div>
  </div>
</div>

<!-- 制御パネル -->
<div class="control-section">
  <div class="control-panel">
    <h2>&#9881; ソース制御</h2>
    <div class="control-row">
      <div class="control-field">
        <label>ソースモード</label>
        <select id="srcMode" onchange="updateModeUnits()">
          <option value="CURR">定電流 (CC)</option>
          <option value="VOLT">定電圧 (CV)</option>
        </select>
      </div>
      <div class="control-field">
        <label id="srcValueLabel">ソース電流</label>
        <input type="number" id="srcValue" value="0" step="any" placeholder="0">
      </div>
      <div class="control-field">
        <label>&nbsp;</label>
        <select id="srcUnit">
          <option value="1">A</option>
          <option value="0.001" selected>mA</option>
          <option value="0.000001">μA</option>
        </select>
      </div>
      <div class="control-field">
        <label id="compLabel">コンプライアンス電圧</label>
        <input type="number" id="srcCompliance" value="21" step="any" placeholder="上限">
      </div>
      <div class="control-field">
        <label>&nbsp;</label>
        <select id="compUnit">
          <option value="1">V</option>
          <option value="0.001">mV</option>
        </select>
      </div>
    </div>
    <div class="control-row">
      <div class="control-field">
        <label>出力時間</label>
        <input type="number" id="srcDuration" value="0" min="0" step="1" placeholder="秒（0=無制限）">
      </div>
      <div class="control-field">
        <label>&nbsp;</label>
        <select id="durUnit">
          <option value="1">秒</option>
          <option value="60">分</option>
          <option value="3600">時間</option>
        </select>
      </div>
      <div class="control-field">
        <label>&nbsp;</label>
        <button class="btn-start" id="btnStart" onclick="startSource()">&#9654; OUTPUT ON</button>
      </div>
      <div class="control-field">
        <label>&nbsp;</label>
        <button class="btn-stop" id="btnStop" onclick="emergencyStop()">&#9632; OUTPUT OFF</button>
      </div>
      <div class="output-status">
        <span class="dot off" id="outputDot"></span>
        <span id="outputStatusText">OUTPUT: OFF</span>
      </div>
      <div style="margin-left:auto;text-align:center">
        <div class="timer-label">残り時間</div>
        <div class="timer-display" id="timerDisplay">--:--</div>
      </div>
    </div>
  </div>
</div>

<!-- グラフ -->
<div class="chart-section">
  <div class="chart-controls">
    <label>表示:</label>
    <button id="btnV" class="active" onclick="toggleCh('V')">電圧</button>
    <button id="btnI" class="active" onclick="toggleCh('I')">電流</button>
    <label>時間幅:</label>
    <select id="timeRange" onchange="redrawChart()">
      <option value="60">1分</option>
      <option value="300">5分</option>
      <option value="600" selected>10分</option>
      <option value="1800">30分</option>
      <option value="3600">1時間</option>
      <option value="0">全データ</option>
    </select>
    <button onclick="clearData()">データクリア</button>
    <button onclick="exportCSV()">CSV出力</button>
  </div>
  <div class="chart-wrap">
    <canvas id="chartCanvas" height="350"></canvas>
  </div>
</div>

<!-- データログテーブル -->
<div class="log-section">
  <div class="log-header">
    <h2>データログ（最新100件）</h2>
    <span style="font-size:.7rem;color:#555" id="totalCount">0 件</span>
  </div>
  <div class="log-table-wrap" id="logWrap">
    <table>
      <thead><tr><th>時刻</th><th>電圧 (V)</th><th>電流 (A)</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<!-- 設定パネル -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div class="setting-group">
      <h3>Firebase 接続</h3>
      <div class="setting-row"><label>ステータス:</label><span id="fbStatus" style="color:#22c55e">確認中...</span></div>
      <div class="setting-row"><label>データパス:</label><input id="fbPath" value="dmm/live" onchange="reconnect()"></div>
    </div>
    <div class="setting-group">
      <h3>表示設定</h3>
      <div class="setting-row"><label>グラフ高さ:</label><input type="number" id="chartH" value="350" min="200" max="800" onchange="redrawChart()"></div>
      <div class="setting-row"><label>電圧アラート上限:</label><input type="number" id="alertVMax" value="" step="0.1" placeholder="未設定"></div>
      <div class="setting-row"><label>電流アラート上限:</label><input type="number" id="alertIMax" value="" step="0.01" placeholder="未設定"></div>
    </div>
  </div>
</div>

<footer>DMM Monitor v1.1 — Keithley 2400 SourceMeter — Research Tools</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyClK3vIE_SQ7SGdXWbmWzZ51MdeBappDKY",
  authDomain: "research-tools-board.firebaseapp.com",
  databaseURL: "https://research-tools-board-default-rtdb.firebaseio.com",
  projectId: "research-tools-board",
  storageBucket: "research-tools-board.firebasestorage.app",
  messagingSenderId: "359837086498",
  appId: "1:359837086498:web:your_app_id"
};

let db=null, firebaseReady=false;
try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
  firebaseReady=true;
}catch(e){ console.warn('Firebase init error',e); }

// ===== 状態 =====
let dataLog=[];
let showV=true, showI=true;
let vMin=Infinity, vMax=-Infinity, iMin=Infinity, iMax=-Infinity;
let lastUpdate=0;
let listener=null;
let outputState=false;
let timerInterval=null;
let timerEndTime=0;

// ===== Firebase リアルタイムリスナー =====
function startListening(){
  if(!firebaseReady){
    document.getElementById('fbStatus').textContent='Firebase未接続';
    document.getElementById('fbStatus').style.color='#ef4444';
    return;
  }
  const path=document.getElementById('fbPath').value||'dmm/live';
  if(listener) listener();

  const ref=db.ref(path);
  ref.on('value',snap=>{
    const d=snap.val();
    if(!d) return;
    onNewData(d);
  });
  listener=()=>ref.off('value');

  db.ref('dmm/log').orderByKey().limitToLast(500).once('value').then(snap=>{
    const d=snap.val();
    if(d){
      const entries=Object.values(d).sort((a,b)=>a.time-b.time);
      entries.forEach(e=>{
        if(!dataLog.some(x=>x.time===e.time)){
          dataLog.push({time:e.time, voltage:e.voltage||0, current:e.current||0});
        }
      });
      updateStats();redrawChart();updateLogTable();
    }
  });

  db.ref('dmm/log').orderByKey().limitToLast(1).on('child_added',snap=>{
    const e=snap.val();
    if(e && e.time > lastUpdate) onNewData(e);
  });

  document.getElementById('fbStatus').textContent='接続中';
  document.getElementById('fbStatus').style.color='#22c55e';
  document.getElementById('statusDot').className='status-dot live';
  document.getElementById('statusText').textContent='リアルタイム監視中';
}

function onNewData(d){
  const now=d.time||Date.now();
  const v=parseFloat(d.voltage)||0;
  const i=parseFloat(d.current)||0;
  if(now<=lastUpdate) return;
  lastUpdate=now;

  dataLog.push({time:now, voltage:v, current:i});
  if(dataLog.length>10000) dataLog=dataLog.slice(-8000);

  updateCurrentValues(v, i, now);
  updateStats();redrawChart();updateLogTable();
  checkAlerts(v, i);
}

function updateCurrentValues(v, i, time){
  document.getElementById('curVoltage').textContent=formatValue(v, 'V');
  document.getElementById('curCurrent').textContent=formatValue(i, 'A');

  const t=new Date(time);
  const ts=t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('vTime').textContent='最終更新: '+ts;
  document.getElementById('iTime').textContent='最終更新: '+ts;

  document.getElementById('statusDot').className='status-dot live';
  document.getElementById('statusText').textContent='リアルタイム監視中 — '+ts;
}

function formatValue(val, unit){
  const abs=Math.abs(val);
  if(unit==='A'){
    if(abs<1e-6) return (val*1e9).toFixed(2);
    if(abs<1e-3) return (val*1e6).toFixed(2);
    if(abs<1) return (val*1e3).toFixed(3);
    return val.toFixed(4);
  }
  if(unit==='V'){
    if(abs<1e-3) return (val*1e6).toFixed(1);
    if(abs<1) return (val*1e3).toFixed(3);
    return val.toFixed(4);
  }
  return val.toFixed(4);
}

function getAutoUnit(val, base){
  const abs=Math.abs(val);
  if(base==='A'){
    if(abs<1e-6) return {scale:1e9, prefix:'n'};
    if(abs<1e-3) return {scale:1e6, prefix:'μ'};
    if(abs<1) return {scale:1e3, prefix:'m'};
    return {scale:1, prefix:''};
  }
  if(base==='V'){
    if(abs<1e-3) return {scale:1e6, prefix:'μ'};
    if(abs<1) return {scale:1e3, prefix:'m'};
    return {scale:1, prefix:''};
  }
  return {scale:1, prefix:''};
}

function getAutoUnitStr(val, base){
  const u=getAutoUnit(val, base);
  return {scale:u.scale, str:u.prefix+base};
}

function updateStats(){
  if(dataLog.length===0) return;
  vMin=Infinity;vMax=-Infinity;iMin=Infinity;iMax=-Infinity;
  for(const d of dataLog){
    if(d.voltage<vMin) vMin=d.voltage;
    if(d.voltage>vMax) vMax=d.voltage;
    if(d.current<iMin) iMin=d.current;
    if(d.current>iMax) iMax=d.current;
  }
  const vu=getAutoUnit(vMax,'V');
  const iu=getAutoUnit(iMax,'A');
  document.getElementById('vMin').textContent='Min: '+(vMin*vu.scale).toFixed(3)+' '+vu.prefix+'V';
  document.getElementById('vMax').textContent='Max: '+(vMax*vu.scale).toFixed(3)+' '+vu.prefix+'V';
  document.getElementById('iMin').textContent='Min: '+(iMin*iu.scale).toFixed(3)+' '+iu.prefix+'A';
  document.getElementById('iMax').textContent='Max: '+(iMax*iu.scale).toFixed(3)+' '+iu.prefix+'A';
}

// ===== グラフ描画 =====
function redrawChart(){
  const canvas=document.getElementById('chartCanvas');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth;
  const h=parseInt(document.getElementById('chartH').value)||350;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  if(dataLog.length<2){
    ctx.fillStyle='#555';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('データ待機中...',w/2,h/2);
    return;
  }

  const margin={top:20,right:70,bottom:40,left:70};
  const pw=w-margin.left-margin.right;
  const ph=h-margin.top-margin.bottom;

  const rangeSec=parseInt(document.getElementById('timeRange').value)||600;
  const now=dataLog[dataLog.length-1].time;
  const tMin=rangeSec>0?now-rangeSec*1000:dataLog[0].time;
  const tMax=now;
  const filtered=dataLog.filter(d=>d.time>=tMin);
  if(filtered.length<2) return;

  const xPx=t=>margin.left+((t-tMin)/(tMax-tMin))*pw;

  let vyMin=Infinity,vyMax=-Infinity,iyMin=Infinity,iyMax=-Infinity;
  for(const d of filtered){
    if(showV){if(d.voltage<vyMin)vyMin=d.voltage;if(d.voltage>vyMax)vyMax=d.voltage;}
    if(showI){if(d.current<iyMin)iyMin=d.current;if(d.current>iyMax)iyMax=d.current;}
  }
  const vPad=(vyMax-vyMin)*0.1||0.1;
  vyMin-=vPad;vyMax+=vPad;
  const iPad=(iyMax-iyMin)*0.1||0.001;
  iyMin-=iPad;iyMax+=iPad;

  const vPx=v=>margin.top+ph-((v-vyMin)/(vyMax-vyMin))*ph;
  const iPxFn=i=>margin.top+ph-((i-iyMin)/(iyMax-iyMin))*ph;

  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
  for(let j=0;j<=5;j++){
    const y=margin.top+ph*j/5;
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(w-margin.right,y);ctx.stroke();
  }

  ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
  const timeSpan=tMax-tMin;
  const tickCount=Math.min(8, Math.floor(pw/80));
  for(let j=0;j<=tickCount;j++){
    const t=tMin+timeSpan*j/tickCount;
    const d=new Date(t);
    const label=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const x=xPx(t);
    ctx.fillText(label,x,h-margin.bottom+16);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.beginPath();
    ctx.moveTo(x,margin.top);ctx.lineTo(x,h-margin.bottom);ctx.stroke();
  }

  if(showV){
    const vu=getAutoUnit(vyMax,'V');
    ctx.fillStyle='#58a6ff';ctx.font='11px sans-serif';ctx.textAlign='right';
    for(let j=0;j<=5;j++){
      const val=vyMin+(vyMax-vyMin)*j/5;
      ctx.fillText((val*vu.scale).toFixed(2),margin.left-6,margin.top+ph-ph*j/5+4);
    }
    ctx.save();ctx.translate(14,margin.top+ph/2);ctx.rotate(-Math.PI/2);
    ctx.fillStyle='#58a6ff';ctx.textAlign='center';ctx.font='12px sans-serif';
    ctx.fillText('Voltage / '+vu.prefix+'V',0,0);ctx.restore();
  }

  if(showI){
    const iu=getAutoUnit(iyMax,'A');
    ctx.fillStyle='#f97316';ctx.font='11px sans-serif';ctx.textAlign='left';
    for(let j=0;j<=5;j++){
      const val=iyMin+(iyMax-iyMin)*j/5;
      ctx.fillText((val*iu.scale).toFixed(3),w-margin.right+6,margin.top+ph-ph*j/5+4);
    }
    ctx.save();ctx.translate(w-10,margin.top+ph/2);ctx.rotate(Math.PI/2);
    ctx.fillStyle='#f97316';ctx.textAlign='center';ctx.font='12px sans-serif';
    ctx.fillText('Current / '+iu.prefix+'A',0,0);ctx.restore();
  }

  if(showV){
    ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.5;ctx.beginPath();
    let started=false;
    for(const d of filtered){
      const x=xPx(d.time),y=vPx(d.voltage);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  if(showI){
    ctx.strokeStyle='#f97316';ctx.lineWidth=1.5;ctx.beginPath();
    let started=false;
    for(const d of filtered){
      const x=xPx(d.time),y=iPxFn(d.current);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.strokeRect(margin.left,margin.top,pw,ph);
}

// ===== ログテーブル =====
function updateLogTable(){
  const tbody=document.getElementById('logBody');
  const recent=dataLog.slice(-100).reverse();
  document.getElementById('totalCount').textContent=dataLog.length+' 件';

  tbody.innerHTML=recent.map(d=>{
    const t=new Date(d.time);
    const ts=t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'.'+String(t.getMilliseconds()).padStart(3,'0');
    const vu=getAutoUnit(d.voltage,'V');
    const iu=getAutoUnit(d.current,'A');
    return `<tr><td>${ts}</td><td>${(d.voltage*vu.scale).toFixed(4)} ${vu.prefix}V</td><td>${(d.current*iu.scale).toFixed(4)} ${iu.prefix}A</td></tr>`;
  }).join('');
}

// ===== アラート =====
function checkAlerts(v, i){
  const vAlert=parseFloat(document.getElementById('alertVMax').value);
  const iAlert=parseFloat(document.getElementById('alertIMax').value);
  if(vAlert && Math.abs(v)>vAlert) showAlert('電圧アラート: '+v.toFixed(4)+' V > '+vAlert+' V');
  if(iAlert && Math.abs(i)>iAlert) showAlert('電流アラート: '+i.toFixed(6)+' A > '+iAlert+' A');
}

function showAlert(msg){
  if(Notification.permission==='granted') new Notification('DMM Monitor',{body:msg});
  else if(Notification.permission!=='denied') Notification.requestPermission();
  console.warn(msg);
}

// ===== UI操作 =====
function toggleCh(ch){
  if(ch==='V') showV=!showV;
  if(ch==='I') showI=!showI;
  document.getElementById('btnV').classList.toggle('active',showV);
  document.getElementById('btnI').classList.toggle('active',showI);
  redrawChart();
}

function toggleSettings(){
  document.getElementById('settingsPanel').classList.toggle('open');
}

function clearData(){
  if(!confirm('表示データをクリアしますか？')) return;
  dataLog=[];
  vMin=Infinity;vMax=-Infinity;iMin=Infinity;iMax=-Infinity;lastUpdate=0;
  document.getElementById('curVoltage').textContent='---';
  document.getElementById('curCurrent').textContent='---';
  redrawChart();updateLogTable();
}

function reconnect(){ if(listener) listener(); startListening(); }

function exportCSV(){
  if(dataLog.length===0){alert('データがありません');return;}
  let csv='Time,Voltage(V),Current(A)\n';
  for(const d of dataLog){
    csv+=`${new Date(d.time).toISOString()},${d.voltage},${d.current}\n`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='dmm_data_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
}

// ===== モード切替で単位を更新 =====
function updateModeUnits(){
  const mode=document.getElementById('srcMode').value;
  const srcUnit=document.getElementById('srcUnit');
  const compUnit=document.getElementById('compUnit');
  const srcLabel=document.getElementById('srcValueLabel');
  const compLabel=document.getElementById('compLabel');

  if(mode==='CURR'){
    srcLabel.textContent='ソース電流';
    srcUnit.innerHTML='<option value="1">A</option><option value="0.001" selected>mA</option><option value="0.000001">μA</option>';
    compLabel.textContent='コンプライアンス電圧';
    compUnit.innerHTML='<option value="1" selected>V</option><option value="0.001">mV</option>';
  } else {
    srcLabel.textContent='ソース電圧';
    srcUnit.innerHTML='<option value="1">V</option><option value="0.001" selected>mV</option><option value="0.000001">μV</option>';
    compLabel.textContent='コンプライアンス電流';
    compUnit.innerHTML='<option value="1">A</option><option value="0.001" selected>mA</option><option value="0.000001">μA</option>';
  }
}

// ===== 機器制御 =====
function sendCommand(cmd, params){
  if(!firebaseReady) return;
  db.ref('dmm/command').set({
    action: cmd,
    ...params,
    time: Date.now(),
    from: 'web'
  });
}

function startSource(){
  const mode=document.getElementById('srcMode').value; // CURR or VOLT
  const rawVal=parseFloat(document.getElementById('srcValue').value)||0;
  const unitMul=parseFloat(document.getElementById('srcUnit').value)||0.001;
  const value=rawVal*unitMul; // 実値（A or V）

  const rawComp=parseFloat(document.getElementById('srcCompliance').value)||21;
  const compMul=parseFloat(document.getElementById('compUnit').value)||1;
  const compliance=rawComp*compMul;

  const durVal=parseFloat(document.getElementById('srcDuration').value)||0;
  const durMul=parseFloat(document.getElementById('durUnit').value)||1;
  const durationSec=durVal*durMul;

  const modeLabel=mode==='CURR'?'定電流':'定電圧';
  const valUnit=mode==='CURR'?'A':'V';
  const vu=getAutoUnitStr(value, valUnit);
  const dispVal=(value*vu.scale).toFixed(4)+' '+vu.str;

  let msg=`${modeLabel}モードで ${dispVal} を出力します。`;
  if(durationSec>0) msg+=`\n出力時間: ${formatDuration(durationSec)}（自動停止）`;
  else msg+='\n出力時間: 無制限（手動停止）';
  msg+='\nよろしいですか？';

  if(!confirm(msg)) return;

  sendCommand('SOURCE_START',{
    mode: mode,
    value: value,
    compliance: compliance,
    duration: durationSec
  });

  setOutputUI(true);

  // タイマー開始
  if(durationSec>0){
    timerEndTime=Date.now()+durationSec*1000;
    startTimer();
  } else {
    document.getElementById('timerDisplay').textContent='∞';
  }
}

function emergencyStop(){
  sendCommand('OUTPUT_OFF',{});
  setOutputUI(false);
  stopTimer();
  document.getElementById('timerDisplay').textContent='--:--';
}

function setOutputUI(on){
  outputState=on;
  const dot=document.getElementById('outputDot');
  const txt=document.getElementById('outputStatusText');
  if(on){
    dot.className='dot on'; txt.textContent='OUTPUT: ON'; txt.style.color='#22c55e';
  } else {
    dot.className='dot off'; txt.textContent='OUTPUT: OFF'; txt.style.color='#ef4444';
  }
}

function formatDuration(sec){
  if(sec<60) return sec+'秒';
  if(sec<3600) return Math.floor(sec/60)+'分'+((sec%60)>0?(sec%60)+'秒':'');
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  return h+'時間'+(m>0?m+'分':'');
}

// タイマー
function startTimer(){
  stopTimer();
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    const remain=timerEndTime-Date.now();
    if(remain<=0){
      stopTimer();
      document.getElementById('timerDisplay').textContent='00:00';
      // Python側で自動停止されるのでUIも更新
      setTimeout(()=>setOutputUI(false),2000);
      return;
    }
    updateTimerDisplay();
  },500);
}

function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

function updateTimerDisplay(){
  const remain=Math.max(0,Math.ceil((timerEndTime-Date.now())/1000));
  const m=Math.floor(remain/60);
  const s=remain%60;
  document.getElementById('timerDisplay').textContent=
    (m>59?Math.floor(m/60)+':'+String(m%60).padStart(2,'0'):String(m).padStart(2,'0'))+':'+String(s).padStart(2,'0');
}

// OUTPUT状態の監視
function watchOutputState(){
  if(!firebaseReady) return;
  db.ref('dmm/status').on('value',snap=>{
    const d=snap.val();
    if(d && d.output!==undefined) setOutputUI(d.output);
  });
}

// ===== 初期化 =====
window.addEventListener('load',()=>{
  startListening();
  watchOutputState();
  redrawChart();

  setInterval(()=>{
    if(lastUpdate>0 && Date.now()-lastUpdate>10000){
      document.getElementById('statusDot').className='status-dot stale';
      document.getElementById('statusText').textContent='データ途絶 — 最終: '+new Date(lastUpdate).toLocaleTimeString('ja-JP');
    }
  },5000);
});
window.addEventListener('resize',()=>redrawChart());
</script>
